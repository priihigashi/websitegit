name: Avatar Generate (Seedream 4.5)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Scene/scenario prompt — describe where the person should be'
        required: true
        type: string
      reference_image_url:
        description: 'URL of the persons reference photo (from Drive or web)'
        required: true
        type: string
      filename:
        description: 'Output filename (without extension)'
        required: true
        default: 'avatar_generated'
        type: string
      drive_folder_id:
        description: 'Drive folder ID — defaults to People/Alexandra/AI Generated'
        required: false
        default: '1WCW29iHlftMOSdu0qKLga1nwwlUw962K'
        type: string
      background_edit_only:
        description: 'After generating, also run Nano Banana 2 to refine background only?'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

# FOLDER IDs (People folder — Higashi Drive):
# People/Alexandra/AI Generated: 1WCW29iHlftMOSdu0qKLga1nwwlUw962K  <- DEFAULT
# People/Alexandra/Originals:    1F3n-8MS2Q6YZxbYfa5-Edf6GWk-uPwoV
# Properties/Completely Gen:     1Md5BRAfWTUBOtl_LvdTAyBhat8ZfXamN

jobs:
  generate-avatar:
    runs-on: ubuntu-latest
    steps:
      - name: Generate with Seedream 4.5 (face/identity layer)
        id: seedream
        env:
          PRI_OP_REPLICATE_API_KEY: ${{ secrets.PRI_OP_REPLICATE_API_KEY }}
          PROMPT: ${{ inputs.prompt }}
          REFERENCE_IMAGE_URL: ${{ inputs.reference_image_url }}
        run: |
          pip install -q requests
          python3 << 'PYEOF'
          import os, json, requests, time, sys

          api_key = os.environ['PRI_OP_REPLICATE_API_KEY']
          headers = {
              "Authorization": f"Bearer {api_key}",
              "Content-Type": "application/json",
              "Prefer": "wait"
          }

          payload = {
              "input": {
                  "prompt": os.environ['PROMPT'],
                  "input_image": os.environ['REFERENCE_IMAGE_URL'],
                  "aspect_ratio": "2:3",
                  "output_format": "jpg",
                  "output_quality": 90
              }
          }

          print(f"Submitting to Seedream 4.5...")
          resp = requests.post(
              "https://api.replicate.com/v1/models/bytedance/seedream-4.5/predictions",
              json=payload, headers=headers, timeout=120
          )
          data = resp.json()
          print(f"Response status: {resp.status_code}")
          pred_id = data.get('id')
          print(f"Prediction ID: {pred_id} | Status: {data.get('status')}")

          image_url = None
          if data.get('status') == 'succeeded':
              output = data.get('output')
              image_url = output[0] if isinstance(output, list) else output
          else:
              for i in range(30):
                  time.sleep(10)
                  poll = requests.get(
                      f"https://api.replicate.com/v1/predictions/{pred_id}",
                      headers=headers, timeout=30
                  )
                  pdata = poll.json()
                  status = pdata.get('status')
                  print(f"Poll {i+1}: status={status}")
                  if status == 'succeeded':
                      output = pdata.get('output')
                      image_url = output[0] if isinstance(output, list) else output
                      break
                  elif status in ('failed', 'canceled'):
                      print(f"Seedream failed: {pdata.get('error', 'unknown error')}")
                      sys.exit(1)

          if not image_url:
              print("ERROR: No image URL returned after polling")
              sys.exit(1)

          print(f"Image URL: {image_url}")
          # Download immediately — Replicate CDN URLs expire (~1 hour)
          import subprocess
          result = subprocess.run(['curl', '-L', '-o', f'/tmp/${{ inputs.filename }}.jpg', image_url], capture_output=True)
          if result.returncode != 0:
              print(f"Download failed: {result.stderr.decode()}")
              sys.exit(1)
          print(f"Downloaded locally: /tmp/${{ inputs.filename }}.jpg")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"image_url={image_url}\n")
          PYEOF

      - name: Refine background with Nano Banana 2 (optional)
        if: steps.seedream.outcome == 'success' && inputs.background_edit_only == 'true'
        id: nanbanana
        env:
          PRI_OP_INFSH_API_KEY: ${{ secrets.PRI_OP_INFSH_API_KEY }}
          PROMPT: "Keep the person exactly as is — do not change the face, hair, clothing or body. Only enhance the background and lighting. ${{ inputs.prompt }}"
          FILENAME: ${{ inputs.filename }}
        run: |
          pip install -q requests
          python3 << 'PYEOF'
          import os, json, requests, time, base64, sys

          COMPLETED = 10
          api_key = os.environ['PRI_OP_INFSH_API_KEY']
          headers = {"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"}

          # Use local file as base64 — avoids Replicate CDN URL expiry issue
          filename = os.environ['FILENAME']
          local_path = f'/tmp/{filename}.jpg'
          with open(local_path, 'rb') as f:
              img_b64 = base64.b64encode(f.read()).decode()
          data_uri = f"data:image/jpeg;base64,{img_b64}"

          payload = {
              "app": "google/gemini-3-1-flash-image-preview",
              "input": {
                  "prompt": os.environ['PROMPT'],
                  "images": [data_uri],
                  "aspect_ratio": "2:3",
                  "resolution": "2K"
              }
          }
          resp = requests.post("https://api.inference.sh/apps/run", json=payload, headers=headers, timeout=120)
          data = resp.json().get('data', resp.json())
          task_id = data.get('id')
          print(f"NB2 Task ID: {task_id}")

          image_url = None
          for i in range(60):
              time.sleep(10)
              poll = requests.get(f"https://api.inference.sh/tasks/{task_id}", headers=headers, timeout=30)
              pdata = poll.json().get('data', poll.json())
              status = pdata.get('status')
              output = pdata.get('output')
              print(f"Poll {i+1}: status={status}")
              if status == COMPLETED:
                  if isinstance(output, dict):
                      imgs = output.get('images', [])
                      if imgs:
                          img = imgs[0]
                          image_url = img.get('url', img) if isinstance(img, dict) else img
                  elif isinstance(output, list) and output:
                      item = output[0]
                      image_url = item.get('url', item) if isinstance(item, dict) else item
                  break
              elif status in {11, 12}:
                  print("NB2 failed — keeping Seedream output as final")
                  sys.exit(0)

          if image_url:
              import subprocess
              refined_path = f'/tmp/{filename}_refined.jpg'
              result = subprocess.run(['curl', '-L', '-o', refined_path, image_url], capture_output=True)
              if result.returncode == 0:
                  import shutil
                  # Only replace after confirmed successful download
                  import os as _os
                  if _os.path.exists(refined_path) and _os.path.getsize(refined_path) > 10000:
                      shutil.copy(refined_path, local_path)
                      print(f"NB2 refined version saved as final output")
                  else:
                      print("NB2 download too small or failed — keeping Seedream output")
              else:
                  print(f"NB2 download failed — keeping Seedream output")
          PYEOF

      - name: Upload to Google Drive
        if: steps.seedream.outcome == 'success'
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          DRIVE_FOLDER_ID: ${{ inputs.drive_folder_id }}
          FILENAME: ${{ inputs.filename }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          python3 << 'EOF'
          import os, json, sys
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from google.auth.exceptions import TransportError
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          token_data = json.loads(os.environ['SHEETS_TOKEN'])
          creds = Credentials(
              token=token_data.get('token'),
              refresh_token=token_data.get('refresh_token'),
              token_uri=token_data.get('token_uri', 'https://oauth2.googleapis.com/token'),
              client_id=token_data.get('client_id'),
              client_secret=token_data.get('client_secret'),
              scopes=token_data.get('scopes')
          )
          if not creds.valid:
              try:
                  creds.refresh(Request())
              except TransportError as e:
                  print(f"ERROR: OAuth refresh failed — {e}")
                  sys.exit(1)

          drive = build('drive', 'v3', credentials=creds)
          filename = os.environ['FILENAME'] + '.jpg'
          result = drive.files().create(
              body={'name': filename, 'parents': [os.environ['DRIVE_FOLDER_ID']]},
              media_body=MediaFileUpload(f'/tmp/{filename}', mimetype='image/jpeg'),
              supportsAllDrives=True, fields='id,name,webViewLink'
          ).execute()
          if not result.get('id'):
              print("ERROR: Drive upload returned no file ID")
              sys.exit(1)
          print(f"Saved: {result['name']}")
          print(f"Link: {result['webViewLink']}")
          EOF

      - name: Summary
        if: always()
        run: |
          echo "## Avatar Generation (Seedream 4.5)" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** ${{ inputs.filename }}.jpg" >> $GITHUB_STEP_SUMMARY
          echo "- **Reference:** ${{ inputs.reference_image_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Seedream URL:** ${{ steps.seedream.outputs.image_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Background edit:** ${{ inputs.background_edit_only }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Drive folder:** ${{ inputs.drive_folder_id }}" >> $GITHUB_STEP_SUMMARY
