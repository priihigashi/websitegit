name: Buffer List Profiles (one-shot diagnostic)

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY_EXP04092027 }}
    steps:
      - name: Probe Buffer GraphQL schema for profile query
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, urllib.error

          key = os.environ.get("BUFFER_API_KEY", "")

          def gql(q):
              payload = json.dumps({"query": q}).encode()
              req = urllib.request.Request(
                  "https://api.buffer.com", data=payload,
                  headers={"Authorization": f"Bearer {key}",
                           "Content-Type": "application/json",
                           "User-Agent": "BufferClient/1.0"})
              try:
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except urllib.error.HTTPError as e:
                  return {"_http_error": e.code, "_body": e.read().decode()[:300]}
              except Exception as e:
                  return {"_error": str(e)}

          # 1. Root query field names
          print("=" * 70)
          print("Top-level Query fields available")
          print("=" * 70)
          r = gql('{ __schema { queryType { fields { name description } } } }')
          fields = (r.get("data") or {}).get("__schema", {}).get("queryType", {}).get("fields", [])
          for f in fields:
              print(f"  {f['name']}: {f.get('description', '')[:80]}")
          print()

          # 2. Try common shapes
          for q in [
              '{ channels { id service serviceUsername name } }',
              '{ viewer { channels { id service serviceUsername name } } }',
              '{ me { channels { id service serviceUsername name } } }',
              '{ currentUser { channels { id service serviceUsername name } } }',
              '{ organizations { channels { id service serviceUsername name } } }',
          ]:
              print(f"-- Trying: {q}")
              r = gql(q)
              if "_http_error" in r:
                  print(f"   {r['_http_error']}: {r['_body'][:160]}")
              elif "errors" in r:
                  msgs = [e.get("message", "?")[:100] for e in r["errors"]]
                  print(f"   ERRORS: {msgs}")
              elif "data" in r:
                  print(f"   ✅ DATA: {json.dumps(r['data'], indent=2)[:600]}")
              print()
          EOF
