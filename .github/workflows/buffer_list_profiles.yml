name: Buffer List Profiles (one-shot diagnostic)

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY_EXP04092027 }}
    steps:
      - name: List channels via Buffer GraphQL
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, urllib.error

          key = os.environ.get("BUFFER_API_KEY", "")

          def gql(q, vars=None):
              payload = json.dumps({"query": q, "variables": vars or {}}).encode()
              req = urllib.request.Request(
                  "https://api.buffer.com", data=payload,
                  headers={"Authorization": f"Bearer {key}",
                           "Content-Type": "application/json",
                           "User-Agent": "BufferClient/1.0"})
              try:
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except urllib.error.HTTPError as e:
                  return {"_err": e.code, "_body": e.read().decode()[:500]}

          # 1. ChannelsInput schema
          print("=== ChannelsInput required fields ===")
          r = gql('{ __type(name: "ChannelsInput") { inputFields { name type { name kind ofType { name } } } } }')
          for f in (r.get("data") or {}).get("__type", {}).get("inputFields", []) or []:
              t = f["type"]
              tn = t.get("name") or (t.get("ofType") or {}).get("name")
              print(f"  {f['name']}: {tn} ({t.get('kind')})")
          print()

          # 2. Get organizations first (org id is likely needed)
          print("=== Organizations ===")
          r = gql('{ organizations { id name } }')
          orgs = (r.get("data") or {}).get("organizations", [])
          print(json.dumps(r, indent=2))
          print()

          # 3. Try channels with org id
          if orgs:
              org_id = orgs[0]["id"]
              print(f"=== Trying channels with input: organizationId={org_id} ===")
              for input_shape in [
                  {"organizationId": org_id},
                  {"input": {"organizationId": org_id}},
              ]:
                  q = """query Q($input: ChannelsInput!) {
                    channels(input: $input) {
                      id name service serviceId displayName isDisconnected
                    }
                  }"""
                  r = gql(q, input_shape)
                  print(f"shape: {input_shape}")
                  print(json.dumps(r, indent=2)[:2000])
                  print()
                  if "data" in r and r["data"].get("channels"):
                      break
          EOF
