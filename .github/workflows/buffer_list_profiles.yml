name: Buffer List Profiles (one-shot diagnostic)

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY_EXP04092027 }}
    steps:
      - name: List channels via Buffer GraphQL
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, urllib.error

          key = os.environ.get("BUFFER_API_KEY", "")

          def gql(q):
              payload = json.dumps({"query": q}).encode()
              req = urllib.request.Request(
                  "https://api.buffer.com", data=payload,
                  headers={"Authorization": f"Bearer {key}",
                           "Content-Type": "application/json",
                           "User-Agent": "BufferClient/1.0"})
              try:
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except urllib.error.HTTPError as e:
                  return {"_err": e.code, "_body": e.read().decode()[:500]}

          # 1. Get Channel field names
          print("=== Channel type fields ===")
          r = gql('{ __type(name: "Channel") { fields { name type { name kind ofType { name } } } } }')
          fields = (r.get("data") or {}).get("__type", {}).get("fields", []) or []
          for f in fields:
              t = f["type"]
              tn = t.get("name") or (t.get("ofType") or {}).get("name")
              print(f"  {f['name']}: {tn}")
          print()

          # 2. List channels with all the relevant fields
          field_names = [f["name"] for f in fields]
          # pick safe scalar fields
          safe = [n for n in field_names if n in ("id","name","service","serviceType","handle","username","accountId","timezone","avatarUrl","isDisconnected","externalId","metadata","organizationId")]
          query = "{ channels { " + " ".join(safe) + " } }"
          print(f"=== Querying: {query} ===\n")
          r = gql(query)
          if "data" in r:
              channels = r["data"].get("channels", [])
              print(f"Found {len(channels)} channel(s):\n")
              for c in channels:
                  print(json.dumps(c, indent=2))
                  print()
          else:
              print(json.dumps(r, indent=2))
          EOF
