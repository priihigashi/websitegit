name: Render Video — News Reel (FORMAT-001)
# Renders the FORMAT-001 split-screen reel via Remotion.
# Inputs: story_id from a completed capture run.
# Outputs: PT + EN MP4 reels uploaded to News drive template folder.
# ALWAYS triggered manually via workflow_dispatch. The capture pipeline does NOT auto-trigger this.
# Capture completion email says "Next step: trigger render-video.yml manually via Actions tab."

on:
  workflow_dispatch:
    inputs:
      story_id:
        description: 'Story ID (e.g. NWS-202604171927)'
        required: true
      project:
        description: 'brazil or usa — determines which Captures folder to search for video'
        required: false
        default: 'brazil'
        type: choice
        options:
          - brazil
          - usa
      capture_run_id:
        description: 'Unused — video is downloaded from Drive by story_id'
        required: false
        default: ''
      proof_slides_json:
        description: 'JSON array of proof slides [{headline, fact, source, imageUrl?, startFrame, durationFrames}]'
        required: false
        default: '[]'
      video_start_frame:
        description: 'Frame number to start clip from (skip intro — default 0)'
        required: false
        default: '0'
      total_frames:
        description: 'Total reel duration in frames at 30fps (default 900 = 30 seconds)'
        required: false
        default: '900'
      hook:
        description: 'HOOK TEXT — bold, large text shown in first 5 seconds (scroll-stopper). e.g. "QUEM REALMENTE DECIDIU ISSO?"'
        required: false
        default: ''
      speaker_name:
        description: 'Speaker name shown in lower-third badge (e.g. Marianne Williamson)'
        required: false
        default: ''
      speaker_role:
        description: 'Speaker role/title (e.g. Author & Activist)'
        required: false
        default: ''
      topic_title:
        description: 'Small topic strip at top of video (e.g. REGIME CHANGE) — visible after hook ends'
        required: false
        default: ''
      video_offset_y:
        description: 'Vertical crop % for face framing (default 15% — good for most talking heads). Increase if face is lower in frame.'
        required: false
        default: '15%'
      voiceover:
        description: 'Generate ElevenLabs voiceover (EN + PT). Set to false to skip.'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Remotion 4.x requires Node 20+

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client requests

      - name: Write Google credentials
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
        run: |
          mkdir -p /tmp/creds
          echo "$SHEETS_TOKEN" > /tmp/creds/sheets_token.json

      - name: Download video + SRT from News Drive folder (USA History/Brazil series)
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          STORY_ID: ${{ github.event.inputs.story_id }}
        run: |
          python3 - << 'PYEOF'
          import json, os, sys
          from pathlib import Path
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build

          story_id = os.environ["STORY_ID"]
          token_data = json.loads(os.environ["SHEETS_TOKEN"])
          creds = Credentials(
              token=token_data.get("token"),
              refresh_token=token_data.get("refresh_token"),
              token_uri=token_data.get("token_uri", "https://oauth2.googleapis.com/token"),
              client_id=token_data.get("client_id"),
              client_secret=token_data.get("client_secret"),
          )
          drive = build("drive", "v3", credentials=creds)
          # Capture folder per project — mirrors routing.py capture_folder_id
          CAPTURE_FOLDERS = {
              "brazil": "1DZWbS4bF4XF_OjJSnD02WD2N83ljXwHd",  # News/Brazil/Captures
              "news":   "1DZWbS4bF4XF_OjJSnD02WD2N83ljXwHd",  # alias
              "usa":    "1ZzrEmj3Smt0chr8CxiCOyroFCRzE-zU1",  # News/USA/Captures
              "opc":    "1p7s2Q7kCxzKdvaVRFxSoYAQ-IG_NhTqq",  # Marketing/Content Hub
              "ugc":    "1b5fCmWn6cUkZSjhaZKGFmaKDc4MafY3U",  # UGC/Captures
              "stocks": "17oazrbMM1lBeFAGNCaFp8sjnAMWbVdSI",  # Stocks/Captures
              "higashi":"1by4guSe46XK0DwIJwmNUEtbzmvQFOXOv",  # Higashi/Captures
          }
          project_key = "${{ inputs.project }}".lower()
          CAPTURE_FOLDER_ID = CAPTURE_FOLDERS.get(project_key, CAPTURE_FOLDERS["brazil"])

          def download_file(file_id, dest_path):
              import io
              from googleapiclient.http import MediaIoBaseDownload
              req = drive.files().get_media(fileId=file_id, supportsAllDrives=True)
              buf = io.FileIO(dest_path, "wb")
              dl = MediaIoBaseDownload(buf, req)
              done = False
              while not done:
                  _, done = dl.next_chunk()
              buf.close()

          # Search for video and SRT by story_id prefix
          for (name_pat, dest) in [
              (f"{story_id}_original.mp4", "/tmp/source_clip.mp4"),
              (f"{story_id}_captions.srt", "/tmp/captions.srt"),
          ]:
              results = drive.files().list(
                  q=f"name='{name_pat}' and '{CAPTURE_FOLDER_ID}' in parents and trashed=false",
                  supportsAllDrives=True,
                  includeItemsFromAllDrives=True,
                  fields="files(id,name,size)"
              ).execute()
              files = results.get("files", [])
              if files:
                  fid = files[0]["id"]
                  size = int(files[0].get("size", 0))
                  print(f"Downloading {name_pat} ({size/1024/1024:.1f} MB) → {dest}")
                  download_file(fid, dest)
                  print(f"  ✅ {dest}")
              else:
                  print(f"  ⚠️  {name_pat} not found in Drive (capture may predate new pipeline)")
          PYEOF

      - name: Locate video and SRT files
        id: locate
        run: |
          VIDEO="/tmp/source_clip.mp4"
          SRT="/tmp/captions.srt"
          [ -f "$VIDEO" ] || { echo "ERROR: video not found at $VIDEO"; exit 1; }
          echo "video=$VIDEO" >> $GITHUB_OUTPUT
          echo "srt=$SRT" >> $GITHUB_OUTPUT
          echo "Video: $VIDEO ($(du -sh $VIDEO | cut -f1))"
          echo "SRT: $SRT"

      - name: Install Remotion dependencies
        working-directory: scripts/remotion
        run: npm install

      - name: Build render props JSON (EN)
        id: props_en
        env:
          STORY_ID: ${{ github.event.inputs.story_id }}
          PROOF_SLIDES: ${{ github.event.inputs.proof_slides_json }}
          VIDEO_START_FRAME: ${{ github.event.inputs.video_start_frame }}
          TOTAL_FRAMES: ${{ github.event.inputs.total_frames }}
          SRT_FILE: ${{ steps.locate.outputs.srt }}
          HOOK: ${{ github.event.inputs.hook }}
          SPEAKER_NAME: ${{ github.event.inputs.speaker_name }}
          SPEAKER_ROLE: ${{ github.event.inputs.speaker_role }}
          TOPIC_TITLE: ${{ github.event.inputs.topic_title }}
          VIDEO_OFFSET_Y: ${{ github.event.inputs.video_offset_y }}
          VOICEOVER: ${{ github.event.inputs.voiceover }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          SOVEREIGN_TEMPLATE_FOLDER: ${{ secrets.SOVEREIGN_TEMPLATE_FOLDER }}
        run: |
          VOICEOVER_FLAG=""
          [ "$VOICEOVER" != "false" ] && VOICEOVER_FLAG="--voiceover"
          python3 scripts/remotion/build_render_props.py \
            --story-id "$STORY_ID" \
            --language en \
            --proof-slides "$PROOF_SLIDES" \
            --video-start-frame "$VIDEO_START_FRAME" \
            --total-frames "$TOTAL_FRAMES" \
            --srt-file "$SRT_FILE" \
            --hook "$HOOK" \
            --speaker-name "$SPEAKER_NAME" \
            --speaker-role "$SPEAKER_ROLE" \
            --topic-title "$TOPIC_TITLE" \
            --video-offset-y "$VIDEO_OFFSET_Y" \
            $VOICEOVER_FLAG \
            > /tmp/props_en.json
          echo "EN props:"
          cat /tmp/props_en.json

      - name: Build render props JSON (PT)
        env:
          STORY_ID: ${{ github.event.inputs.story_id }}
          PROOF_SLIDES: ${{ github.event.inputs.proof_slides_json }}
          VIDEO_START_FRAME: ${{ github.event.inputs.video_start_frame }}
          TOTAL_FRAMES: ${{ github.event.inputs.total_frames }}
          SRT_FILE: ${{ steps.locate.outputs.srt }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HOOK: ${{ github.event.inputs.hook }}
          SPEAKER_NAME: ${{ github.event.inputs.speaker_name }}
          SPEAKER_ROLE: ${{ github.event.inputs.speaker_role }}
          TOPIC_TITLE: ${{ github.event.inputs.topic_title }}
          VIDEO_OFFSET_Y: ${{ github.event.inputs.video_offset_y }}
          VOICEOVER: ${{ github.event.inputs.voiceover }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          SOVEREIGN_TEMPLATE_FOLDER: ${{ secrets.SOVEREIGN_TEMPLATE_FOLDER }}
        run: |
          VOICEOVER_FLAG=""
          [ "$VOICEOVER" != "false" ] && VOICEOVER_FLAG="--voiceover"
          python3 scripts/remotion/build_render_props.py \
            --story-id "$STORY_ID" \
            --language pt \
            --proof-slides "$PROOF_SLIDES" \
            --video-start-frame "$VIDEO_START_FRAME" \
            --total-frames "$TOTAL_FRAMES" \
            --srt-file "$SRT_FILE" \
            --translate \
            --hook "$HOOK" \
            --speaker-name "$SPEAKER_NAME" \
            --speaker-role "$SPEAKER_ROLE" \
            --topic-title "$TOPIC_TITLE" \
            --video-offset-y "$VIDEO_OFFSET_Y" \
            $VOICEOVER_FLAG \
            > /tmp/props_pt.json

      - name: Copy source video to Remotion public dir
        run: |
          mkdir -p scripts/remotion/public
          cp "${{ steps.locate.outputs.video }}" scripts/remotion/public/source_clip.mp4
          # Copy EN voiceover if generated — will be used during EN render
          EN_AUDIO="/tmp/${{ github.event.inputs.story_id }}_vo_en.mp3"
          [ -f "$EN_AUDIO" ] && cp "$EN_AUDIO" scripts/remotion/public/vo.mp3 || true

      - name: Render EN reel
        working-directory: scripts/remotion
        run: |
          npx remotion render src/Root.tsx NewsReelEN \
            --props /tmp/props_en.json \
            --output /tmp/reel_en.mp4
          echo "EN reel size: $(du -sh /tmp/reel_en.mp4)"

      - name: Swap in PT voiceover
        run: |
          # Replace EN audio with PT audio before PT render
          PT_AUDIO="/tmp/${{ github.event.inputs.story_id }}_vo_pt.mp3"
          [ -f "$PT_AUDIO" ] && cp "$PT_AUDIO" scripts/remotion/public/vo.mp3 || true

      - name: Render PT reel
        working-directory: scripts/remotion
        run: |
          npx remotion render src/Root.tsx NewsReelPT \
            --props /tmp/props_pt.json \
            --output /tmp/reel_pt.mp4
          echo "PT reel size: $(du -sh /tmp/reel_pt.mp4)"

      - name: Upload reels to News drive template folder
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          STORY_ID: ${{ github.event.inputs.story_id }}
          SOVEREIGN_TEMPLATE_FOLDER: ${{ secrets.SOVEREIGN_TEMPLATE_FOLDER }}
        run: |
          python3 scripts/remotion/upload_reels.py \
            --story-id "$STORY_ID" \
            --topic-slug "$(echo '${{ github.event.inputs.topic_title }}' | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-')" \
            --en-reel /tmp/reel_en.mp4 \
            --pt-reel /tmp/reel_pt.mp4 \
            --folder-id "$SOVEREIGN_TEMPLATE_FOLDER"

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: news-reels-${{ github.run_id }}
          path: |
            /tmp/reel_en.mp4
            /tmp/reel_pt.mp4
            /tmp/${{ github.event.inputs.story_id }}_vo_en.mp3
            /tmp/${{ github.event.inputs.story_id }}_vo_pt.mp3
          retention-days: 30
