name: Capture Queue Processor

# Reads unprocessed rows from '📲 Capture Queue' tab,
# runs Capture Pipeline v2 inline, writes back PROCESSED / SCORE / MOVED TO / HUB DOC PATH.
#
# Schedule: daily 6 AM ET
#   11:00 UTC = 6 AM EDT (Mar–Nov)
#   12:00 UTC = 7 AM EST (Nov–Mar) — close enough; run both crons to cover DST
#
# Manual trigger: Actions → Capture Queue Processor → Run workflow
# Optional input: max_per_run (default 5)

on:
  schedule:
    - cron: "0 11 * * *"   # 6 AM EDT (Mar–Nov)
    - cron: "0 12 * * *"   # 7 AM EST (Nov–Mar) — DST safety
  workflow_dispatch:
    inputs:
      max_per_run:
        description: "Max URLs to process per run (default 5)"
        required: false
        default: "5"
        type: string
      retry_failed:
        description: "Re-process ALL rows marked ⚠️ Pipeline failed (clears flag and retries)"
        required: false
        default: false
        type: boolean
      bulk_urls:
        description: "Newline-separated list of URLs to add to the queue and process immediately"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: write

jobs:
  process-queue:
    name: Process Capture Queue
    runs-on: ubuntu-latest
    timeout-minutes: 150    # 5 captures × 25 min each + headroom

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ffmpeg (required by yt-dlp)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install \
            yt-dlp \
            instaloader \
            openai \
            anthropic \
            gspread \
            google-auth \
            google-api-python-client \
            python-dotenv \
            requests \
            youtube-transcript-api

      - name: Run Capture Queue Processor
        env:
          SHEETS_TOKEN:              ${{ secrets.SHEETS_TOKEN }}
          OPENAI_API_KEY:            ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_KEY_4_CONTENT:         ${{ secrets.CLAUDE_KEY_4_CONTENT }}
          APIFY_API_KEY:             ${{ secrets.APIFY_API_KEY }}
          PRI_OP_GMAIL_APP_PASSWORD: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
          PRI_OP_YT_COOKIES:         ${{ secrets.PRI_OP_YT_COOKIES }}
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN:                  ${{ secrets.GITHUB_TOKEN }}
          QUEUE_MAX_PER_RUN:         ${{ inputs.max_per_run || '5' }}
          QUEUE_RETRY_FAILED:        ${{ inputs.retry_failed || 'false' }}
          QUEUE_BULK_URLS:           ${{ inputs.bulk_urls || '' }}
        run: python scripts/capture/capture_queue_processor.py

      - name: Upload transcripts (artifacts)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "capture-queue-${{ github.run_id }}"
          path: transcripts/
          retention-days: 14

      - name: Update Build Tracker
        if: always()
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
        run: |
          pip install pytz -q
          python3 scripts/build_tracker_writer.py \
            --workflow capture_queue.yml \
            --status "${{ job.status }}"
