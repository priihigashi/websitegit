name: OPC Ads Dashboard — Weekly Refresh

on:
  schedule:
    - cron: '0 12 * * 1'   # Every Monday 8 AM ET (12:00 UTC)
  workflow_dispatch:         # Manual trigger anytime

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-ads

      - name: Refresh dashboard
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID:       ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET:   ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN:   ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          PRI_OP_GMAIL_APP_PASSWORD:  ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
        run: python scripts/ads_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard/index.html docs/dashboard/dark.html
          git diff --staged --quiet || git commit -m "chore: refresh ads dashboard $(date -u +%Y-%m-%d)"
          git push

      - name: Email alert on failure
        if: failure()
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import os, smtplib
          from email.message import EmailMessage
          msg = EmailMessage()
          msg['Subject'] = '🚨 ads_pulse.yml FAILED — run ${{ github.run_id }}'
          msg['From'] = 'priscila@oakpark-construction.com'
          msg['To']   = 'priscila@oakpark-construction.com'
          msg.set_content(
              "ads_pulse.yml failed on run ${{ github.run_id }}.\n\n"
              "Logs: https://github.com/priihigashi/oak-park-ai-hub/actions/runs/${{ github.run_id }}\n"
          )
          s = smtplib.SMTP_SSL('smtp.gmail.com', 465)
          s.login('priscila@oakpark-construction.com', os.environ['GMAIL_APP_PASSWORD'])
          s.send_message(msg)
          s.quit()
          PYEOF
