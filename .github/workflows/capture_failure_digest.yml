name: Capture Failure Daily Digest

on:
  schedule:
    - cron: "30 13 * * *" # 9:30 AM ET (DST) / 8:30 AM ET (standard)
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install --quiet google-auth google-auth-httplib2 google-api-python-client

      - name: Build digest and send email
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          PRI_OP_GMAIL_APP_PASSWORD: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
          REPO: ${{ github.repository }}
        run: |
          python - << 'PYEOF'
          import os, json, urllib.request, urllib.parse
          from datetime import datetime, timedelta, timezone
          import smtplib
          from email.mime.text import MIMEText
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build

          repo = os.environ["REPO"]
          gh_token = os.environ.get("GH_TOKEN", "")
          subject = "CAPTURE FAILED — Daily digest"

          now = datetime.now(timezone.utc)
          since = (now - timedelta(hours=24)).isoformat().replace("+00:00", "Z")
          api_url = f"https://api.github.com/repos/{repo}/actions/workflows/capture_pipeline.yml/runs?per_page=100&status=completed"
          req = urllib.request.Request(api_url, headers={
              "Authorization": f"Bearer {gh_token}",
              "Accept": "application/vnd.github+json",
          })
          runs = json.loads(urllib.request.urlopen(req, timeout=30).read()).get("workflow_runs", [])

          failures = []
          for r in runs:
              created = r.get("created_at", "")
              if created and created < since:
                  continue
              if r.get("conclusion") != "failure":
                  continue
              failures.append({
                  "id": r.get("id"),
                  "run_number": r.get("run_number"),
                  "title": r.get("display_title") or "capture_pipeline",
                  "url": r.get("html_url"),
                  "created": created,
              })

          if not failures:
              print("No capture failures in last 24h. No digest sent.")
              raise SystemExit(0)

          # Archive prior digest emails from inbox before sending the new one.
          token_data = json.loads(os.environ["SHEETS_TOKEN"])
          creds = Credentials(
              token=token_data.get("token"),
              refresh_token=token_data.get("refresh_token"),
              token_uri=token_data.get("token_uri", "https://oauth2.googleapis.com/token"),
              client_id=token_data.get("client_id"),
              client_secret=token_data.get("client_secret"),
              scopes=token_data.get("scopes"),
          )
          if not creds.valid and creds.refresh_token:
              creds.refresh(Request())
          gmail = build("gmail", "v1", credentials=creds)
          q = f'subject:"{subject}" in:inbox'
          ids = []
          token = None
          while True:
              resp = gmail.users().messages().list(userId="me", q=q, maxResults=500, pageToken=token).execute()
              ids.extend([m["id"] for m in resp.get("messages", [])])
              token = resp.get("nextPageToken")
              if not token:
                  break
          if ids:
              for i in range(0, len(ids), 1000):
                  gmail.users().messages().batchModify(
                      userId="me",
                      body={"ids": ids[i:i+1000], "removeLabelIds": ["INBOX"]},
                  ).execute()
              print(f"Archived {len(ids)} older digest email(s) from inbox.")

          lines = []
          for item in failures[:30]:
              lines.append(
                  f"- #{item['run_number']} | {item['title']}\n"
                  f"  Time: {item['created']}\n"
                  f"  Run: {item['url']}"
              )
          body = (
              f"{len(failures)} capture run(s) failed in the last 24 hours.\n\n"
              + "\n\n".join(lines)
              + "\n\nThis is the daily capture failure digest (replaces per-run failure emails)."
          )

          msg = MIMEText(body)
          msg["Subject"] = subject
          msg["From"] = "priscila@oakpark-construction.com"
          msg["To"] = "priscila@oakpark-construction.com"
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login("priscila@oakpark-construction.com", os.environ["PRI_OP_GMAIL_APP_PASSWORD"])
              smtp.send_message(msg)
          print(f"Sent digest: {len(failures)} failure(s)")
          PYEOF
