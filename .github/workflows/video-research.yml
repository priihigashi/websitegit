name: Video & Topic Research

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Research mode'
        required: true
        type: choice
        options:
          - general
          - person_evidence_mining
        default: general
      # ── general mode ────────────────────────────────────────────────────────
      topic:
        description: '(general) Research label (e.g. "kling ai talking head")'
        required: false
        default: 'kling ai video generation'
      queries:
        description: '(general) Comma-separated YouTube search queries'
        required: false
        default: 'kling ai tutorial 2025,kling 3.0 video generation,kling vs heygen talking head'
      max_per_query:
        description: '(general) Max videos per query'
        required: false
        default: '5'
      niche:
        description: 'Niche for routing (brazil / usa / opc / higashi / ugc)'
        required: false
        default: ''
      # ── person_evidence_mining mode (SH-104) ────────────────────────────────
      seed_url:
        description: '(person_evidence_mining) Seed Reel/Video URL'
        required: false
        default: ''
      person_name:
        description: '(person_evidence_mining) Person to mine clips of'
        required: false
        default: ''
      evidence_requirement:
        description: '(person_evidence_mining) What to look for in transcripts'
        required: false
        default: ''
      target_clip_count:
        description: '(person_evidence_mining) Number of verified clips wanted'
        required: false
        default: '6'

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg (required by yt-dlp post-processing)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install dependencies
        run: pip install anthropic youtube-transcript-api yt-dlp gspread google-auth google-api-python-client openai requests

      - name: Run research
        env:
          CLAUDE_KEY_4_CONTENT: ${{ secrets.CLAUDE_KEY_4_CONTENT }}
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PRI_OP_YT_COOKIES: ${{ secrets.PRI_OP_YT_COOKIES }}
          PRI_OP_IG_COOKIES: ${{ secrets.PRI_OP_IG_COOKIES }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          PRI_OP_GMAIL_APP_PASSWORD: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "person_evidence_mining" ]; then
            python scripts/youtube_research.py \
              --mode person_evidence_mining \
              --seed-url "${{ github.event.inputs.seed_url }}" \
              --person-name "${{ github.event.inputs.person_name }}" \
              --evidence-requirement "${{ github.event.inputs.evidence_requirement }}" \
              --target-clip-count ${{ github.event.inputs.target_clip_count }} \
              --niche "${{ github.event.inputs.niche }}"
          else
            python scripts/youtube_research.py \
              --mode general \
              --topic "${{ github.event.inputs.topic }}" \
              --queries "${{ github.event.inputs.queries }}" \
              --max ${{ github.event.inputs.max_per_query }} \
              --niche "${{ github.event.inputs.niche }}"
          fi

      - name: Upload findings as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-findings-${{ github.run_id }}
          path: /tmp/research_*.txt
          if-no-files-found: ignore

      - name: Email alert on failure
        if: failure()
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
        run: |
          python3 - <<PYEOF
          import os, smtplib
          from email.message import EmailMessage
          msg = EmailMessage()
          msg['Subject'] = '🚨 video-research.yml FAILED — run ${{ github.run_id }}'
          msg['From'] = 'priscila@oakpark-construction.com'
          msg['To']   = 'priscila@oakpark-construction.com'
          msg.set_content(
              "video-research.yml run ${{ github.run_id }} exited non-zero.\n\n"
              "Topic: ${{ github.event.inputs.topic }}\n"
              "Logs:  https://github.com/priihigashi/oak-park-ai-hub/actions/runs/${{ github.run_id }}\n\n"
              "Failures recorded in: Ideas & Inbox → 🚨 Pipeline Failures tab\n"
              "(filter by RUN_ID = ${{ github.run_id }})"
          )
          s = smtplib.SMTP_SSL('smtp.gmail.com', 465)
          s.login('priscila@oakpark-construction.com', os.environ['GMAIL_APP_PASSWORD'])
          s.send_message(msg)
          s.quit()
          PYEOF
