name: Google Calendar — Create Event

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Event title'
        required: true
      date:
        description: 'Date YYYY-MM-DD'
        required: true
      start_time:
        description: 'Start HH:MM (ET)'
        required: true
        default: '10:00'
      end_time:
        description: 'End HH:MM (ET)'
        required: true
        default: '12:00'
      description:
        description: 'Description'
        required: false
        default: ''

jobs:
  create-event:
    runs-on: ubuntu-latest
    steps:
      - name: Create Event
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          EVENT_TITLE: ${{ github.event.inputs.title }}
          EVENT_DATE: ${{ github.event.inputs.date }}
          EVENT_START: ${{ github.event.inputs.start_time }}
          EVENT_END: ${{ github.event.inputs.end_time }}
          EVENT_DESC: ${{ github.event.inputs.description }}
        run: |
          pip install google-auth google-auth-httplib2 google-api-python-client -q
          python3 - << 'PYEOF'
import os, json
from google.oauth2.credentials import Credentials
from google.auth.transport.requests import Request
from googleapiclient.discovery import build

token_data = json.loads(os.environ['SHEETS_TOKEN'])
creds = Credentials(
    token=token_data.get('token'),
    refresh_token=token_data.get('refresh_token'),
    token_uri=token_data.get('token_uri', 'https://oauth2.googleapis.com/token'),
    client_id=token_data.get('client_id'),
    client_secret=token_data.get('client_secret'),
    scopes=token_data.get('scopes', [])
)
if creds.expired and creds.refresh_token:
    creds.refresh(Request())

service = build('calendar', 'v3', credentials=creds)
date = os.environ['EVENT_DATE']
event = {
    'summary': os.environ['EVENT_TITLE'],
    'description': os.environ.get('EVENT_DESC', ''),
    'start': {'dateTime': f"{date}T{os.environ['EVENT_START']}:00", 'timeZone': 'America/New_York'},
    'end':   {'dateTime': f"{date}T{os.environ['EVENT_END']}:00",   'timeZone': 'America/New_York'},
    'reminders': {'useDefault': False, 'overrides': [{'method': 'popup', 'minutes': 30}]}
}
result = service.events().insert(calendarId='primary', body=event).execute()
print('SUCCESS:', result.get('summary'))
print('Link:', result.get('htmlLink'))
PYEOF
