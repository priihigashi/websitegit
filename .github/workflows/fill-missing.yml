name: Fill Missing Sheet Columns

on:
  schedule:
    - cron: '0 22 * * *'   # 5pm EST daily (after both research runs)
  workflow_dispatch:        # manual trigger

permissions:
  contents: read
  issues: write

jobs:
  fill-missing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk@0.39.0

      - name: Fill missing columns
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SA_KEY:     ${{ secrets.GOOGLE_SA_KEY }}
        run: node scripts/fill-missing.js

      - name: Notify via GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Fill-missing script failed — ${new Date().toLocaleDateString('en-US', { timeZone: 'America/New_York' })}`,
              body: `The fill-missing columns script failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['automation', 'bug']
            });
