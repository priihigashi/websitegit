name: Scheduled Capture Poll

on:
  schedule:
    # 3x daily: 8 AM, 1 PM, 7 PM ET (both DST variants)
    - cron: "0 12 * * *"   # 8 AM EDT / 9 AM EST
    - cron: "0 13 * * *"   # 8 AM EST / 9 AM EDT
    - cron: "0 17 * * *"   # 1 PM EDT / 2 PM EST
    - cron: "0 18 * * *"   # 1 PM EST / 2 PM EDT
    - cron: "0 23 * * *"   # 7 PM EDT / 8 PM EST
    - cron: "0 0 * * *"    # 7 PM EST / 8 PM EDT
  workflow_dispatch:
    inputs:
      max_dispatch:
        description: "Max capture dispatches this run"
        required: false
        default: "5"
        type: string

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install \
            google-auth \
            google-api-python-client \
            requests

      - name: Run poller
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CAPTURE_SHEET_ID: "1IrFrCNGVIF7cvAr9cIuAXvCtUR_-eQN1mdCpHXpfbcU"
          CAPTURE_DROP_TAB: "🎯 Drop Links"
          CAPTURE_FALLBACK_TAB: "📥 Inspiration Library"
          CAPTURE_MAX_DISPATCH: ${{ inputs.max_dispatch || '5' }}
        run: python scripts/capture/scheduled_capture_poll.py
