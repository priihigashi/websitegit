name: Archive 4AM Agent Emails (daily)

on:
  schedule:
    - cron: '0 10 * * *'  # 6AM ET — runs after the 4AM run completes
  workflow_dispatch:       # manual trigger for testing

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Archive old 4AM failure emails
        run: |
          pip install --quiet google-auth google-auth-httplib2 google-api-python-client
          python - << 'PYEOF'
          import os, json
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build

          raw = os.environ.get("SHEETS_TOKEN", "")
          if not raw:
              print("ERROR: SHEETS_TOKEN secret not set.")
              exit(1)

          token_data = json.loads(raw)

          creds = Credentials(
              token=token_data.get("token"),
              refresh_token=token_data.get("refresh_token"),
              token_uri=token_data.get("token_uri", "https://oauth2.googleapis.com/token"),
              client_id=token_data.get("client_id"),
              client_secret=token_data.get("client_secret"),
              scopes=token_data.get("scopes"),
          )

          # Refresh if expired
          if not creds.valid and creds.refresh_token:
              creds.refresh(Request())

          gmail = build("gmail", "v1", credentials=creds)

          # Find failure emails in inbox labeled Reports/4AM Agent, older than 1 day
          # Success emails skip inbox — so anything in inbox with this label = failure email
          results = gmail.users().messages().list(
              userId="me",
              q="label:reports-4am-agent in:inbox older_than:1d",
              maxResults=50,
          ).execute()

          messages = results.get("messages", [])
          if not messages:
              print("No old failure emails to archive.")
          else:
              archived = 0
              for msg in messages:
                  gmail.users().messages().modify(
                      userId="me",
                      id=msg["id"],
                      body={"removeLabelIds": ["INBOX"]},
                  ).execute()
                  archived += 1
              print(f"Archived {archived} old 4AM failure email(s).")
          PYEOF
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
