name: GSC Performance Sync

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday 9am EST (after weekend data settles)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gsc-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run GSC sync
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SA_KEY:   ${{ secrets.GOOGLE_SA_KEY }}
          GSC_SITE_URL:    ${{ secrets.GSC_SITE_URL }}
        run: node scripts/gsc-sync.js
