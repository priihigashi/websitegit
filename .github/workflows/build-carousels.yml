name: Build Carousels — Social Media

on:
  schedule:
    - cron: '0 22 * * *'  # 6:00 PM ET (UTC-4 = 22:00 UTC)
  workflow_dispatch:
    inputs:
      source:
        description: 'Trigger source (chat = skip status filter, grab latest row)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements_content.txt

      - name: Write Google credentials
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
        run: |
          mkdir -p /tmp/oak_park_creds
          echo "$SHEETS_TOKEN" > /tmp/oak_park_creds/sheets_token.json

      - name: Build carousels
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          CONTENT_SHEET_ID: ${{ secrets.CONTENT_SHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BUILD_SOURCE: ${{ inputs.source }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python scripts/build_carousel_cloud.py
