name: Schedule Posts

on:
  schedule:
    - cron: '0 1 * * *'  # 9:00 PM ET (UTC-4 = 01:00 UTC next day)
  workflow_dispatch:

jobs:
  schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth pytz

      - name: Write Google credentials
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
        run: |
          mkdir -p /tmp/oak_park_creds
          echo "$SHEETS_TOKEN" > /tmp/oak_park_creds/sheets_token.json

      - name: Schedule posts
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          CONTENT_SHEET_ID: ${{ secrets.CONTENT_SHEET_ID }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_KEY }}
        run: python scripts/schedule_posts.py
