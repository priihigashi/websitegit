name: Schedule Posts — Social Media

on:
  schedule:
    - cron: '0 1 * * *'  # 9:00 PM ET (UTC-4 = 01:00 UTC next day)
  workflow_dispatch:

jobs:
  schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth pytz

      - name: Schedule posts via Buffer
        env:
          SHEETS_TOKEN:      ${{ secrets.SHEETS_TOKEN }}
          CONTENT_SHEET_ID:  ${{ secrets.CONTENT_SHEET_ID }}
          BUFFER_API_KEY:    ${{ secrets.BUFFER_API_KEY_EXP04092027 }}
        run: python scripts/schedule_posts.py

      - name: Update Build Tracker
        if: always()
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
        run: |
          pip install pytz -q
          python3 scripts/build_tracker_writer.py \
            --workflow schedule-posts.yml \
            --status "${{ job.status }}"
