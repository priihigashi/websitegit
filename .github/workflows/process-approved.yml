name: Process Approved Posts — Social Media

on:
  schedule:
    - cron: '45 0 * * *'    # 8:45 PM ET (UTC-4) = 00:45 UTC
  workflow_dispatch:

jobs:
  schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r scripts/requirements_content.txt
      - name: Write Google credentials
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
        run: |
          mkdir -p /tmp/oak_park_creds
          echo "$SHEETS_TOKEN" > /tmp/oak_park_creds/sheets_token.json
      - name: Process approved posts
        env:
          SHEETS_TOKEN_PATH: /tmp/oak_park_creds/sheets_token.json
          SHEET_ID: ${{ secrets.CONTENT_SHEET_ID }}
        run: python scripts/process_approved_cloud.py

      - name: Update Build Tracker
        if: always()
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
        run: |
          pip install pytz -q
          python3 scripts/build_tracker_writer.py \
            --workflow process-approved.yml \
            --status "${{ job.status }}"
