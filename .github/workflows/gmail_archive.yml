name: Gmail Inbox Auto-Archive (daily)

# Gmail filters can't archive on a timer — this runs daily at 5PM ET and
# archives (removes INBOX label) messages labeled as automation output
# whose age exceeds the per-label threshold.
#
# Labels drained:
#   🤖 Automation/Captures       → archived after 6h
#   🤖 Automation/Daily Digests  → archived after 24h (1d)
#   🤖 Automation/Notifications  → archived after 24h (1d)
#   google ads help              → archived after 24h (1d)
#   🔒 Security                  → archived after 7d
#
# Note: Gmail's search `older_than` supports d/m/y only — no hours. For 6h we
# use server-side `newer_than:1d` + client-side epoch check.

on:
  schedule:
    - cron: '0 21 * * *'   # 21:00 UTC = 5 PM ET (DST) / 4 PM ET (standard). Close enough.
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Archive labeled inbox messages by age
        run: |
          pip install --quiet google-auth google-auth-httplib2 google-api-python-client
          python - << 'PYEOF'
          import os, json, time
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build

          raw = os.environ.get("SHEETS_TOKEN", "")
          if not raw:
              print("ERROR: SHEETS_TOKEN secret not set.")
              exit(1)

          td = json.loads(raw)
          creds = Credentials(
              token=td.get("token"),
              refresh_token=td.get("refresh_token"),
              token_uri=td.get("token_uri", "https://oauth2.googleapis.com/token"),
              client_id=td.get("client_id"),
              client_secret=td.get("client_secret"),
              scopes=td.get("scopes"),
          )
          if not creds.valid and creds.refresh_token:
              creds.refresh(Request())

          gmail = build("gmail", "v1", credentials=creds)

          # Resolve label name -> id
          labels = {l["name"]: l["id"] for l in gmail.users().labels().list(userId="me").execute().get("labels", [])}

          # Each rule: (label name, min age in hours)
          RULES = [
              ("🤖 Automation/Captures",      6),
              ("🤖 Automation/Daily Digests", 24),
              ("🤖 Automation/Notifications", 24),
              ("google ads help",             24),
              ("🔒 Security",                 24 * 7),
          ]

          now_ms = int(time.time() * 1000)
          total_archived = 0

          for label_name, min_age_hours in RULES:
              lid = labels.get(label_name)
              if not lid:
                  print(f"  skip: label '{label_name}' not found")
                  continue

              cutoff_ms = now_ms - (min_age_hours * 3600 * 1000)
              # Fetch all messages with this label that are still in inbox
              archived = 0
              scanned = 0
              page_token = None
              while True:
                  resp = gmail.users().messages().list(
                      userId="me",
                      labelIds=[lid, "INBOX"],
                      maxResults=500,
                      pageToken=page_token,
                  ).execute()
                  msgs = resp.get("messages", [])
                  for m in msgs:
                      scanned += 1
                      meta = gmail.users().messages().get(
                          userId="me", id=m["id"], format="metadata", metadataHeaders=[]
                      ).execute()
                      internal = int(meta.get("internalDate", "0"))
                      if internal and internal < cutoff_ms:
                          gmail.users().messages().modify(
                              userId="me",
                              id=m["id"],
                              body={"removeLabelIds": ["INBOX"]},
                          ).execute()
                          archived += 1
                  page_token = resp.get("nextPageToken")
                  if not page_token:
                      break
              print(f"  {label_name}: scanned {scanned}, archived {archived} (> {min_age_hours}h)")
              total_archived += archived

          print(f"\nTotal archived: {total_archived}")
          PYEOF
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
