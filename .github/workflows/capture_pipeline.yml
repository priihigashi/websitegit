name: Capture Pipeline v2

# ─── HOW TO USE ────────────────────────────────────────────────────────────
# Anyone can trigger this workflow manually from GitHub Actions.
#
# Steps:
#   1. Go to: github.com/priihigashi/oak-park-ai-hub
#      → Actions → Capture Pipeline v2 → Run workflow
#
#   2. Fill in the fields:
#      • url       → Paste the reel link (Instagram, TikTok, or YouTube)
#      • project   → Choose the niche, or leave as "auto" to let the
#                    system detect it from the content automatically.
#                    Options: auto | brazil | opc | usa | ugc | stocks | higashi | book
#      • story_id  → Leave blank — it will be generated automatically.
#                    Only fill in if adding to an existing story (e.g. BCI-002)
#      • notes     → Optional extra context to help the pipeline, e.g.:
#                    "verify who this person is" or "check presidential statements"
#      • credits   → Check this box to fetch the creator's name/handle
#                    for caption attribution
#
#   3. Click "Run workflow"
#
# What happens next (automatic):
#   → Downloads the reel audio
#   → Transcribes with Whisper
#   → Classifies niche via Claude
#   → Saves to Inspiration Library (Google Sheets)
#   → Creates a task in Google Calendar with content brief
# ───────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL of the reel (Instagram, TikTok, YouTube)"
        required: true
        type: string
      project:
        description: "auto = let runner classify (default). Or pick a niche explicitly."
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - book
          - brazil
          - bias
          - opc
          - ugc
          - usa
          - stocks
          - higashi
          - unrouted
      story_id:
        description: "Story ID e.g. BCI-002 or NWS-001 (blank = auto-generate)"
        required: false
        type: string
        default: ""
      notes:
        description: "Extra context (e.g. verify who this is, check presidential statements)"
        required: false
        type: string
        default: ""
      credits:
        description: "Fetch creator info via Apify for caption attribution"
        required: false
        type: boolean
        default: false

jobs:
  capture:
    name: "${{ inputs.project }} — ${{ inputs.story_id || 'auto-id' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout oak-park-ai-hub
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ffmpeg (required by yt-dlp)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install \
            yt-dlp \
            openai \
            anthropic \
            google-generativeai \
            faster-whisper \
            gspread \
            google-auth \
            google-api-python-client \
            python-dotenv \
            requests \
            youtube-transcript-api \
            instaloader \
            pytubefix

      - name: Run capture pipeline
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_KEY_4_CONTENT: ${{ secrets.CLAUDE_KEY_4_CONTENT }}
          SHEETS_TOKEN:      ${{ secrets.SHEETS_TOKEN }}
          GITHUB_TOKEN:     ${{ github.token }}
          APIFY_API_KEY:    ${{ secrets.APIFY_API_KEY }}
          SERP_API_KEY:     ${{ secrets.SERP_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.PRI_OP_SUPADATA_API_KEY || secrets.SUPADATA_API_KEY }}
          YOUTUBE_API_KEY:  ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          PRI_OP_GMAIL_APP_PASSWORD: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
          PRI_OP_YT_COOKIES: ${{ secrets.PRI_OP_YT_COOKIES }}
          PRI_OP_IG_COOKIES: ${{ secrets.PRI_OP_IG_COOKIES }}
        run: |
          CMD="python scripts/capture/capture_pipeline.py \"${{ inputs.url }}\" --project ${{ inputs.project }}"

          if [ -n "${{ inputs.story_id }}" ]; then
            CMD="$CMD --story-id \"${{ inputs.story_id }}\""
          fi

          if [ -n "${{ inputs.notes }}" ]; then
            CMD="$CMD --notes \"${{ inputs.notes }}\""
          fi

          if [ "${{ inputs.credits }}" = "true" ]; then
            CMD="$CMD --credits"
          fi

          echo "Running: $CMD"
          eval $CMD

      - name: Upload transcripts and analysis
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "capture-${{ inputs.story_id || github.run_id }}-${{ inputs.project }}"
          path: transcripts/
          retention-days: 30

      - name: Send failure notification (realtime, compact thread)
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: priscila@oakpark-construction.com
          password: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
          to: priscila@oakpark-construction.com
          from: Oak Park AI <priscila@oakpark-construction.com>
          subject: "CAPTURE FAILED — Realtime Alert"
          body: |
            A capture run failed.

            URL: ${{ inputs.url }}
            Project: ${{ inputs.project }}
            Story ID: ${{ inputs.story_id || 'auto' }}
            Run number: ${{ github.run_number }}

            Check the run logs:
            https://github.com/priihigashi/oak-park-ai-hub/actions/runs/${{ github.run_id }}

      - name: Update Build Tracker
        if: always()
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
        run: |
          pip install pytz -q
          python3 scripts/build_tracker_writer.py \
            --workflow capture_pipeline.yml \
            --status "${{ job.status }}"
