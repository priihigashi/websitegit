name: Capture Pipeline v2

# ─── HOW TO USE ────────────────────────────────────────────────────────────
# Anyone can trigger this workflow manually from GitHub Actions.
#
# Steps:
#   1. Go to: github.com/priihigashi/oak-park-ai-hub
#      → Actions → Capture Pipeline v2 → Run workflow
#
#   2. Fill in the fields:
#      • url       → Paste the reel link (Instagram, TikTok, or YouTube)
#      • project   → Choose the niche, or leave as "auto" to let the
#                    system detect it from the content automatically.
#                    Options: auto | brazil | opc | usa | ugc | stocks | higashi | book
#      • story_id  → Leave blank — it will be generated automatically.
#                    Only fill in if adding to an existing story (e.g. BCI-002)
#      • notes     → Optional extra context to help the pipeline, e.g.:
#                    "verify who this person is" or "check presidential statements"
#      • credits   → Check this box to fetch the creator's name/handle
#                    for caption attribution
#
#   3. Click "Run workflow"
#
# What happens next (automatic):
#   → Downloads the reel audio
#   → Transcribes with Whisper
#   → Classifies niche via Claude
#   → Saves to Inspiration Library (Google Sheets)
#   → Creates a task in Google Calendar with content brief
# ───────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL of the reel (Instagram, TikTok, YouTube)"
        required: true
        type: string
      project:
        description: "auto = let runner classify (default). Or pick a niche explicitly."
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - book
          - brazil
          - opc
          - ugc
          - usa
          - stocks
          - higashi
          - unrouted
      story_id:
        description: "Story ID e.g. BCI-002 or NWS-001 (blank = auto-generate)"
        required: false
        type: string
        default: ""
      notes:
        description: "Extra context (e.g. verify who this is, check presidential statements)"
        required: false
        type: string
        default: ""
      credits:
        description: "Fetch creator info via Apify for caption attribution"
        required: false
        type: boolean
        default: false
