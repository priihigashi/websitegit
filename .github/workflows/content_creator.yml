name: Content Creator — Daily Carousel Pipeline

on:
  schedule:
    - cron: '30 6 1,4,7,10,13,16,19,22,25,28 * *'  # 2:30 AM ET every 3 days — budget cap $10/wk (2026-05-05)
  workflow_dispatch:
    inputs:
      count_opc:
        description: 'Number of OPC topics'
        default: '3'
      count_brazil:
        description: 'Number of Brazil topics'
        default: '2'
      count_usa:
        description: 'Number of USA topics (not wired yet — pending template)'
        default: '2'
      manual_mode:
        description: 'Manual mode: build direct topic/template (bypasses queue)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      manual_niche:
        description: 'Manual niche'
        required: false
        default: 'opc'
        type: choice
        options:
          - 'opc'
          - 'brazil'
          - 'usa'
      manual_topic:
        description: 'Manual topic text'
        required: false
        default: ''
      manual_brief:
        description: 'Brief for manual build (Google Doc URL or plain text). Overrides auto-brief in manual mode.'
        required: false
        default: ''
      manual_template:
        description: 'Manual template (single). Use "motion" to re-render Ken Burns on existing PNGs without rebuilding carousel.'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'native'
          - 'tip'
          - 'progress'
          - 'illustrated'
          - 'cutout'
          - 'dados-ou-agenda'
          - 'motion'
      manual_template_set:
        description: 'Template batch mode'
        required: false
        default: 'single'
        type: choice
        options:
          - 'single'
          - 'all'
      test_output_folder:
        description: 'Override Drive folder ID for all uploads (test runs)'
        required: false
        default: ''
      review_only:
        description: 'Run carousel reviewer only; skip content generation'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      review_drive_folders:
        description: 'Comma-separated Drive folder links/IDs for review_only mode'
        required: false
        default: ''
      review_only_folder_id:
        description: 'Single Drive folder ID or link — auto-enables review_only mode (shortcut for review_drive_folders)'
        required: false
        default: ''
      kling_approve:
        description: 'Activate Kling AI animation for cover slides missing real clips (1=yes, leave blank=no)'
        required: false
        default: ''
      opc_slide_planner:
        description: 'Phase 8 SH-OPC-SMART-SLIDE-PICKER — enable smart per-slide template picker for OPC. Off by default. Set to "1" only for controlled cutover tests.'
        required: false
        default: ''
        type: string
      slide_purpose_pilot:
        description: 'SH-137 — pilot: enable slide_purpose generation + reviewer/auditor purpose-awareness. Default OFF on cron. Manual-only test flag during pilot. See doc 1BDg9ORg.'
        required: false
        default: '0'
        type: choice
        options:
          - '0'
          - '1'

jobs:
  create-content:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
      CLAUDE_KEY_4_CONTENT: ${{ secrets.CLAUDE_KEY_4_CONTENT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
      PRI_OP_REPLICATE_API_KEY: ${{ secrets.PRI_OP_REPLICATE_API_KEY }}
      PRI_OP_INFSH_API_KEY: ${{ secrets.PRI_OP_INFSH_API_KEY }}
      PRI_OP_GMAIL_APP_PASSWORD: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CONTENT_SHEET_ID: '1IrFrCNGVIF7cvAr9cIuAXvCtUR_-eQN1mdCpHXpfbcU'
      BRAZIL_TEMPLATES_FOLDER: '1gDOjtW_X-_jWtu94pffbDaUsw6VGCKuA'
      GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
      VISION_API_KEY: ${{ secrets.VISION_API_KEY }}
      SLIDE_INSET_PX: ${{ vars.SLIDE_INSET_PX || '40' }}
      # Opt-in: change '' to 'true' to enable DALL-E 3 fallback (Brazil/USA only; OPC is real-photos-only)
      USE_DALLE: ''
      # Phase 8 — SH-OPC-SMART-SLIDE-PICKER smart slide planner. Default ON on cron (SH-126, 2026-05-08).
      # Manual runs can override via workflow_dispatch input opc_slide_planner=0 to fall back to legacy planner.
      OPC_SLIDE_PLANNER_ENABLED: ${{ github.event.inputs.opc_slide_planner || '1' }}
      # SH-137 — slide_purpose pilot. Default OFF (cron stays unchanged). Manual-only flag for pilot tests.
      # Spec: doc 1BDg9ORggVsWH-WQPBx4iQnYNu2UA5vHWcuNRkXCY5v8 (v3 FINAL).
      # OPC purposes: hook|cost|teach|apply|sources. News purposes: claim|number|evidence|opposition|implication|sources.
      SLIDE_PURPOSE_PILOT: ${{ github.event.inputs.slide_purpose_pilot || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-api-python-client pytz requests yt-dlp pytubefix pillow anthropic openai google-generativeai
          npm install playwright
          npx playwright install chromium --with-deps
          cd scripts/remotion && npm install

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Pre-flight credit check (SH-021)
        env:
          CLAUDE_KEY_4_CONTENT:      ${{ secrets.CLAUDE_KEY_4_CONTENT }}
          OPENAI_API_KEY:            ${{ secrets.OPENAI_API_KEY }}
          SHEETS_TOKEN:              ${{ secrets.SHEETS_TOKEN }}
          PRI_OP_GMAIL_APP_PASSWORD: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
          GH_RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          python scripts/self_heal/credit_monitor.py --primary-only || {
            EXIT=$?
            if [ $EXIT -ge 2 ]; then
              echo "❌ All primary AI providers down — aborting pipeline to save CI budget"
              exit 1
            fi
            echo "⚠️ Provider degraded — proceeding with fallbacks"
          }

      - name: Print NONNEGOTIABLES (locked rules audit trail)
        run: |
          echo "===== NONNEGOTIABLES.md ====="
          cat NONNEGOTIABLES.md
          echo "============================="

      - name: Run content creator
        if: ${{ github.event.inputs.review_only != 'true' && github.event.inputs.review_only_folder_id == '' }}
        working-directory: scripts/content_creator
        run: python main.py
        env:
          WORK_DIR: /tmp/content_creator_run
          EXPORT_SCRIPT: ${{ github.workspace }}/scripts/content_creator/export_variants.js
          MANUAL_MODE: ${{ github.event.inputs.manual_mode || 'false' }}
          MANUAL_NICHE: ${{ github.event.inputs.manual_niche || '' }}
          MANUAL_TOPIC: ${{ github.event.inputs.manual_topic || '' }}
          MANUAL_BRIEF: ${{ github.event.inputs.manual_brief || '' }}
          MANUAL_TEMPLATE: ${{ github.event.inputs.manual_template || 'auto' }}
          MANUAL_TEMPLATE_SET: ${{ github.event.inputs.manual_template_set || 'single' }}
          TEST_OUTPUT_FOLDER: ${{ github.event.inputs.test_output_folder || '' }}
          KLING_APPROVE: ${{ github.event.inputs.kling_approve || '' }}
          KLING_API_KEY: ${{ secrets.KLING_API_KEY }}

      - name: Run carousel reviewer (post-build quality check)
        if: always()
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          ALERT_EMAIL: priscila@oakpark-construction.com
          WORK_DIR: /tmp/content_creator_run
          REVIEW_STRICT: 'true'
        run: |
          # SH-011: review_only_folder_id merges into REVIEW_DRIVE_FOLDERS automatically
          FOLDER_ID="${{ github.event.inputs.review_only_folder_id }}"
          BASE_FOLDERS="${{ github.event.inputs.review_drive_folders }}"
          if [ -n "$FOLDER_ID" ]; then
            export REVIEW_DRIVE_FOLDERS="${BASE_FOLDERS:+$BASE_FOLDERS,}$FOLDER_ID"
          else
            export REVIEW_DRIVE_FOLDERS="$BASE_FOLDERS"
          fi
          RESULTS_FILE=/tmp/content_creator_run/results.json
          if [ -f "$RESULTS_FILE" ]; then
            export CONTENT_CREATOR_RUN=$(cat "$RESULTS_FILE")
          else
            export CONTENT_CREATOR_RUN='[]'
          fi
          python scripts/content_creator/carousel_reviewer.py

      - name: AI Content Audit (3 agents)
        if: ${{ always() && github.event.inputs.review_only != 'true' && github.event.inputs.review_only_folder_id == '' }}
        env:
          CLAUDE_KEY_4_CONTENT: ${{ secrets.CLAUDE_KEY_4_CONTENT }}
          ALERT_EMAIL: priscila@oakpark-construction.com
          WORK_DIR: /tmp/content_creator_run
        run: |
          RESULTS_FILE=/tmp/content_creator_run/results.json
          if [ -f "$RESULTS_FILE" ]; then
            export CONTENT_CREATOR_RUN=$(cat "$RESULTS_FILE")
          else
            export CONTENT_CREATOR_RUN='[]'
          fi
          python scripts/content/content_auditor.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-creator-output
          path: /tmp/content_creator_run/
          retention-days: 7

      - name: Update Build Tracker
        if: always()
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
        run: |
          pip install pytz -q
          python3 scripts/build_tracker_writer.py \
            --workflow content_creator.yml \
            --status "${{ job.status }}"

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'send_alert_email',
              client_payload: {
                subject: '🔴 Content Creator FAILED — attempt 1',
                body: `Daily carousel pipeline failed on first attempt.\n\nRun: ${run_url}\n\nThe retry job will run automatically. If retry also fails, a second alert will be sent.`
              }
            });

  retry-on-failure:
    needs: create-content
    if: needs.create-content.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
      CLAUDE_KEY_4_CONTENT: ${{ secrets.CLAUDE_KEY_4_CONTENT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
      PRI_OP_REPLICATE_API_KEY: ${{ secrets.PRI_OP_REPLICATE_API_KEY }}
      PRI_OP_INFSH_API_KEY: ${{ secrets.PRI_OP_INFSH_API_KEY }}
      PRI_OP_GMAIL_APP_PASSWORD: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CONTENT_SHEET_ID: '1IrFrCNGVIF7cvAr9cIuAXvCtUR_-eQN1mdCpHXpfbcU'
      BRAZIL_TEMPLATES_FOLDER: '1gDOjtW_X-_jWtu94pffbDaUsw6VGCKuA'
      CONTENT_CREATOR_RETRY: 'true'
      GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
      VISION_API_KEY: ${{ secrets.VISION_API_KEY }}
      SLIDE_INSET_PX: ${{ vars.SLIDE_INSET_PX || '40' }}
      # Opt-in: change '' to 'true' to enable DALL-E 3 fallback (Brazil/USA only; OPC is real-photos-only)
      USE_DALLE: ''
      # Phase 8 — SH-OPC-SMART-SLIDE-PICKER smart slide planner. Default ON on cron (SH-126, 2026-05-08).
      # Manual runs can override via workflow_dispatch input opc_slide_planner=0 to fall back to legacy planner.
      OPC_SLIDE_PLANNER_ENABLED: ${{ github.event.inputs.opc_slide_planner || '1' }}
      # SH-137 — slide_purpose pilot. Default OFF (cron stays unchanged). Manual-only flag for pilot tests.
      # Spec: doc 1BDg9ORggVsWH-WQPBx4iQnYNu2UA5vHWcuNRkXCY5v8 (v3 FINAL).
      # OPC purposes: hook|cost|teach|apply|sources. News purposes: claim|number|evidence|opposition|implication|sources.
      SLIDE_PURPOSE_PILOT: ${{ github.event.inputs.slide_purpose_pilot || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-api-python-client pytz requests yt-dlp pytubefix pillow anthropic openai google-generativeai
          npm install playwright
          npx playwright install chromium --with-deps
          cd scripts/remotion && npm install

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Retry content creator
        if: ${{ github.event.inputs.review_only != 'true' && github.event.inputs.review_only_folder_id == '' }}
        working-directory: scripts/content_creator
        run: python main.py
        env:
          WORK_DIR: /tmp/content_creator_run
          EXPORT_SCRIPT: ${{ github.workspace }}/scripts/content_creator/export_variants.js
          MANUAL_MODE: ${{ github.event.inputs.manual_mode || 'false' }}
          MANUAL_NICHE: ${{ github.event.inputs.manual_niche || '' }}
          MANUAL_TOPIC: ${{ github.event.inputs.manual_topic || '' }}
          MANUAL_BRIEF: ${{ github.event.inputs.manual_brief || '' }}
          MANUAL_TEMPLATE: ${{ github.event.inputs.manual_template || 'auto' }}
          MANUAL_TEMPLATE_SET: ${{ github.event.inputs.manual_template_set || 'single' }}
          TEST_OUTPUT_FOLDER: ${{ github.event.inputs.test_output_folder || '' }}
          KLING_APPROVE: ${{ github.event.inputs.kling_approve || '' }}

      - name: Run carousel reviewer (post-build quality check)
        if: always()
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          ALERT_EMAIL: priscila@oakpark-construction.com
          WORK_DIR: /tmp/content_creator_run
          REVIEW_STRICT: 'true'
        run: |
          # SH-011: review_only_folder_id merges into REVIEW_DRIVE_FOLDERS automatically
          FOLDER_ID="${{ github.event.inputs.review_only_folder_id }}"
          BASE_FOLDERS="${{ github.event.inputs.review_drive_folders }}"
          if [ -n "$FOLDER_ID" ]; then
            export REVIEW_DRIVE_FOLDERS="${BASE_FOLDERS:+$BASE_FOLDERS,}$FOLDER_ID"
          else
            export REVIEW_DRIVE_FOLDERS="$BASE_FOLDERS"
          fi
          RESULTS_FILE=/tmp/content_creator_run/results.json
          if [ -f "$RESULTS_FILE" ]; then
            export CONTENT_CREATOR_RUN=$(cat "$RESULTS_FILE")
          else
            export CONTENT_CREATOR_RUN='[]'
          fi
          python scripts/content_creator/carousel_reviewer.py

      - name: AI Content Audit (3 agents)
        if: ${{ always() && github.event.inputs.review_only != 'true' && github.event.inputs.review_only_folder_id == '' }}
        env:
          CLAUDE_KEY_4_CONTENT: ${{ secrets.CLAUDE_KEY_4_CONTENT }}
          ALERT_EMAIL: priscila@oakpark-construction.com
          WORK_DIR: /tmp/content_creator_run
        run: |
          RESULTS_FILE=/tmp/content_creator_run/results.json
          if [ -f "$RESULTS_FILE" ]; then
            export CONTENT_CREATOR_RUN=$(cat "$RESULTS_FILE")
          else
            export CONTENT_CREATOR_RUN='[]'
          fi
          python scripts/content/content_auditor.py

      - name: Upload retry artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-creator-retry-output
          path: /tmp/content_creator_run/
          retention-days: 7

      - name: Alert if retry also failed
        if: failure()
        run: |
          python3 - <<'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText
          run_url = f"https://github.com/priihigashi/oak-park-ai-hub/actions/runs/${{ github.run_id }}"
          msg = MIMEText(f"Content Creator pipeline failed TWICE today.\n\nRetry run: {run_url}\n\nCheck the logs and fix before tomorrow's run.")
          msg['Subject'] = '🚨 Content Creator FAILED TWICE — manual fix needed'
          msg['From'] = 'priscila@oakpark-construction.com'
          msg['To'] = 'priscila@oakpark-construction.com'
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login('priscila@oakpark-construction.com', os.environ['PRI_OP_GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          print("Double-failure alert sent")
          PYEOF
