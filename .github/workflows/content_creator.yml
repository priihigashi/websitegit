name: Content Creator — Daily Carousel Pipeline

on:
  schedule:
    - cron: '30 6 * * *'  # 2:30 AM ET (06:30 UTC) — normal schedule
  workflow_dispatch:
    inputs:
      count_opc:
        description: 'Number of OPC topics'
        default: '3'
      count_brazil:
        description: 'Number of Brazil topics'
        default: '2'
      count_usa:
        description: 'Number of USA topics (not wired yet — pending template)'
        default: '2'

jobs:
  create-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PRI_OP_GMAIL_APP_PASSWORD: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CONTENT_SHEET_ID: '1IrFrCNGVIF7cvAr9cIuAXvCtUR_-eQN1mdCpHXpfbcU'
      BRAZIL_TEMPLATES_FOLDER: '1gDOjtW_X-_jWtu94pffbDaUsw6VGCKuA'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-api-python-client pytz
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run content creator
        working-directory: scripts/content_creator
        run: python main.py
        env:
          WORK_DIR: /tmp/content_creator_run
          EXPORT_SCRIPT: ${{ github.workspace }}/scripts/content_creator/export_variants.js

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-creator-output
          path: /tmp/content_creator_run/
          retention-days: 7
