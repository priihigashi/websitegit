name: Test Buffer Token (one-shot diagnostic)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY_EXP04092027 }}
    steps:
      - name: Test Buffer GraphQL API
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json

          key = os.environ.get("BUFFER_API_KEY", "")
          if not key:
              print("❌ BUFFER_API_KEY is empty")
              exit(1)

          print(f"  Token length : {len(key)} chars")
          print(f"  Token prefix : {key[:6]}...")

          query = '{ account { organizations { id name channels { id service name } } } }'
          payload = json.dumps({"query": query}).encode()
          req = urllib.request.Request(
              "https://api.buffer.com",
              data=payload,
              headers={
                  "Authorization": f"Bearer {key}",
                  "Content-Type": "application/json",
                  "User-Agent": "BufferClient/1.0 (automation)",
                  "Accept": "application/json",
              })
          try:
              resp = json.loads(urllib.request.urlopen(req, timeout=15).read())
              if "errors" in resp:
                  print(f"  ❌ GraphQL errors: {resp['errors']}")
              else:
                  orgs = resp.get("data", {}).get("account", {}).get("organizations", [])
                  for org in orgs:
                      channels = [f"{c['service']}({c['id'][:8]}...)" for c in org.get("channels", [])]
                      print(f"  ✅ Org: {org['name']} — channels: {channels}")
          except urllib.error.HTTPError as e:
              body = e.read().decode()[:300]
              print(f"  ❌ HTTP {e.code}: {body}")
          except Exception as e:
              print(f"  ❌ Error: {e}")
          EOF

      - name: Test with curl (different HTTP client)
        run: |
          echo "--- curl test ---"
          STATUS=$(curl -s -o /tmp/buf_resp.txt -w "%{http_code}" \
            -X POST https://api.buffer.com \
            -H "Authorization: Bearer $BUFFER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "User-Agent: BufferClient/1.0" \
            -d '{"query":"{ account { organizations { id name } } }"}')
          echo "HTTP status: $STATUS"
          head -c 300 /tmp/buf_resp.txt
