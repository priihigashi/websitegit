name: Test Buffer Token (one-shot diagnostic)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY_EXP04092027 }}
    steps:
      - name: Introspect Buffer schema — SchedulingType enum + Channel query
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json

          key = os.environ.get("BUFFER_API_KEY", "")

          def gql(query, variables=None):
              payload = json.dumps({"query": query, "variables": variables or {}}).encode()
              req = urllib.request.Request(
                  "https://api.buffer.com", data=payload,
                  headers={"Authorization": f"Bearer {key}",
                           "Content-Type": "application/json",
                           "User-Agent": "BufferClient/1.0",
                           "Accept": "application/json"})
              try:
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except urllib.error.HTTPError as e:
                  return {"error": e.read().decode()[:500]}

          # 1. SchedulingType enum values
          print("=== SchedulingType enum ===")
          r = gql('{ __type(name: "SchedulingType") { enumValues { name } } }')
          print(json.dumps(r.get("data", r), indent=2))

          # 2. CreatePostInput fields
          print("\n=== CreatePostInput fields ===")
          r = gql('{ __type(name: "CreatePostInput") { inputFields { name type { name kind ofType { name } } } } }')
          fields = r.get("data", {}).get("__type", {}).get("inputFields", [])
          for f in fields:
              t = f["type"]
              type_name = t.get("name") or (t.get("ofType") or {}).get("name")
              print(f"  {f['name']:25} {type_name}")

          # 3. Channel query structure
          print("\n=== Query.channel args ===")
          r = gql('{ __schema { queryType { fields { name args { name type { name kind ofType { name } } } } } } }')
          fields = r.get("data", {}).get("__schema", {}).get("queryType", {}).get("fields", [])
          for f in fields:
              if "channel" in f["name"].lower():
                  args = [(a["name"], (a["type"].get("name") or (a["type"].get("ofType") or {}).get("name"))) for a in f.get("args", [])]
                  print(f"  {f['name']}: {args}")

          # 4. ShareMode enum values
          print("\n=== ShareMode enum ===")
          r = gql('{ __type(name: "ShareMode") { enumValues { name } } }')
          print(json.dumps(r.get("data", r), indent=2))

          # 5. ChannelInput fields
          print("\n=== ChannelInput fields ===")
          r = gql('{ __type(name: "ChannelInput") { inputFields { name type { name kind ofType { name } } } } }')
          fields = r.get("data", {}).get("__type", {}).get("inputFields", [])
          for f in fields:
              t = f["type"]
              type_name = t.get("name") or (t.get("ofType") or {}).get("name")
              print(f"  {f['name']:25} {type_name}")

          # 6. PostInputMetaData fields — find Instagram post type field
          print("\n=== PostInputMetaData fields ===")
          r = gql('{ __type(name: "PostInputMetaData") { inputFields { name type { name kind ofType { name } } } } }')
          fields = (r.get("data") or {}).get("__type", {}).get("inputFields", [])
          if fields:
              for f in fields:
                  t = f["type"]
                  type_name = t.get("name") or (t.get("ofType") or {}).get("name")
                  print(f"  {f['name']:25} {type_name}")
          else:
              print("  (no fields found — type may be named differently)")

          # 7. Instagram channel lookup (the channelId we need for CreatePost)
          print("\n=== Instagram channel lookup ===")
          r = gql('{ account { organizations { id name channels { id service serviceUsername name } } } }')
          ig_channel = None
          orgs = (r.get("data", {}) or {}).get("account", {}).get("organizations", []) or []
          for org in orgs:
              for ch in org.get("channels", []) or []:
                  if "instagram" in (ch.get("service") or "").lower():
                      ig_channel = ch
                      print(f"  Org: {org.get('name')} ({org.get('id')})")
                      print(f"  Channel: id={ch.get('id')} service={ch.get('service')} "
                            f"username={ch.get('serviceUsername')} name={ch.get('name')}")
                      break
              if ig_channel:
                  break
          if not ig_channel:
              print("  ❌ No Instagram channel found — list all channels found:")
              for org in orgs:
                  for ch in org.get("channels", []) or []:
                      print(f"    {ch}")

          # 8. DRY-RUN: CreatePost mutation as draft (won't go to live queue)
          if ig_channel:
              print("\n=== CreatePost DRY-RUN (saveToDraft=true) ===")
              mutation = """
              mutation CreatePostDryRun($input: CreatePostInput!) {
                createPost(input: $input) {
                  __typename
                  ... on PostActionSuccess { post { id dueAt status text } }
                  ... on MutationError { message }
                }
              }
              """
              test_input = {
                  "text": "TEST — automation dry-run, will be deleted",
                  "channelId": ig_channel["id"],
                  "schedulingType": "automatic",
                  "mode": "addToQueue",
                  "saveToDraft": True,
                  "assets": {"images": [{"url": "https://picsum.photos/seed/buffertest/1080/1350"}]},
              }
              print(f"  Input: {json.dumps(test_input, indent=2)}")
              resp = gql(mutation, {"input": test_input})
              print(f"  Response: {json.dumps(resp, indent=2)}")
              if resp.get("error"):
                  print("  ⚠️ Mutation rejected — see error body above")
              elif "errors" in resp:
                  print(f"  ⚠️ GraphQL errors: {resp['errors']}")
              else:
                  result = resp.get("data", {}).get("createPost", {}) or {}
                  tn = result.get("__typename", "?")
                  if tn == "PostActionSuccess":
                      print(f"  ✅ SUCCESS — post id={result.get('post', {}).get('id')}")
                      print(f"  ⚠️ Delete the test draft from Buffer dashboard after verifying")
                  elif tn == "MutationError":
                      print(f"  ❌ MutationError: {result.get('message')}")
                  else:
                      print(f"  ⚠️ Unknown typename: {tn}")
          EOF
