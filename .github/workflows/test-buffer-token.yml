name: Test Buffer Token (one-shot diagnostic)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY_EXP04092027 }}
    steps:
      - name: Test Buffer GraphQL API + list channels
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json

          key = os.environ.get("BUFFER_API_KEY", "")
          query = '{ account { organizations { id name channels { id service name } } } }'
          payload = json.dumps({"query": query}).encode()
          req = urllib.request.Request(
              "https://api.buffer.com", data=payload,
              headers={"Authorization": f"Bearer {key}",
                       "Content-Type": "application/json",
                       "User-Agent": "BufferClient/1.0 (automation)",
                       "Accept": "application/json"})
          try:
              resp = json.loads(urllib.request.urlopen(req, timeout=15).read())
              orgs = resp.get("data", {}).get("account", {}).get("organizations", [])
              for org in orgs:
                  print(f"Org: {org['name']} ({org['id']})")
                  for c in org.get("channels", []):
                      print(f"  {c['service']:12} | {c['name']:30} | id={c['id']}")
          except urllib.error.HTTPError as e:
              print(f"❌ HTTP {e.code}: {e.read().decode()[:300]}")
          EOF
