name: Test Buffer Token (one-shot diagnostic)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY_EXP04092027 }}
    steps:
      - name: Introspect Buffer schema — SchedulingType enum + Channel query
        run: |
          python3 - <<'EOF'
          import os, urllib.request, urllib.error, json

          key = os.environ.get("BUFFER_API_KEY", "")

          def gql(query, variables=None):
              payload = json.dumps({"query": query, "variables": variables or {}}).encode()
              req = urllib.request.Request(
                  "https://api.buffer.com", data=payload,
                  headers={"Authorization": f"Bearer {key}",
                           "Content-Type": "application/json",
                           "User-Agent": "BufferClient/1.0",
                           "Accept": "application/json"})
              try:
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except urllib.error.HTTPError as e:
                  return {"http_error": e.code, "error": e.read().decode()[:1000]}

          def type_name(t):
              if not t:
                  return "None"
              if t.get("name"):
                  return t["name"]
              inner = t.get("ofType")
              return type_name(inner) if inner else "None"

          def show(title, payload, max_chars=4000):
              print(f"\n=== {title} ===")
              text = json.dumps(payload, indent=2)
              print(text[:max_chars])
              if len(text) > max_chars:
                  print(f"... truncated ({len(text)} chars total)")

          # 1. SchedulingType enum values
          print("=== SchedulingType enum ===")
          r = gql('{ __type(name: "SchedulingType") { enumValues { name } } }')
          print(json.dumps(r.get("data", r), indent=2))

          # 2. CreatePostInput fields
          print("\n=== CreatePostInput fields ===")
          r = gql('{ __type(name: "CreatePostInput") { inputFields { name type { name kind ofType { name } } } } }')
          fields = r.get("data", {}).get("__type", {}).get("inputFields", [])
          for f in fields:
              t = f["type"]
              t_name = t.get("name") or (t.get("ofType") or {}).get("name")
              print(f"  {f['name']:25} {t_name}")

          # 3. Channel query structure
          print("\n=== Query.channel args ===")
          r = gql('{ __schema { queryType { fields { name args { name type { name kind ofType { name } } } } } } }')
          fields = r.get("data", {}).get("__schema", {}).get("queryType", {}).get("fields", [])
          for f in fields:
              if "channel" in f["name"].lower():
                  args = [(a["name"], (a["type"].get("name") or (a["type"].get("ofType") or {}).get("name"))) for a in f.get("args", [])]
                  print(f"  {f['name']}: {args}")

          print("\n=== Query fields containing account/org/channel/user/viewer ===")
          for f in fields:
              name = f["name"].lower()
              if any(k in name for k in ("account", "org", "channel", "user", "viewer")):
                  args = [(a["name"], type_name(a.get("type"))) for a in f.get("args", [])]
                  print(f"  {f['name']}: {args} -> {type_name(f.get('type'))}")

          # 4. ShareMode enum values
          print("\n=== ShareMode enum ===")
          r = gql('{ __type(name: "ShareMode") { enumValues { name } } }')
          print(json.dumps(r.get("data", r), indent=2))

          # 5. ChannelInput fields
          print("\n=== ChannelInput fields ===")
          for type_to_probe in ("Account", "Organization", "Channel", "ChannelInput", "ChannelsInput", "ChannelsResponse", "ChannelConnection"):
              print(f"\n--- {type_to_probe} fields ---")
              r = gql('query($name:String!){ __type(name:$name) { kind fields { name type { name kind ofType { name kind ofType { name } } } args { name type { name kind ofType { name } } } } inputFields { name type { name kind ofType { name kind ofType { name } } } } } }', {"name": type_to_probe})
              typ = (r.get("data") or {}).get("__type")
              if not typ:
                  print(json.dumps(r, indent=2)[:2000])
                  continue
              entries = typ.get("fields") or typ.get("inputFields") or []
              for f in entries:
                  args = [(a["name"], type_name(a.get("type"))) for a in f.get("args", [])]
                  print(f"  {f['name']:30} {type_name(f.get('type'))} args={args}")

          # 6. PostInputMetaData fields — find Instagram post type field
          print("\n=== PostInputMetaData fields ===")
          r = gql('{ __type(name: "PostInputMetaData") { inputFields { name type { name kind ofType { name } } } } }')
          fields = (r.get("data") or {}).get("__type", {}).get("inputFields", [])
          if fields:
              for f in fields:
                  t = f["type"]
                  t_name = t.get("name") or (t.get("ofType") or {}).get("name")
                  print(f"  {f['name']:25} {t_name}")
          else:
              print("  (no fields found — type may be named differently)")

          print("\n=== Instagram metadata + asset input fields ===")
          for type_to_probe in (
              "InstagramPostMetadataInput",
              "InstagramPostType",
              "InstagramPostMetadataType",
              "PostType",
              "AssetInput",
              "ImageAssetInput",
          ):
              show(
                  type_to_probe,
                  gql('query($name:String!){ __type(name:$name) { kind enumValues { name } inputFields { name type { name kind ofType { name kind ofType { name } } } } } }',
                      {"name": type_to_probe}),
                  max_chars=2500,
              )

          # 7. Instagram channel lookup (the channelId we need for CreatePost)
          channel_fields = """
            id
            service
            serviceId
            name
            displayName
            descriptor
            isDisconnected
            isLocked
            isQueuePaused
            type
            externalLink
          """
          def channel_text(ch):
              return " ".join(str(ch.get(k) or "") for k in (
                  "service", "serviceId", "name", "displayName", "descriptor", "type", "externalLink"
              )).lower()

          print("\n=== Instagram channel lookup ===")
          r = gql(f'{{ account {{ organizations {{ id name channels {{ {channel_fields} }} }} }} }}')
          show("Raw account.organizations.channels response", r)
          ig_channel = None
          orgs = (r.get("data", {}) or {}).get("account", {}).get("organizations", []) or []
          print(f"  Organization count: {len(orgs)}")
          for org in orgs:
              for ch in org.get("channels", []) or []:
                  if "instagram" in channel_text(ch):
                      ig_channel = ch
                      print(f"  Org: {org.get('name')} ({org.get('id')})")
                      print(f"  Channel: id={ch.get('id')} service={ch.get('service')} "
                            f"displayName={ch.get('displayName')} name={ch.get('name')} "
                            f"disconnected={ch.get('isDisconnected')}")
                      break
              if ig_channel:
                  break
          if not ig_channel:
              print("  ❌ No Instagram channel found — list all channels found:")
              for org in orgs:
                  for ch in org.get("channels", []) or []:
                      print(f"    {ch}")

          print("\n=== Alternate channel queries ===")
          alternate_queries = {
              "account_only": "{ account { id email } }",
              "account_orgs_only": "{ account { organizations { id name } } }",
              "channels_empty_input": f"{{ channels(input: {{}}) {{ {channel_fields} }} }}",
              "channels_no_input": f"{{ channels {{ {channel_fields} }} }}",
          }
          for label, query in alternate_queries.items():
              show(label, gql(query), max_chars=2500)

          print("\n=== Channel query by discovered org ids ===")
          for org in orgs:
              org_id = org.get("id")
              if not org_id:
                  continue
              for query in (
                  f'query($id: OrganizationId!){{ channels(input:{{ organizationId:$id }}) {{ {channel_fields} }} }}',
                  f'query($id: ID!){{ channels(input:{{ organizationId:$id }}) {{ {channel_fields} }} }}',
              ):
                  show(f"channels for org {org_id}", gql(query, {"id": org_id}), max_chars=2500)

          # 8. DRY-RUN: CreatePost mutation as draft (won't go to live queue)
          if ig_channel:
              print("\n=== CreatePost DRY-RUN (saveToDraft=true) ===")
              mutation = """
              mutation CreatePostDryRun($input: CreatePostInput!) {
                createPost(input: $input) {
                  __typename
                  ... on PostActionSuccess { post { id dueAt status text } }
                  ... on MutationError { message }
                }
              }
              """
              base_input = {
                  "text": "TEST — automation dry-run, saveToDraft=true",
                  "channelId": ig_channel["id"],
                  "schedulingType": "automatic",
                  "mode": "addToQueue",
                  "saveToDraft": True,
              }
              attempts = {
                  "legacy_assets_metadata_type_post_share_feed": {
                      **base_input,
                      "metadata": {"instagram": {"type": "post", "shouldShareToFeed": True}},
                      "assets": {"images": [{"url": "https://picsum.photos/seed/buffertest/1080/1350"}]},
                  },
                  "asset_list_metadata_type_post_share_feed": {
                      **base_input,
                      "metadata": {"instagram": {"type": "post", "shouldShareToFeed": True}},
                      "assets": [{"image": {"url": "https://picsum.photos/seed/buffertest2/1080/1350"}}],
                  },
                  "asset_list_metadata_type_carousel_share_feed": {
                      **base_input,
                      "metadata": {"instagram": {"type": "carousel", "shouldShareToFeed": True}},
                      "assets": [
                          {"image": {"url": "https://picsum.photos/seed/buffertest3a/1080/1350"}},
                          {"image": {"url": "https://picsum.photos/seed/buffertest3b/1080/1350"}},
                      ],
                  },
              }
              for label, test_input in attempts.items():
                  print(f"\n--- Dry-run attempt: {label} ---")
                  print(f"  Input: {json.dumps(test_input, indent=2)}")
                  resp = gql(mutation, {"input": test_input})
                  print(f"  Response: {json.dumps(resp, indent=2)}")
                  if resp.get("error"):
                      print("  ⚠️ Mutation rejected — see error body above")
                  elif "errors" in resp:
                      print(f"  ⚠️ GraphQL errors: {resp['errors']}")
                  else:
                      result = resp.get("data", {}).get("createPost", {}) or {}
                      tn = result.get("__typename", "?")
                      if tn == "PostActionSuccess":
                          print(f"  ✅ SUCCESS — post id={result.get('post', {}).get('id')}")
                          print(f"  ⚠️ Delete the test draft from Buffer dashboard after verifying")
                          break
                      elif tn == "MutationError":
                          print(f"  ❌ MutationError: {result.get('message')}")
                      else:
                          print(f"  ⚠️ Unknown typename: {tn}")
          EOF
