name: Test Buffer Token (one-shot diagnostic)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY_EXP04092027 }}
    steps:
      - name: Test Buffer v1 + GraphQL APIs
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json

          key = os.environ.get("BUFFER_API_KEY", "")
          if not key:
              print("❌ BUFFER_API_KEY is empty")
              exit(1)

          print(f"  Token length : {len(key)} chars")
          print(f"  Token prefix : {key[:6]}...  (first 6 chars only)")

          # ── Test 1: v1 REST API ──────────────────────────────────────────
          print("\n--- Test 1: Buffer v1 REST API ---")
          try:
              url = f"https://api.bufferapp.com/1/profiles.json?access_token={key}"
              resp = urllib.request.urlopen(url, timeout=15)
              data = json.loads(resp.read())
              print(f"  ✅ v1 API OK — profiles: {[p.get('service') for p in data]}")
          except urllib.error.HTTPError as e:
              body = e.read().decode()[:200]
              print(f"  ❌ v1 HTTP {e.code}: {body}")

          # ── Test 2: GraphQL API ──────────────────────────────────────────
          print("\n--- Test 2: Buffer GraphQL API ---")
          query = '{ organization(id: "68c0c6eeecf9076f387d68dd") { id name channels { id service } } }'
          payload = json.dumps({"query": query}).encode()
          for endpoint in ["https://graph.buffer.com/graphql", "https://api.buffer.com/graphql"]:
              try:
                  req = urllib.request.Request(
                      endpoint, data=payload,
                      headers={"Authorization": f"Bearer {key}", "Content-Type": "application/json"})
                  resp = urllib.request.urlopen(req, timeout=15)
                  data = json.loads(resp.read())
                  print(f"  ✅ GraphQL OK at {endpoint}")
                  print(f"  Response: {json.dumps(data)[:400]}")
                  break
              except urllib.error.HTTPError as e:
                  body = e.read().decode()[:200]
                  print(f"  ❌ {endpoint} — HTTP {e.code}: {body}")
              except Exception as e:
                  print(f"  ❌ {endpoint} — {e}")
          EOF
