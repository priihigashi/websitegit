name: Test Buffer Token (one-shot diagnostic)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY_EXP04092027 }}
    steps:
      - name: Test Buffer token
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json

          key = os.environ.get("BUFFER_API_KEY", "")
          if not key:
              print("❌ BUFFER_API_KEY is empty — secret not set or not mapped")
              exit(1)

          print(f"  Token length : {len(key)} chars")
          print(f"  Token prefix : {key[:6]}...  (first 6 chars only)")
          print(f"  Token suffix : ...{key[-4:]}  (last 4 chars only)")

          url = f"https://api.bufferapp.com/1/profiles.json?access_token={key}"
          try:
              resp = urllib.request.urlopen(url, timeout=15)
              data = json.loads(resp.read())
              services = [p.get("formatted_service", p.get("service", "?")) for p in data]
              print(f"  ✅ Buffer auth OK — profiles: {services}")
          except urllib.error.HTTPError as e:
              print(f"  ❌ HTTP {e.code}: {e.reason}")
              body = e.read().decode()[:300]
              print(f"  Response body: {body}")
          except Exception as e:
              print(f"  ❌ Error: {e}")
          EOF
