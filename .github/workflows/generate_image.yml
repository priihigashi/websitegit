name: Generate Image (inference.sh)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Image prompt'
        required: true
        type: string
      filename:
        description: 'Output filename (without extension)'
        required: true
        default: 'generated_image'
        type: string
      aspect_ratio:
        description: 'Aspect ratio'
        required: false
        default: '3:4'
        type: choice
        options: ['1:1','3:4','4:3','16:9','9:16']
      drive_folder_id:
        description: 'Drive folder ID — defaults to Properties/Completely Generated'
        required: false
        default: '1Md5BRAfWTUBOtl_LvdTAyBhat8ZfXamN'
        type: string
      reference_image_url:
        description: 'Optional: URL of reference image (for background edits)'
        required: false
        default: ''
        type: string

# FOLDER IDs (Higashi Drive — AI Images Created):
# Root:                          1ZInVJlr7mDnz3nogI6ED7rZI64gvCPhh
# Properties/Completely Gen:     1Md5BRAfWTUBOtl_LvdTAyBhat8ZfXamN  <- DEFAULT
# Properties/Edited with AI:     1hpfLTWZpYBrP9jm_0McQkQwUJm7jqCF4
# People/Alexandra/AI Generated: 1WCW29iHlftMOSdu0qKLga1nwwlUw962K
# People/Alexandra/Originals:    1F3n-8MS2Q6YZxbYfa5-Edf6GWk-uPwoV

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate image via inference.sh
        id: generate
        env:
          PRI_OP_INFSH_API_KEY: ${{ secrets.PRI_OP_INFSH_API_KEY }}
          PROMPT: ${{ inputs.prompt }}
          ASPECT_RATIO: ${{ inputs.aspect_ratio }}
          REFERENCE_IMAGE_URL: ${{ inputs.reference_image_url }}
        run: |
          pip install -q requests
          python3 << 'PYEOF'
          import os, json, requests, time

          COMPLETED = 10
          api_key = os.environ['PRI_OP_INFSH_API_KEY']
          headers = {"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"}

          input_data = {
              "prompt": os.environ['PROMPT'],
              "aspect_ratio": os.environ['ASPECT_RATIO'],
              "resolution": "2K"
          }
          ref_url = os.environ.get('REFERENCE_IMAGE_URL', '').strip()
          if ref_url:
              input_data["images"] = [ref_url]
              print(f"Using reference image: {ref_url}")

          payload = {"app": "google/gemini-3-1-flash-image-preview", "input": input_data}
          resp = requests.post("https://api.inference.sh/apps/run", json=payload, headers=headers, timeout=120)
          raw = resp.json()
          data = raw.get('data', raw)
          task_id = data.get('id')
          print(f"Task ID: {task_id} | Status: {data.get('status')}")

          image_url = None
          for i in range(60):
              time.sleep(10)
              poll = requests.get(f"https://api.inference.sh/tasks/{task_id}", headers=headers, timeout=30)
              pdata = poll.json().get('data', poll.json())
              status = pdata.get('status')
              output = pdata.get('output')
              print(f"Poll {i+1}: status={status}")

              if status == COMPLETED:
                  if isinstance(output, dict):
                      imgs = output.get('images', output.get('image', []))
                      if isinstance(imgs, list) and imgs:
                          img = imgs[0]
                          image_url = img.get('url', img) if isinstance(img, dict) else img
                      elif isinstance(imgs, str):
                          image_url = imgs
                      if not image_url:
                          for key in ['url', 'image_url', 'image']:
                              if key in output:
                                  image_url = output[key]; break
                  elif isinstance(output, list) and output:
                      item = output[0]
                      image_url = item.get('url', item) if isinstance(item, dict) else item
                  elif isinstance(output, str) and output.startswith('http'):
                      image_url = output
                  break
              elif status in {11, 12}:
                  print(f"Task failed/cancelled — status {status}")
                  exit(1)

          print(f"Image URL: {image_url}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"image_url={image_url or ''}\n")
          PYEOF

      - name: Download image
        if: steps.generate.outputs.image_url != ''
        run: |
          curl -L "${{ steps.generate.outputs.image_url }}" -o /tmp/${{ inputs.filename }}.jpg
          echo "Downloaded: $(du -k /tmp/${{ inputs.filename }}.jpg | cut -f1)KB"

      - name: Upload to Google Drive
        if: steps.generate.outputs.image_url != '' && inputs.drive_folder_id != ''
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          DRIVE_FOLDER_ID: ${{ inputs.drive_folder_id }}
          FILENAME: ${{ inputs.filename }}
        run: |
          pip install -q google-auth google-auth-oauthlib google-api-python-client
          python3 << 'EOF'
          import os, json, sys
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from google.auth.exceptions import TransportError
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          token_data = json.loads(os.environ['SHEETS_TOKEN'])
          creds = Credentials(
              token=token_data.get('token'),
              refresh_token=token_data.get('refresh_token'),
              token_uri=token_data.get('token_uri', 'https://oauth2.googleapis.com/token'),
              client_id=token_data.get('client_id'),
              client_secret=token_data.get('client_secret'),
              scopes=token_data.get('scopes')
          )
          if not creds.valid:
              try:
                  creds.refresh(Request())
              except TransportError as e:
                  print(f"ERROR: OAuth refresh failed — {e}")
                  sys.exit(1)

          drive = build('drive', 'v3', credentials=creds)
          filename = os.environ['FILENAME'] + '.jpg'
          result = drive.files().create(
              body={'name': filename, 'parents': [os.environ['DRIVE_FOLDER_ID']]},
              media_body=MediaFileUpload(f'/tmp/{filename}', mimetype='image/jpeg'),
              supportsAllDrives=True, fields='id,name,webViewLink'
          ).execute()
          if not result.get('id'):
              print("ERROR: Drive upload returned no file ID")
              sys.exit(1)
          print(f"Saved: {result['name']}")
          print(f"Link: {result['webViewLink']}")
          EOF

      - name: Summary
        if: always()
        run: |
          echo "## Image Generation (Nano Banana 2)" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** ${{ inputs.filename }}.jpg" >> $GITHUB_STEP_SUMMARY
          echo "- **Folder ID:** ${{ inputs.drive_folder_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image URL:** ${{ steps.generate.outputs.image_url }}" >> $GITHUB_STEP_SUMMARY
