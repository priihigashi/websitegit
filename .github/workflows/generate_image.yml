name: Generate Image (inference.sh)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Image prompt'
        required: true
        type: string
      filename:
        description: 'Output filename (without extension)'
        required: true
        default: 'generated_image'
        type: string
      aspect_ratio:
        description: 'Aspect ratio'
        required: false
        default: '3:4'
        type: choice
        options: ['1:1','3:4','4:3','16:9','9:16']
      drive_folder_id:
        description: 'Google Drive folder ID to save image'
        required: false
        default: '1CKWTojSg2uQmXjNnKlAaSBCTfxtSQBvH'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate image via inference.sh
        id: generate
        env:
          PRI_OP_INFSH_API_KEY: ${{ secrets.PRI_OP_INFSH_API_KEY }}
          PROMPT: ${{ inputs.prompt }}
          ASPECT_RATIO: ${{ inputs.aspect_ratio }}
        run: |
          pip install -q requests
          python3 << 'PYEOF'
          import os, json, requests, time

          api_key = os.environ['PRI_OP_INFSH_API_KEY']
          headers = {"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"}

          # Step 1: Submit job
          payload = {
              "app": "google/gemini-3-1-flash-image-preview",
              "input": {
                  "prompt": os.environ['PROMPT'],
                  "aspect_ratio": os.environ['ASPECT_RATIO'],
                  "resolution": "2K"
              }
          }
          resp = requests.post("https://api.inference.sh/apps/run", json=payload, headers=headers, timeout=120)
          print(f"Submit status: {resp.status_code}")
          raw = resp.json()
          print(f"Top keys: {list(raw.keys())}")

          # Unwrap data envelope
          data = raw.get('data', raw)
          print(f"Data keys: {list(data.keys()) if isinstance(data, dict) else type(data)}")
          print(f"Data preview: {json.dumps(data)[:600]}")

          # Get task ID for polling
          task_id = data.get('id') or data.get('task_id') or raw.get('id')
          image_url = None

          # Check if already done
          def extract_url(d):
              out = d.get('output', {})
              if isinstance(out, dict):
                  imgs = out.get('images', [])
                  if imgs:
                      img = imgs[0]
                      return img.get('url', img) if isinstance(img, dict) else img
              elif isinstance(out, list) and out:
                  return out[0]
              for key in ['image_url', 'url', 'image']:
                  if key in d and d[key]:
                      return d[key]
              return None

          image_url = extract_url(data)

          # Poll if async
          if not image_url and task_id:
              print(f"Polling task {task_id}...")
              for i in range(30):
                  time.sleep(10)
                  poll = requests.get(f"https://api.inference.sh/tasks/{task_id}", headers=headers, timeout=30)
                  praw = poll.json()
                  pdata = praw.get('data', praw)
                  status = pdata.get('status', praw.get('status', ''))
                  print(f"Poll {i+1}: status={status} keys={list(pdata.keys()) if isinstance(pdata,dict) else '?'}")
                  if status in ('completed', 'succeeded', 'success', 'done'):
                      image_url = extract_url(pdata)
                      if image_url:
                          break
                  elif status in ('failed', 'error', 'cancelled'):
                      print(f"Task failed: {json.dumps(pdata)[:300]}")
                      exit(1)

          print(f"Final image URL: {image_url}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"image_url={image_url or ''}\n")
          PYEOF

      - name: Download image
        if: steps.generate.outputs.image_url != ''
        run: |
          curl -L "${{ steps.generate.outputs.image_url }}" -o /tmp/${{ inputs.filename }}.jpg
          echo "Downloaded: $(du -k /tmp/${{ inputs.filename }}.jpg | cut -f1)KB"

      - name: Upload to Google Drive
        if: steps.generate.outputs.image_url != '' && inputs.drive_folder_id != ''
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: |
          pip install -q google-auth google-api-python-client
          python3 << 'EOF'
          import os, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          creds = service_account.Credentials.from_service_account_info(
              json.loads(os.environ['GOOGLE_SA_KEY']),
              scopes=['https://www.googleapis.com/auth/drive'])
          drive = build('drive', 'v3', credentials=creds)

          filename = '${{ inputs.filename }}.jpg'
          result = drive.files().create(
              body={'name': filename, 'parents': ['${{ inputs.drive_folder_id }}']},
              media_body=MediaFileUpload(f'/tmp/{filename}', mimetype='image/jpeg'),
              supportsAllDrives=True, fields='id,name,webViewLink'
          ).execute()
          print(f"Saved to Drive: {result['name']}")
          print(f"Link: {result['webViewLink']}")
          EOF

      - name: Summary
        if: always()
        run: |
          echo "## Image Generation" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** ${{ inputs.filename }}.jpg" >> $GITHUB_STEP_SUMMARY
          echo "- **Image URL:** ${{ steps.generate.outputs.image_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Drive folder:** ${{ inputs.drive_folder_id }}" >> $GITHUB_STEP_SUMMARY
