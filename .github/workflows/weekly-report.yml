name: Weekly Report Generator

on:
  schedule:
    - cron: "0 13 * * 1"   # Every Monday at 9AM ET (UTC-4 EDT)
  workflow_dispatch:        # manual trigger — run any time to get current week snapshot

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytz

      - name: Generate Weekly Report
        env:
          SHEETS_TOKEN:              ${{ secrets.SHEETS_TOKEN }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          CONTENT_SHEET_ID:          ${{ secrets.CONTENT_SHEET_ID }}
          WEEKLY_REPORTS_FOLDER_ID:  "1gETNHiEtbkjYRimJOccDR9zssWSM4vNM"
          NOTIFY_EMAIL:              "priscila@oakpark-construction.com"
        run: python scripts/weekly_report.py

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `❌ Weekly Report failed — ${new Date().toLocaleDateString('en-US', {timeZone:'America/New_York'})}`,
              body:  `The weekly report generator failed.\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ["automation", "bug"],
            });
