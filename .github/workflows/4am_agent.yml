name: 4AM Content Agent

on:
  schedule:
    - cron: "0 8 */2 * *"   # every other day 4 AM ET (cost cut from daily — 2026-05-07)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic openai google-generativeai replicate google-auth google-auth-httplib2 google-api-python-client requests pytz beautifulsoup4 yt-dlp

      - name: Check yt-dlp cookie freshness
        id: cookie_check
        env:
          PRI_OP_YT_COOKIES: ${{ secrets.PRI_OP_YT_COOKIES }}
        continue-on-error: true
        run: |
          if [ -n "$PRI_OP_YT_COOKIES" ]; then
            python3 -c 'import os,base64,pathlib; b=os.environ.get("PRI_OP_YT_COOKIES",""); p=pathlib.Path("/tmp/yt_cookies_check.txt"); exec("try:\n  p.write_bytes(base64.b64decode(b))\nexcept Exception:\n  p.write_text(b)") if b else None'
            COOKIE_ARGS="--cookies /tmp/yt_cookies_check.txt"
          else
            COOKIE_ARGS=""
          fi
          yt-dlp --simulate --quiet --no-warnings $COOKIE_ARGS \
            "https://www.youtube.com/watch?v=jNQXAC9IVRw" > /tmp/ytdlp_out.txt 2>&1
          EXIT=$?
          if [ $EXIT -ne 0 ] && grep -qiE "sign.in|not a bot|cookie|403|forbidden" /tmp/ytdlp_out.txt; then
            echo "cookie_expired=true" >> $GITHUB_OUTPUT
            echo "  [cookie_check] yt-dlp bot/cookie error detected"
          else
            echo "cookie_expired=false" >> $GITHUB_OUTPUT
            echo "  [cookie_check] cookies OK (exit=$EXIT)"
          fi

      - name: Alert - yt-dlp cookies may be expired
        if: steps.cookie_check.outputs.cookie_expired == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: priscila@oakpark-construction.com
          password: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
          subject: "[ACTION NEEDED] yt-dlp YouTube cookies may be expired"
          to: priscila@oakpark-construction.com
          from: Oak Park AI <priscila@oakpark-construction.com>
          body: |
            The 4AM agent detected that your yt-dlp YouTube cookies may be expired.

            HOW TO REFRESH (takes ~5 minutes):

            1. Open Safari on your Mac and confirm you are logged in to YouTube.

            2. Open Terminal and run:
               yt-dlp --cookies-from-browser safari --cookies /tmp/fresh_yt_cookies.txt --skip-download "https://www.youtube.com/watch?v=jNQXAC9IVRw"

            3. Encode to base64 and copy to clipboard:
               base64 -i /tmp/fresh_yt_cookies.txt | tr -d '\n' | pbcopy

            4. Update the GitHub secret:
               https://github.com/priihigashi/oak-park-ai-hub/settings/secrets/actions
               Click PRI_OP_YT_COOKIES → Update secret → paste → Save.

            5. Reply DONE. The next agent run will re-check automatically.

            Run: https://github.com/priihigashi/oak-park-ai-hub/actions/runs/${{ github.run_id }}

      - name: Restore CLAUDE.md for mirror step
        env:
          CLAUDE_MD_CONTENT: ${{ secrets.CLAUDE_MD_CONTENT }}
        run: |
          mkdir -p ~/.claude
          printf '%s' "$CLAUDE_MD_CONTENT" > ~/.claude/CLAUDE.md

      - name: Retry content_creator if last run failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          last=$(gh api "repos/${{ github.repository }}/actions/workflows/content_creator.yml/runs?per_page=1" --jq '.workflow_runs[0] | {id, conclusion, created_at, head_sha}')
          echo "Last content_creator run: $last"
          conclusion=$(echo "$last" | jq -r '.conclusion // "pending"')
          last_sha=$(echo "$last" | jq -r '.head_sha // ""')
          head_sha=$(git rev-parse HEAD)
          if [ "$conclusion" = "failure" ] || [ "$conclusion" = "cancelled" ] || [ "$last_sha" != "$head_sha" ]; then
            echo "Last content_creator: conclusion=$conclusion last_sha=$last_sha head_sha=$head_sha → retrying"
            gh workflow run content_creator.yml --repo ${{ github.repository }} --ref main || echo "(retry dispatch failed — continuing)"
          else
            echo "Last content_creator: conclusion=$conclusion — no retry needed"
          fi
        continue-on-error: true

      - name: Run 4AM Content Agent
        env:
          APIFY_API_KEY:       ${{ secrets.APIFY_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:     ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_API_KEY:     ${{ secrets.YOUTUBE_API_KEY }}
          CLAUDE_KEY_4_CONTENT:   ${{ secrets.CLAUDE_KEY_4_CONTENT }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          PRI_OP_REPLICATE_API_KEY: ${{ secrets.PRI_OP_REPLICATE_API_KEY }}
          SHEETS_TOKEN:        ${{ secrets.SHEETS_TOKEN }}
          BUFFER_API_KEY:      ${{ secrets.BUFFER_API_KEY_EXP04092027 }}
          CONTENT_SHEET_ID:         '1IrFrCNGVIF7cvAr9cIuAXvCtUR_-eQN1mdCpHXpfbcU'
          BRAZIL_TEMPLATES_FOLDER:  '1gDOjtW_X-_jWtu94pffbDaUsw6VGCKuA'
          NTFY_TOPIC:                ${{ secrets.NTFY_TOPIC }}
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          PRI_OP_GMAIL_APP_PASSWORD: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
        working-directory: scripts/4am_agent
        run: python main.py

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: priscila@oakpark-construction.com
          password: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
          subject: "4AM Agent ran OK - run ${{ github.run_number }}"
          to: priscila@oakpark-construction.com
          from: priscila@oakpark-construction.com
          body: "4AM content agent ran successfully. Check Runs Log tab in Ideas & Inbox.\nRun: https://github.com/priihigashi/oak-park-ai-hub/actions/runs/${{ github.run_id }}"

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: priscila@oakpark-construction.com
          password: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
          subject: "4AM Agent FAILED - run ${{ github.run_number }}"
          to: priscila@oakpark-construction.com
          from: priscila@oakpark-construction.com
          body: "The 4AM content agent FAILED. View run: https://github.com/priihigashi/oak-park-ai-hub/actions/runs/${{ github.run_id }}\nCheck the Runs Log tab in Ideas & Inbox for details."

      - name: Notify failure via GitHub Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: '4AM Agent failed - ' + new Date().toLocaleDateString('en-US', { timeZone: 'America/New_York' }),
              body:  'The 4AM content agent failed.\n\nView run: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + '\n\nCheck the Runs Log tab in the spreadsheet for details.',
              labels: ['automation', 'bug'],
            });

      - name: Update Build Tracker
        if: always()
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
        run: |
          pip install pytz -q
          python3 scripts/build_tracker_writer.py \
            --workflow 4am_agent.yml \
            --status "${{ job.status }}"
