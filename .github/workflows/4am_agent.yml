name: 4AM Content Agent

on:
  schedule:
    - cron: "0 8 * * *"   # 4 AM ET (EDT = UTC-4, Mar–Nov). Change to 0 9 * * * in winter (EST = UTC-5).
  workflow_dispatch:        # manual trigger — also activated by saying "run the 4AM agent now"

permissions:
  contents: write           # needed for pattern_learner to create skill files

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic google-auth google-auth-httplib2 google-api-python-client requests pytz

      - name: Run 4AM Content Agent
        env:
          APIFY_API_KEY:     ${{ secrets.APIFY_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SA_KEY:     ${{ secrets.GOOGLE_SA_KEY }}
          NTFY_TOPIC:        ${{ secrets.NTFY_TOPIC }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        working-directory: scripts/4am_agent
        run: python main.py

      - name: Notify failure via GitHub Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `❌ 4AM Agent failed — ${new Date().toLocaleDateString('en-US', { timeZone: 'America/New_York' })}`,
              body:  `The 4AM content agent failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\nCheck the Runs Log tab in the spreadsheet for details.`,
              labels: ["automation", "bug"],
            });
