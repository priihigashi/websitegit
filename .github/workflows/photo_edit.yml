name: Photo Edit — AI Enhancement

# PRIMARY workflow — trigger from phone via GitHub Actions UI
# Accepts a Drive file ID, direct image URL, or Drive folder ID (batch)
# Runs all 4 AI tools (or one specific tool) — NB2 FIRST
# Results → flat in destination folder: {stem}_nb2.jpg / _openai.png / _gemini.jpg / _replicate.png
# Re-run safe: existing files for same stem are moved to old/ before new ones are written

on:
  workflow_dispatch:
    inputs:
      image_source:
        description: 'Drive file ID OR direct image URL. Leave blank when using folder_id.'
        required: false
        default: ''
        type: string
      folder_id:
        description: 'Drive folder ID for batch (all images in folder). Overrides image_source.'
        required: false
        default: ''
        type: string
      tool:
        description: 'Which AI to use'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - nb2
          - openai
          - gemini
          - replicate
      original_filename:
        description: 'Label for this run (e.g. kitchen-before, walnut-deck)'
        required: false
        default: 'photo'
        type: string
      destination_folder_id:
        description: 'Drive folder ID for results (leave blank for default)'
        required: false
        default: '1WdxoKIOFIa0E9eREe-uKLDgD4tLVegTw'
        type: string

# ── FOLDER IDs ──────────────────────────────────────────────────────────────
# Marketing > Image Creation > Enhanced Photos: 1WdxoKIOFIa0E9eREe-uKLDgD4tLVegTw
# ────────────────────────────────────────────────────────────────────────────

jobs:
  enhance:
    runs-on: ubuntu-latest

    steps:
      # ── INSTALL DEPS ────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -q openai pillow google-auth google-auth-oauthlib google-api-python-client google-genai replicate inferencesh

      # ── MAIN: download → enhance → upload flat → archive old ───────────────
      - name: Process all images
        id: process
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.PRI_OP_REPLICATE_API_KEY }}
          INFSH_KEY: ${{ secrets.PRI_OP_INFSH_API_KEY }}
          IMAGE_SOURCE: ${{ inputs.image_source }}
          FOLDER_ID: ${{ inputs.folder_id }}
          TOOL: ${{ inputs.tool }}
          LABEL: ${{ inputs.original_filename }}
          DEST_FOLDER: ${{ inputs.destination_folder_id }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, sys, base64, io, mimetypes, urllib.request
          from datetime import datetime, timezone
          from pathlib import Path
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload, MediaFileUpload

          # ── Auth ────────────────────────────────────────────────────────────
          token_data = json.loads(os.environ.get("SHEETS_TOKEN", "{}"))
          creds = Credentials(
              token=token_data.get("token"),
              refresh_token=token_data.get("refresh_token"),
              token_uri=token_data.get("token_uri", "https://oauth2.googleapis.com/token"),
              client_id=token_data.get("client_id"),
              client_secret=token_data.get("client_secret"),
              scopes=token_data.get("scopes"),
          )
          if not creds.valid:
              creds.refresh(Request())
          drive = build("drive", "v3", credentials=creds)

          # ── Config ──────────────────────────────────────────────────────────
          label      = (os.environ.get("LABEL") or "photo").strip()
          tool       = (os.environ.get("TOOL") or "all").strip()
          dest       = (os.environ.get("DEST_FOLDER") or "1WdxoKIOFIa0E9eREe-uKLDgD4tLVegTw").strip()
          src_input  = (os.environ.get("IMAGE_SOURCE") or "").strip()
          folder_id  = (os.environ.get("FOLDER_ID") or "").strip()
          run_ts     = datetime.now(timezone.utc).isoformat()
          run_date   = datetime.now().strftime("%Y-%m-%d")

          # Tool order: NB2 first, then OpenAI, Gemini, Replicate
          do_nb2       = tool in ("all", "nb2")
          do_openai    = tool in ("all", "openai")
          do_gemini    = tool in ("all", "gemini")
          do_replicate = tool in ("all", "replicate")

          # ── Build file list ──────────────────────────────────────────────────
          sources = []
          if folder_id:
              print("Batch mode: listing folder " + folder_id)
              resp = drive.files().list(
                  q="'" + folder_id + "' in parents and (mimeType contains 'image/')",
                  supportsAllDrives=True, includeItemsFromAllDrives=True,
                  fields="files(id,name)",
              ).execute()
              for f in resp.get("files", []):
                  stem = Path(f["name"]).stem[:40]
                  sources.append((f["id"], stem))
              print("Found " + str(len(sources)) + " image(s) in folder")
          elif src_input:
              m = re.search(r"/d/([a-zA-Z0-9_-]+)", src_input) or re.search(r"id=([a-zA-Z0-9_-]+)", src_input)
              file_id = m.group(1) if m else src_input
              sources.append((file_id, label))
          else:
              print("ERROR: no image_source or folder_id provided")
              sys.exit(1)

          if not sources:
              print("ERROR: no images found")
              sys.exit(1)

          # ── Get or create old/ folder in dest ───────────────────────────────
          old_resp = drive.files().list(
              q="'" + dest + "' in parents and name='old' and mimeType='application/vnd.google-apps.folder'",
              supportsAllDrives=True, includeItemsFromAllDrives=True,
              fields="files(id)"
          ).execute()
          old_folder_id = old_resp["files"][0]["id"] if old_resp.get("files") else None

          # ── Prompts (4K ultra-realistic — updated 2026-04-29) ───────────────
          FULL_PROMPT = (
              "SCENE CONSISTENCY IS MANDATORY. Preserve the exact same scene, composition, camera angle, "
              "crop, geometry, object positions, textures, perspective lines, and mirror/window reflections. "
              "Do not recreate, reimagine, or redesign any part of the photo. "
              "Enhance existing pixels only with minor photographic adjustments. "
              "Allowed adjustments only: exposure balancing, white balance correction, subtle contrast, "
              "subtle color correction, highlight recovery, gentle shadow lift, mild dehaze, mild noise reduction, "
              "light natural sharpening, lens glare cleanup, and mild perspective/vertical alignment correction. "
              "Remove lens grease glare/starburst halos and ghost reflections around lights while keeping fixture positions unchanged. "
              "Use clean window-driven lighting balance, neutral color rendering (not yellow), cozy warm-morning feel. "
              "If perspective correction is needed, keep it subtle and preserve field of view with minimal crop. "
              "Do not add/remove/move/replace anything: furniture, decor, plants, rugs, fixtures, doors, windows, "
              "appliances, wall art, sky content, pool water features, or landscaping. "
              "Do not alter materials, finishes, room dimensions, reflections, or architectural details. "
              "Do not stage, declutter, hallucinate, beautify beyond reality, or apply CGI/plastic look. "
              "Photorealistic high-resolution 4K output, natural light, contemporary high-end Brazilian residential feel. "
              "Think Lightroom/Photoshop grade only, not image generation. "
              "Output one enhanced image with maximum fidelity to the original photo."
          )
          STAGING_PROMPT_BY_STEM = {
              # Urbanova: bare mattress room needs listing-ready bedding only.
              "32_quarto_solteiro": (
                  "EXCEPTION FOR THIS IMAGE ONLY: keep the same bed frame in the exact same position and size, "
                  "and add simple neutral fitted bedsheets plus 2-4 neutral pillows. "
                  "Do not change any other object, camera angle, lighting direction, walls, floor, windows, or decor."
              ),
              # Pool touch-up exceptions: cleanliness/clarity improvements without geometry changes.
              "09_piscina": (
                  "EXCEPTION FOR THIS IMAGE ONLY: improve pool water cleanliness and clarity only; "
                  "no changes to pool shape, edges, deck, reflections, landscaping, or architecture."
              ),
              "15_piscina_noturna": (
                  "EXCEPTION FOR THIS IMAGE ONLY: improve pool water cleanliness and clarity only; "
                  "no changes to pool shape, edges, deck, reflections, landscaping, or architecture."
              ),
              "05_video_8573": (
                  "EXCEPTION FOR THIS IMAGE ONLY: improve pool water cleanliness and clarity only; "
                  "no changes to pool shape, edges, deck, reflections, landscaping, or architecture."
              ),
              "07_video_8576": (
                  "EXCEPTION FOR THIS IMAGE ONLY: improve pool water cleanliness and clarity only; "
                  "no changes to pool shape, edges, deck, reflections, landscaping, or architecture."
              ),
              "16_area_gourmet": (
                  "EXCEPTION FOR THIS IMAGE ONLY: remove visible hose near pool if present, "
                  "and improve pool water cleanliness/clarity while preserving scene geometry and all architecture."
              ),
              "01_fachada": (
                  "EXCEPTION FOR THIS IMAGE ONLY: ultra-minor cleanup only. Remove small weeds/leaves/green residue on paver joints and sidewalk edges only. "
                  "Preserve EXACT paver texture, grout lines, wall texture, door design/details, facade finishes, and all materials with zero redesign. "
                  "Do NOT smooth, repaint, retexture, or re-model any surface. "
                  "If perspective correction is used, keep it extremely subtle with minimal crop."
              ),
              "11_fachada_2": (
                  "EXCEPTION FOR THIS IMAGE ONLY: create a tasteful early-evening/night ambience while preserving exact structure and composition; "
                  "keep architecture identical, with natural realistic exterior lighting and no fake CGI look."
              ),
              "04_sala_jantar": (
                  "EXCEPTION FOR THIS IMAGE ONLY: brighten exposure and lift shadows moderately while keeping natural contrast and realistic highlights."
              ),
              "07_escritorio": (
                  "EXCEPTION FOR THIS IMAGE ONLY: brighten exposure and lift shadows moderately while keeping natural contrast and realistic highlights."
              ),
              "23_banheiro_jacuzzi": (
                  "EXCEPTION FOR THIS IMAGE ONLY: improve clarity and highlight control around lighting reflections while preserving all surfaces and geometry."
              ),
              "24_cozinha_interna_pia": (
                  "EXCEPTION FOR THIS IMAGE ONLY: enhance lighting balance, reduce glare around fixtures, and keep exact layout and materials."
              ),
              "25_cozinha_interna_fornos": (
                  "EXCEPTION FOR THIS IMAGE ONLY: enhance lighting balance, reduce glare around fixtures, and keep exact layout and materials."
              ),
              "26_cozinha_interna_ilha": (
                  "EXCEPTION FOR THIS IMAGE ONLY: enhance lighting balance, reduce glare around fixtures, and keep exact layout and materials."
              ),
              "28_banheiro_master_passagem": (
                  "EXCEPTION FOR THIS IMAGE ONLY: improve highlight control around lights and mirrors while preserving exact reflections and geometry."
              ),
          }
          REPLICATE_PROMPT = (
              "professional real estate photography, architectural photography, ultra-realistic 4K, "
              "high resolution, natural light, sharp details, correct white balance, "
              "contemporary high-end Brazilian residential"
          )
          REPLICATE_NEG = (
              "blur, noise, overexposed, fake, CGI, staged, hallucination, added objects, "
              "AI artifacts, painting, illustration, low quality, low resolution"
          )

          # ── Helpers ──────────────────────────────────────────────────────────
          def download_drive_file(file_id, prefix):
              meta = drive.files().get(fileId=file_id, fields="mimeType", supportsAllDrives=True).execute()
              ext = ".png" if "png" in meta.get("mimeType", "") else ".jpg"
              path = prefix + ext
              buf = io.BytesIO()
              dl = MediaIoBaseDownload(buf, drive.files().get_media(fileId=file_id, supportsAllDrives=True))
              done = False
              while not done:
                  _, done = dl.next_chunk()
              open(path, "wb").write(buf.getvalue())
              return path

          def upload_to_drive(local_path, name, parent_id):
              mime, _ = mimetypes.guess_type(local_path)
              mime = mime or "image/jpeg"
              r = drive.files().create(
                  body={"name": name, "parents": [parent_id]},
                  media_body=MediaFileUpload(local_path, mimetype=mime),
                  supportsAllDrives=True,
                  fields="id,webViewLink",
              ).execute()
              return r.get("webViewLink", "")

          def to_rgb_png(src, dst):
              from PIL import Image
              Image.open(src).convert("RGB").save(dst, "PNG")

          def archive_old_results(safe_stem, dest_id, old_fid):
              """Move any prior {stem}_{tool}.* files from dest to old/ before re-processing."""
              suffixes = ["_nb2", "_openai", "_gemini", "_replicate"]
              existing = []
              for sfx in suffixes:
                  q = "'" + dest_id + "' in parents and name contains '" + safe_stem + sfx + "'"
                  found = drive.files().list(
                      q=q, supportsAllDrives=True, includeItemsFromAllDrives=True,
                      fields="files(id,name)"
                  ).execute().get("files", [])
                  existing.extend(found)
              if not existing:
                  return old_fid
              if not old_fid:
                  of = drive.files().create(
                      body={"name": "old", "mimeType": "application/vnd.google-apps.folder", "parents": [dest_id]},
                      supportsAllDrives=True, fields="id"
                  ).execute()
                  old_fid = of["id"]
              for ef in existing:
                  drive.files().update(
                      fileId=ef["id"], addParents=old_fid, removeParents=dest_id,
                      supportsAllDrives=True, fields="id"
                  ).execute()
                  print("  archived → old/: " + ef["name"])
              return old_fid

          # ── Main loop ────────────────────────────────────────────────────────
          batch_results = []
          succeeded = 0
          dest_link = "https://drive.google.com/drive/folders/" + dest

          for idx, (src_ref, stem) in enumerate(sources, start=1):
              safe_stem = re.sub(r"[^a-zA-Z0-9_-]", "_", stem)[:40]
              num = str(idx).zfill(2)
              print("\n--- [" + num + "/" + str(len(sources)) + "] " + stem + " ---")
              result = {
                  "index": idx, "source": src_ref, "stem": stem,
                  "safe_stem": safe_stem, "status": "failed", "error": "", "tools": {},
              }

              try:
                  # Download source
                  tmp_pfx = "/tmp/img_" + num + "_" + safe_stem
                  if src_ref.startswith("http"):
                      src_path = tmp_pfx + ".jpg"
                      urllib.request.urlretrieve(src_ref, src_path)
                  else:
                      src_path = download_drive_file(src_ref, tmp_pfx)
                  print("  Source: " + src_path + " (" + str(os.path.getsize(src_path) // 1024) + "KB)")

                  # Archive any previous results for this stem
                  old_folder_id = archive_old_results(safe_stem, dest, old_folder_id)
                  per_image_prompt = FULL_PROMPT
                  if safe_stem in STAGING_PROMPT_BY_STEM:
                      per_image_prompt = FULL_PROMPT + " " + STAGING_PROMPT_BY_STEM[safe_stem]
                      print("  Applying controlled exception prompt for stem: " + safe_stem)

                  tools_out = {}

                  # ── 1. NB2 — inference.sh → google/gemini-3-1-flash-image-preview ──
                  if do_nb2:
                      try:
                          key = os.environ.get("INFSH_KEY", "")
                          if not key:
                              raise Exception("no INFSH_KEY")
                          img4_bytes = open(src_path, "rb").read()
                          ext4 = "jpeg" if src_path.lower().endswith(".jpg") else "png"
                          data_uri4 = "data:image/" + ext4 + ";base64," + base64.b64encode(img4_bytes).decode()
                          from inferencesh import InferenceClient
                          client4 = InferenceClient(api_key=key)
                          print("  NB2: sending to inference.sh → google/gemini-3-1-flash-image-preview...")
                          result4 = client4.run(
                              "google/gemini-3-1-flash-image-preview",
                              input={"prompt": "TASK: Photo enhancement only. Do NOT redesign.\n" + per_image_prompt,
                                     "images": [data_uri4], "resolution": "2K"},
                          )
                          images4 = result4.get("images") or result4.get("output", {}).get("images", [])
                          if not images4:
                              raise Exception("no image in response")
                          img_data4 = images4[0]
                          out = tmp_pfx + "_nb2.jpg"
                          if isinstance(img_data4, str) and img_data4.startswith("http"):
                              import urllib.request as _ur
                              _ur.urlretrieve(img_data4, out)
                          elif isinstance(img_data4, str) and "base64," in img_data4:
                              open(out, "wb").write(base64.b64decode(img_data4.split("base64,", 1)[1]))
                          else:
                              open(out, "wb").write(base64.b64decode(img_data4) if isinstance(img_data4, str) else img_data4)
                          link = upload_to_drive(out, safe_stem + "_nb2.jpg", dest)
                          tools_out["nb2"] = {"status": "ok", "file": safe_stem + "_nb2.jpg", "drive_link": link}
                          print("  NB2: ok -> " + link)
                      except Exception as e:
                          tools_out["nb2"] = {"status": "failed", "error": str(e)[:200]}
                          print("  NB2 FAILED: " + str(e)[:200])

                  # ── 2. OpenAI gpt-image-1 ────────────────────────────────────
                  if do_openai:
                      try:
                          key = os.environ.get("OPENAI_API_KEY", "")
                          if not key:
                              raise Exception("no key")
                          import openai as _openai
                          png_in = tmp_pfx + "_openai_in.png"
                          to_rgb_png(src_path, png_in)
                          client = _openai.OpenAI(api_key=key)
                          print("  OpenAI: sending...")
                          with open(png_in, "rb") as fh:
                              resp = client.images.edit(model="gpt-image-1", image=fh, prompt=per_image_prompt, n=1, size="auto")
                          out = tmp_pfx + "_openai.png"
                          open(out, "wb").write(base64.b64decode(resp.data[0].b64_json))
                          link = upload_to_drive(out, safe_stem + "_openai.png", dest)
                          tools_out["openai"] = {"status": "ok", "file": safe_stem + "_openai.png", "drive_link": link}
                          print("  OpenAI: ok -> " + link)
                      except Exception as e:
                          tools_out["openai"] = {"status": "failed", "error": str(e)[:200]}
                          print("  OpenAI FAILED: " + str(e)[:200])

                  # ── 3. Gemini 2.5 Flash Image ────────────────────────────────
                  if do_gemini:
                      try:
                          key = os.environ.get("GEMINI_API_KEY", "")
                          if not key:
                              raise Exception("no key")
                          from google import genai
                          from google.genai import types
                          mime2, _ = mimetypes.guess_type(src_path)
                          mime2 = mime2 or "image/jpeg"
                          img_bytes = open(src_path, "rb").read()
                          gclient = genai.Client(api_key=key)
                          print("  Gemini: sending...")
                          gresp = gclient.models.generate_content(
                              model="gemini-2.5-flash-image",
                              contents=[
                                  types.Part.from_bytes(data=img_bytes, mime_type=mime2),
                                  types.Part.from_text(text="TASK: Photo enhancement only. Do NOT redesign.\n" + per_image_prompt),
                              ],
                              config=types.GenerateContentConfig(response_modalities=["IMAGE", "TEXT"]),
                          )
                          found = False
                          for part in gresp.candidates[0].content.parts:
                              if hasattr(part, "inline_data") and part.inline_data:
                                  raw = part.inline_data.data
                                  if isinstance(raw, str):
                                      raw = base64.b64decode(raw)
                                  out = tmp_pfx + "_gemini.jpg"
                                  open(out, "wb").write(raw)
                                  link = upload_to_drive(out, safe_stem + "_gemini.jpg", dest)
                                  tools_out["gemini"] = {"status": "ok", "file": safe_stem + "_gemini.jpg", "drive_link": link}
                                  print("  Gemini: ok -> " + link)
                                  found = True
                                  break
                          if not found:
                              raise Exception("no image in response")
                      except Exception as e:
                          tools_out["gemini"] = {"status": "failed", "error": str(e)[:200]}
                          print("  Gemini FAILED: " + str(e)[:200])

                  # ── 4. Replicate Clarity Upscaler ────────────────────────────
                  if do_replicate:
                      try:
                          import replicate as _replicate
                          token = os.environ.get("REPLICATE_API_TOKEN", "")
                          if not token:
                              raise Exception("no key")
                          rclient = _replicate.Client(api_token=token)
                          print("  Replicate: creating prediction...")
                          with open(src_path, "rb") as fh:
                              output = rclient.run(
                                  "philz1337x/clarity-upscaler",
                                  input={
                                      "image": fh, "prompt": REPLICATE_PROMPT,
                                      "negative_prompt": REPLICATE_NEG, "scale_factor": 2,
                                      "dynamic": 6, "creativity": 0, "resemblance": 1,
                                      "sharpen": 0, "num_inference_steps": 20,
                                  },
                              )
                          first = output[0] if isinstance(output, list) else output
                          url_r = getattr(first, "url", None) or str(first)
                          out = tmp_pfx + "_replicate.png"
                          urllib.request.urlretrieve(url_r, out)
                          link = upload_to_drive(out, safe_stem + "_replicate.png", dest)
                          tools_out["replicate"] = {"status": "ok", "file": safe_stem + "_replicate.png", "drive_link": link}
                          print("  Replicate: ok -> " + link)
                      except Exception as e:
                          tools_out["replicate"] = {"status": "failed", "error": str(e)[:200]}
                          print("  Replicate FAILED: " + str(e)[:200])

                  result["tools"] = tools_out
                  any_ok = any(v.get("status") == "ok" for v in tools_out.values())
                  result["status"] = "ok" if any_ok else "failed"
                  if any_ok:
                      succeeded += 1

              except Exception as e:
                  result["error"] = str(e)[:500]
                  print("  [" + num + "] image-level FAILED: " + str(e)[:200])

              batch_results.append(result)

          # ── Batch manifest (flat in dest folder) ─────────────────────────────
          failed_count = sum(1 for r in batch_results if r["status"] == "failed")
          batch_manifest = {
              "run_date": run_date, "label": label, "tool": tool,
              "source_folder_id": folder_id or "",
              "destination_folder_id": dest,
              "total": len(sources),
              "succeeded": succeeded,
              "failed": failed_count,
              "images": batch_results,
          }
          bm_path = "/tmp/batch_manifest.json"
          open(bm_path, "w").write(json.dumps(batch_manifest, indent=2))
          upload_to_drive(bm_path, run_date + "_" + label + "_manifest.json", dest)

          print("\nDone: " + str(succeeded) + "/" + str(len(sources)) + " succeeded, " + str(failed_count) + " failed")

          go = os.environ.get("GITHUB_OUTPUT", "/dev/null")
          with open(go, "a") as f:
              f.write("run_folder_link=" + dest_link + "\n")
              f.write("total=" + str(len(sources)) + "\n")
              f.write("succeeded=" + str(succeeded) + "\n")
              f.write("failed=" + str(failed_count) + "\n")
          PYEOF

      # ── EMAIL RESULTS ──────────────────────────────────────────────────────
      - name: Email results
        if: always()
        env:
          PRI_OP_GMAIL_APP_PASSWORD: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
          LABEL: ${{ inputs.original_filename }}
          TOOL: ${{ inputs.tool }}
          RUN_FOLDER_LINK: ${{ steps.process.outputs.run_folder_link }}
          TOTAL: ${{ steps.process.outputs.total }}
          SUCCEEDED: ${{ steps.process.outputs.succeeded }}
          FAILED: ${{ steps.process.outputs.failed }}
        run: |
          python3 << 'PYEOF'
          import os, json, smtplib
          from email.mime.text import MIMEText

          label       = os.environ.get("LABEL", "photo")
          tool        = os.environ.get("TOOL", "all")
          folder_link = os.environ.get("RUN_FOLDER_LINK", "")
          total       = os.environ.get("TOTAL", "0")
          succeeded   = os.environ.get("SUCCEEDED", "0")
          failed      = os.environ.get("FAILED", "0")
          pwd         = os.environ.get("PRI_OP_GMAIL_APP_PASSWORD", "")

          try:
              bm = json.loads(open("/tmp/batch_manifest.json").read())
              images = bm.get("images", [])
          except Exception:
              images = []

          mode = "Batch" if len(images) > 1 else "Single"

          lines = [
              "Photo Edit — " + mode + " Complete: " + label,
              "Tool order: NB2 → OpenAI → Gemini → Replicate",
              "Destination folder: " + folder_link,
              "",
              "Found: " + total + "  |  Succeeded: " + succeeded + "  |  Failed: " + failed,
              "",
              "Files are FLAT in the folder — named {stem}_{tool}.jpg",
              "Previous versions moved to old/ subfolder automatically.",
              "",
          ]

          for img in images:
              idx      = str(img.get("index", "?")).zfill(2)
              stem     = img.get("stem", "?")
              safe     = img.get("safe_stem", stem)
              status   = img.get("status", "?")
              err      = img.get("error", "")
              tools    = img.get("tools", {})

              if status == "failed" and not tools:
                  lines.append(idx + " " + stem + ": FAILED — " + err)
                  lines.append("")
                  continue

              lines.append(idx + " " + stem + ":")
              # NB2 first in email
              for t in ("nb2", "openai", "gemini", "replicate"):
                  info = tools.get(t)
                  if info is None:
                      continue
                  if info.get("status") == "ok":
                      lines.append("  " + t + ": " + info.get("drive_link", ""))
                  else:
                      lines.append("  " + t + ": FAILED — " + info.get("error", "")[:100])
              lines.append("")

          body = "\n".join(lines)
          subject = "Photo Edit Done: " + label + " (" + succeeded + "/" + total + ")"

          if not pwd:
              print("No Gmail password in secrets — cannot send email")
              print("Email body:\n" + body)
          else:
              msg = MIMEText(body)
              msg["Subject"] = subject
              msg["From"]    = "priscila@oakpark-construction.com"
              msg["To"]      = "priscila@oakpark-construction.com"
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
                  smtp.login("priscila@oakpark-construction.com", pwd)
                  smtp.send_message(msg)
              print("Email sent: " + subject)
          PYEOF

      - name: Summary
        if: always()
        run: |
          echo "## Photo Edit — AI Enhancement" >> $GITHUB_STEP_SUMMARY
          echo "- **Label:** ${{ inputs.original_filename }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tool:** ${{ inputs.tool }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total:** ${{ steps.process.outputs.total }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Succeeded:** ${{ steps.process.outputs.succeeded }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Failed:** ${{ steps.process.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Drive:** ${{ steps.process.outputs.run_folder_link }}" >> $GITHUB_STEP_SUMMARY
