name: Photo Edit — AI Enhancement

# PRIMARY workflow — trigger from phone via GitHub Actions UI
# Accepts a Drive file ID, direct image URL, or Drive folder ID (batch)
# Runs all 4 AI tools (or one specific tool)
# Results → Marketing > Image Creation > Enhanced Photos + email

on:
  workflow_dispatch:
    inputs:
      image_source:
        description: 'Drive file ID OR direct image URL. Leave blank when using folder_id.'
        required: false
        default: ''
        type: string
      folder_id:
        description: 'Drive folder ID for batch (all images in folder). Overrides image_source.'
        required: false
        default: ''
        type: string
      tool:
        description: 'Which AI to use'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - openai
          - gemini
          - replicate
          - nb2
      original_filename:
        description: 'Label for this run (e.g. kitchen-before, walnut-deck)'
        required: false
        default: 'photo'
        type: string
      destination_folder_id:
        description: 'Drive folder ID for results (leave blank for default)'
        required: false
        default: '1WdxoKIOFIa0E9eREe-uKLDgD4tLVegTw'
        type: string

# ── FOLDER IDs ──────────────────────────────────────────────────────────────
# Marketing > Image Creation > Enhanced Photos: 1WdxoKIOFIa0E9eREe-uKLDgD4tLVegTw
# ────────────────────────────────────────────────────────────────────────────

jobs:
  enhance:
    runs-on: ubuntu-latest

    steps:
      # ── INSTALL DEPS ────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -q openai pillow google-auth google-auth-oauthlib google-api-python-client google-genai replicate inferencesh

      # ── MAIN: download → enhance → upload → manifests ───────────────────────
      - name: Process all images
        id: process
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.PRI_OP_REPLICATE_API_KEY }}
          INFSH_KEY: ${{ secrets.PRI_OP_INFSH_API_KEY }}
          IMAGE_SOURCE: ${{ inputs.image_source }}
          FOLDER_ID: ${{ inputs.folder_id }}
          TOOL: ${{ inputs.tool }}
          LABEL: ${{ inputs.original_filename }}
          DEST_FOLDER: ${{ inputs.destination_folder_id }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, sys, base64, io, mimetypes, urllib.request
          from datetime import datetime, timezone
          from pathlib import Path
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload, MediaFileUpload

          # ── Auth ────────────────────────────────────────────────────────────
          token_data = json.loads(os.environ.get("SHEETS_TOKEN", "{}"))
          creds = Credentials(
              token=token_data.get("token"),
              refresh_token=token_data.get("refresh_token"),
              token_uri=token_data.get("token_uri", "https://oauth2.googleapis.com/token"),
              client_id=token_data.get("client_id"),
              client_secret=token_data.get("client_secret"),
              scopes=token_data.get("scopes"),
          )
          if not creds.valid:
              creds.refresh(Request())
          drive = build("drive", "v3", credentials=creds)

          # ── Config ──────────────────────────────────────────────────────────
          label      = (os.environ.get("LABEL") or "photo").strip()
          tool       = (os.environ.get("TOOL") or "all").strip()
          dest       = (os.environ.get("DEST_FOLDER") or "1WdxoKIOFIa0E9eREe-uKLDgD4tLVegTw").strip()
          src_input  = (os.environ.get("IMAGE_SOURCE") or "").strip()
          folder_id  = (os.environ.get("FOLDER_ID") or "").strip()
          run_ts     = datetime.now(timezone.utc).isoformat()
          run_date   = datetime.now().strftime("%Y-%m-%d")

          do_openai    = tool in ("all", "openai")
          do_gemini    = tool in ("all", "gemini")
          do_replicate = tool in ("all", "replicate")
          do_nb2       = tool in ("all", "nb2")

          # ── Build file list ──────────────────────────────────────────────────
          sources = []
          if folder_id:
              print("Batch mode: listing folder " + folder_id)
              resp = drive.files().list(
                  q="'" + folder_id + "' in parents and trashed=false and (mimeType contains 'image/')",
                  supportsAllDrives=True, includeItemsFromAllDrives=True,
                  fields="files(id,name)",
              ).execute()
              for f in resp.get("files", []):
                  stem = Path(f["name"]).stem[:40]
                  sources.append((f["id"], stem))
              print("Found " + str(len(sources)) + " image(s) in folder")
          elif src_input:
              m = re.search(r"/d/([a-zA-Z0-9_-]+)", src_input) or re.search(r"id=([a-zA-Z0-9_-]+)", src_input)
              file_id = m.group(1) if m else src_input
              sources.append((file_id, label))
          else:
              print("ERROR: no image_source or folder_id provided")
              sys.exit(1)

          if not sources:
              print("ERROR: no images found")
              sys.exit(1)

          # ── Create run folder in Drive ───────────────────────────────────────
          run_folder_name = run_date + "_" + label
          rf = drive.files().create(
              body={
                  "name": run_folder_name,
                  "mimeType": "application/vnd.google-apps.folder",
                  "parents": [dest],
              },
              supportsAllDrives=True,
              fields="id,webViewLink",
          ).execute()
          run_folder_id   = rf["id"]
          run_folder_link = rf.get("webViewLink", "")
          print("Run folder: " + run_folder_name + " (" + run_folder_id + ")")

          # ── Prompts ─────────────────────────────────────────────────────────
          FULL_PROMPT = (
              "Enhance this real construction/remodel photo to professional architectural "
              "real-estate photography quality. Fix exposure and white balance, improve "
              "contrast and color accuracy, recover highlights, gently lift shadows, "
              "mild dehaze/clarity/noise cleanup, slight sharpening, straighten verticals. "
              "Keep everything truthful to the real jobsite. "
              "Do NOT add or remove objects, change geometry, layout, finishes, or make it look CGI or staged. "
              "Natural light, realistic color, South Florida residential feel."
          )
          REPLICATE_PROMPT = (
              "professional real estate photography, architectural photography, "
              "natural light, sharp details, correct white balance, South Florida residential"
          )
          REPLICATE_NEG = "blur, noise, overexposed, fake, CGI, staged, hallucination, added objects"

          # ── Helpers ──────────────────────────────────────────────────────────
          def download_drive_file(file_id, prefix):
              meta = drive.files().get(
                  fileId=file_id, fields="mimeType", supportsAllDrives=True
              ).execute()
              ext = ".png" if "png" in meta.get("mimeType", "") else ".jpg"
              path = prefix + ext
              buf = io.BytesIO()
              dl = MediaIoBaseDownload(
                  buf, drive.files().get_media(fileId=file_id, supportsAllDrives=True)
              )
              done = False
              while not done:
                  _, done = dl.next_chunk()
              open(path, "wb").write(buf.getvalue())
              return path

          def upload_to_drive(local_path, name, parent_id):
              mime, _ = mimetypes.guess_type(local_path)
              mime = mime or "image/png"
              r = drive.files().create(
                  body={"name": name, "parents": [parent_id]},
                  media_body=MediaFileUpload(local_path, mimetype=mime),
                  supportsAllDrives=True,
                  fields="id,webViewLink",
              ).execute()
              return r.get("webViewLink", "")

          def to_rgb_png(src, dest):
              from PIL import Image
              Image.open(src).convert("RGB").save(dest, "PNG")

          # ── Main loop ────────────────────────────────────────────────────────
          batch_results = []
          succeeded = 0

          for idx, (src_ref, stem) in enumerate(sources, start=1):
              num      = str(idx).zfill(2)
              subfname = num + "_" + stem
              print("\n--- [" + num + "/" + str(len(sources)) + "] " + stem + " ---")
              result = {
                  "index": idx, "source": src_ref, "stem": stem,
                  "subfolder": subfname, "status": "failed",
                  "error": "", "drive_folder_link": "", "tools": {},
              }

              try:
                  # Download source
                  tmp_pfx = "/tmp/img_" + num + "_" + stem
                  if src_ref.startswith("http"):
                      src_path = tmp_pfx + ".jpg"
                      urllib.request.urlretrieve(src_ref, src_path)
                  else:
                      src_path = download_drive_file(src_ref, tmp_pfx)
                  print("  Source: " + src_path + " (" + str(os.path.getsize(src_path) // 1024) + "KB)")

                  # Create per-image subfolder in Drive
                  sf = drive.files().create(
                      body={
                          "name": subfname,
                          "mimeType": "application/vnd.google-apps.folder",
                          "parents": [run_folder_id],
                      },
                      supportsAllDrives=True,
                      fields="id,webViewLink",
                  ).execute()
                  sf_id   = sf["id"]
                  sf_link = sf.get("webViewLink", "")
                  result["drive_folder_link"] = sf_link

                  tools_out = {}

                  # ── OpenAI gpt-image-1 ───────────────────────────────────────
                  if do_openai:
                      try:
                          key = os.environ.get("OPENAI_API_KEY", "")
                          if not key:
                              raise Exception("no key")
                          import openai as _openai
                          png_in = tmp_pfx + "_openai_in.png"
                          to_rgb_png(src_path, png_in)
                          client = _openai.OpenAI(api_key=key)
                          print("  OpenAI: sending...")
                          with open(png_in, "rb") as fh:
                              resp = client.images.edit(
                                  model="gpt-image-1", image=fh, prompt=FULL_PROMPT, n=1, size="auto"
                              )
                          out = tmp_pfx + "_1_openai.png"
                          open(out, "wb").write(base64.b64decode(resp.data[0].b64_json))
                          link = upload_to_drive(out, "1_openai_gpt-image-1.png", sf_id)
                          tools_out["openai"] = {"status": "ok", "file": "1_openai_gpt-image-1.png", "drive_link": link}
                          print("  OpenAI: ok -> " + link)
                      except Exception as e:
                          tools_out["openai"] = {"status": "failed", "error": str(e)[:200]}
                          print("  OpenAI FAILED: " + str(e)[:200])

                  # ── Gemini 2.0 Flash ─────────────────────────────────────────
                  if do_gemini:
                      try:
                          key = os.environ.get("GEMINI_API_KEY", "")
                          if not key:
                              raise Exception("no key")
                          from google import genai
                          from google.genai import types
                          mime2, _ = mimetypes.guess_type(src_path)
                          mime2 = mime2 or "image/jpeg"
                          img_bytes = open(src_path, "rb").read()
                          gclient = genai.Client(api_key=key)
                          print("  Gemini: sending...")
                          gresp = gclient.models.generate_content(
                              model="gemini-2.5-flash-image",
                              contents=[
                                  types.Part.from_bytes(data=img_bytes, mime_type=mime2),
                                  types.Part.from_text(
                                      text="TASK: Photo enhancement only. Do NOT redesign.\n" + FULL_PROMPT
                                  ),
                              ],
                              config=types.GenerateContentConfig(response_modalities=["IMAGE", "TEXT"]),
                          )
                          found = False
                          for part in gresp.candidates[0].content.parts:
                              if hasattr(part, "inline_data") and part.inline_data:
                                  raw = part.inline_data.data
                                  if isinstance(raw, str):
                                      raw = base64.b64decode(raw)
                                  out = tmp_pfx + "_2_gemini.jpg"
                                  open(out, "wb").write(raw)
                                  link = upload_to_drive(out, "2_gemini_20flash.jpg", sf_id)
                                  tools_out["gemini"] = {"status": "ok", "file": "2_gemini_20flash.jpg", "drive_link": link}
                                  print("  Gemini: ok -> " + link)
                                  found = True
                                  break
                          if not found:
                              raise Exception("no image in response")
                      except Exception as e:
                          tools_out["gemini"] = {"status": "failed", "error": str(e)[:200]}
                          print("  Gemini FAILED: " + str(e)[:200])

                  # ── Replicate Clarity Upscaler ───────────────────────────────
                  if do_replicate:
                      try:
                          import json as _json, time as _time
                          token = os.environ.get("REPLICATE_API_TOKEN", "")
                          if not token:
                              raise Exception("no key")
                          ext_r = "png" if src_path.endswith(".png") else "jpeg"
                          with open(src_path, "rb") as fh:
                              img_b64_r = base64.b64encode(fh.read()).decode()
                          data_uri_r = "data:image/" + ext_r + ";base64," + img_b64_r
                          # Get latest version dynamically (avoids hardcoded broken hashes)
                          req_ver = urllib.request.Request(
                              "https://api.replicate.com/v1/models/philz1337x/clarity-upscaler/versions",
                              headers={"Authorization": "Bearer " + token},
                          )
                          with urllib.request.urlopen(req_ver) as rv:
                              versions = _json.loads(rv.read())
                          latest_ver = versions["results"][0]["id"]
                          print("  Replicate: version " + latest_ver[:16] + "...")
                          req_body = _json.dumps({
                              "version": latest_ver,
                              "input": {
                                  "image": data_uri_r, "prompt": REPLICATE_PROMPT,
                                  "negative_prompt": REPLICATE_NEG, "scale_factor": 2,
                                  "dynamic": 6, "creativity": 0, "resemblance": 1,
                                  "sharpen": 0, "num_inference_steps": 20,
                              }
                          }).encode()
                          req_create = urllib.request.Request(
                              "https://api.replicate.com/v1/predictions",
                              data=req_body,
                              headers={"Authorization": "Bearer " + token, "Content-Type": "application/json", "Prefer": "wait"},
                          )
                          print("  Replicate: creating prediction...")
                          with urllib.request.urlopen(req_create) as r:
                              pred = _json.loads(r.read())
                          pred_id = pred["id"]
                          url_r = ""
                          for _ in range(120):
                              _time.sleep(5)
                              req_poll = urllib.request.Request(
                                  "https://api.replicate.com/v1/predictions/" + pred_id,
                                  headers={"Authorization": "Token " + token},
                              )
                              with urllib.request.urlopen(req_poll) as r:
                                  status = _json.loads(r.read())
                              if status["status"] == "succeeded":
                                  out_r = status.get("output", [])
                                  url_r = out_r[0] if isinstance(out_r, list) else str(out_r)
                                  break
                              if status["status"] in ("failed", "canceled"):
                                  raise Exception("prediction " + status["status"] + ": " + str(status.get("error", "")))
                          if not url_r:
                              raise Exception("prediction timed out")
                          out = tmp_pfx + "_3_replicate.png"
                          urllib.request.urlretrieve(url_r, out)
                          link = upload_to_drive(out, "3_replicate_clarity2x.png", sf_id)
                          tools_out["replicate"] = {"status": "ok", "file": "3_replicate_clarity2x.png", "drive_link": link}
                          print("  Replicate: ok -> " + link)
                      except Exception as e:
                          tools_out["replicate"] = {"status": "failed", "error": str(e)[:200]}
                          print("  Replicate FAILED: " + str(e)[:200])

                  # ── Nano Banana 2 — Gemini 3.1 Flash Image via Gemini API ────
                  if do_nb2:
                      try:
                          key = os.environ.get("GEMINI_API_KEY", "")
                          if not key:
                              raise Exception("no key")
                          from google import genai
                          from google.genai import types as gtypes
                          mime4, _ = mimetypes.guess_type(src_path)
                          mime4 = mime4 or "image/jpeg"
                          img4_bytes = open(src_path, "rb").read()
                          gclient4 = genai.Client(api_key=key)
                          print("  NB2: sending to gemini-3.1-flash-image-preview...")
                          gresp4 = gclient4.models.generate_content(
                              model="gemini-3.1-flash-image-preview",
                              contents=[
                                  gtypes.Part.from_bytes(data=img4_bytes, mime_type=mime4),
                                  gtypes.Part.from_text(
                                      text="TASK: Photo enhancement only. Do NOT redesign.\n" + FULL_PROMPT
                                  ),
                              ],
                              config=gtypes.GenerateContentConfig(response_modalities=["IMAGE", "TEXT"]),
                          )
                          found4 = False
                          for part4 in gresp4.candidates[0].content.parts:
                              if hasattr(part4, "inline_data") and part4.inline_data:
                                  raw4 = part4.inline_data.data
                                  if isinstance(raw4, str):
                                      raw4 = base64.b64decode(raw4)
                                  out = tmp_pfx + "_4_nb2.png"
                                  open(out, "wb").write(raw4)
                                  link = upload_to_drive(out, "4_nb2_gemini31flash.png", sf_id)
                                  tools_out["nb2"] = {"status": "ok", "file": "4_nb2_gemini31flash.png", "drive_link": link}
                                  print("  NB2: ok -> " + link)
                                  found4 = True
                                  break
                          if not found4:
                              raise Exception("no image in response")
                      except Exception as e:
                          tools_out["nb2"] = {"status": "failed", "error": str(e)[:200]}
                          print("  NB2 FAILED: " + str(e)[:200])

                  # Per-image manifest
                  result["tools"]  = tools_out
                  any_ok = any(v.get("status") == "ok" for v in tools_out.values())
                  result["status"] = "ok" if any_ok else "failed"
                  if any_ok:
                      succeeded += 1

                  manifest_data = {
                      "source": src_ref, "stem": stem, "index": idx,
                      "output_subfolder": subfname, "drive_folder_link": sf_link,
                      "timestamp": run_ts, "tools": tools_out,
                  }
                  mf_path = tmp_pfx + "_manifest.json"
                  open(mf_path, "w").write(json.dumps(manifest_data, indent=2))
                  upload_to_drive(mf_path, "manifest.json", sf_id)

              except Exception as e:
                  result["error"] = str(e)[:500]
                  print("  [" + num + "] image-level FAILED: " + str(e)[:200])

              batch_results.append(result)

          # ── Batch manifest ───────────────────────────────────────────────────
          failed_count = sum(1 for r in batch_results if r["status"] == "failed")
          batch_manifest = {
              "run_date": run_date, "label": label, "tool": tool,
              "source_folder_id": folder_id or "",
              "destination_link": run_folder_link,
              "total": len(sources),
              "succeeded": succeeded,
              "failed": failed_count,
              "images": batch_results,
          }
          bm_path = "/tmp/batch_manifest.json"
          open(bm_path, "w").write(json.dumps(batch_manifest, indent=2))
          upload_to_drive(bm_path, "batch_manifest.json", run_folder_id)

          print("\nDone: " + str(succeeded) + "/" + str(len(sources)) + " succeeded, " + str(failed_count) + " failed")

          # ── Emit outputs ─────────────────────────────────────────────────────
          go = os.environ.get("GITHUB_OUTPUT", "/dev/null")
          with open(go, "a") as f:
              f.write("run_folder_link=" + run_folder_link + "\n")
              f.write("total=" + str(len(sources)) + "\n")
              f.write("succeeded=" + str(succeeded) + "\n")
              f.write("failed=" + str(failed_count) + "\n")
          PYEOF

      # ── EMAIL RESULTS ──────────────────────────────────────────────────────
      - name: Email results
        if: always()
        env:
          PRI_OP_GMAIL_APP_PASSWORD: ${{ secrets.PRI_OP_GMAIL_APP_PASSWORD }}
          LABEL: ${{ inputs.original_filename }}
          TOOL: ${{ inputs.tool }}
          RUN_FOLDER_LINK: ${{ steps.process.outputs.run_folder_link }}
          TOTAL: ${{ steps.process.outputs.total }}
          SUCCEEDED: ${{ steps.process.outputs.succeeded }}
          FAILED: ${{ steps.process.outputs.failed }}
        run: |
          python3 << 'PYEOF'
          import os, json, smtplib
          from email.mime.text import MIMEText

          label       = os.environ.get("LABEL", "photo")
          tool        = os.environ.get("TOOL", "all")
          folder_link = os.environ.get("RUN_FOLDER_LINK", "")
          total       = os.environ.get("TOTAL", "0")
          succeeded   = os.environ.get("SUCCEEDED", "0")
          failed      = os.environ.get("FAILED", "0")
          pwd         = os.environ.get("PRI_OP_GMAIL_APP_PASSWORD", "")

          try:
              bm = json.loads(open("/tmp/batch_manifest.json").read())
              images = bm.get("images", [])
          except Exception:
              images = []

          mode = "Batch" if len(images) > 1 else "Single"

          lines = [
              "Photo Edit — " + mode + " Complete: " + label,
              "Tool: " + tool,
              "Run folder: " + folder_link,
              "",
              "Found: " + total + "  |  Succeeded: " + succeeded + "  |  Failed: " + failed,
              "",
          ]

          for img in images:
              idx    = str(img.get("index", "?")).zfill(2)
              stem   = img.get("stem", "?")
              status = img.get("status", "?")
              sflink = img.get("drive_folder_link", "")
              err    = img.get("error", "")
              tools  = img.get("tools", {})

              if status == "failed" and not tools:
                  lines.append(idx + "_" + stem + ": FAILED — " + err)
                  lines.append("")
                  continue

              parts = []
              for t in ("openai", "gemini", "replicate", "nb2"):
                  info = tools.get(t)
                  if info is None:
                      continue
                  mark = "ok" if info.get("status") == "ok" else "x"
                  parts.append(t + " [" + mark + "]")

              lines.append(idx + "_" + stem + ":  " + "  ".join(parts))
              if sflink:
                  lines.append("  " + sflink)
              lines.append("")

          body = "\n".join(lines)
          subject = "Photo Edit Done: " + label

          if not pwd:
              print("No Gmail password in secrets — cannot send email")
              print("Email body:\n" + body)
          else:
              msg = MIMEText(body)
              msg["Subject"] = subject
              msg["From"]    = "priscila@oakpark-construction.com"
              msg["To"]      = "priscila@oakpark-construction.com"
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
                  smtp.login("priscila@oakpark-construction.com", pwd)
                  smtp.send_message(msg)
              print("Email sent: " + subject)
          PYEOF

      - name: Summary
        if: always()
        run: |
          echo "## Photo Edit — AI Enhancement" >> $GITHUB_STEP_SUMMARY
          echo "- **Label:** ${{ inputs.original_filename }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tool:** ${{ inputs.tool }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total:** ${{ steps.process.outputs.total }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Succeeded:** ${{ steps.process.outputs.succeeded }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Failed:** ${{ steps.process.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Drive:** ${{ steps.process.outputs.run_folder_link }}" >> $GITHUB_STEP_SUMMARY
