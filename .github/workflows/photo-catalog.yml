name: Photo Catalog — Daily Scan

on:
  schedule:
    - cron: '35 23 * * *'   # 7:35 PM ET (UTC-4) = 23:35 UTC
  workflow_dispatch:         # allow manual run from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements_content.txt

      - name: Write Google credentials
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
        run: |
          mkdir -p /tmp/oak_park_creds
          echo "$SHEETS_TOKEN" > /tmp/oak_park_creds/sheets_token.json

      - name: Run photo catalog + idea generation
        env:
          CLAUDE_KEY_4_CONTENT: ${{ secrets.CLAUDE_KEY_4_CONTENT }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          SHEETS_TOKEN_PATH: /tmp/oak_park_creds/sheets_token.json
        run: python scripts/photo_catalog_cloud.py
