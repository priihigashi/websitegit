name: Gmail Monthly Cleanup (trash archived by label policy)

# Runs on the 1st of each month. Moves to Trash archived (not in inbox)
# messages by per-label age threshold.
#
# Labels cleaned:
#   🤖 Automation/Captures       → 180d
#   🤖 Automation/Daily Digests  → 60d
#   🤖 Automation/Notifications  → 60d
#   📬 Promos & News             → 60d
#   google ads help              → 60d

on:
  schedule:
    - cron: '0 10 1 * *'   # 10:00 UTC on the 1st of each month (~5/6 AM ET)
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trash old archived messages
        run: |
          pip install --quiet google-auth google-auth-httplib2 google-api-python-client
          python - << 'PYEOF'
          import os, json
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build

          raw = os.environ.get("SHEETS_TOKEN", "")
          if not raw:
              print("ERROR: SHEETS_TOKEN secret not set.")
              exit(1)

          td = json.loads(raw)
          creds = Credentials(
              token=td.get("token"),
              refresh_token=td.get("refresh_token"),
              token_uri=td.get("token_uri", "https://oauth2.googleapis.com/token"),
              client_id=td.get("client_id"),
              client_secret=td.get("client_secret"),
              scopes=td.get("scopes"),
          )
          if not creds.valid and creds.refresh_token:
              creds.refresh(Request())

          gmail = build("gmail", "v1", credentials=creds)
          labels = {l["name"]: l["id"] for l in gmail.users().labels().list(userId="me").execute().get("labels", [])}

          LABEL_RETENTION_DAYS = {
              "🤖 Automation/Captures": 180,
              "🤖 Automation/Daily Digests": 60,
              "🤖 Automation/Notifications": 60,
              "📬 Promos & News": 60,
              "google ads help": 60,
          }

          total_trashed = 0

          for name, days in LABEL_RETENTION_DAYS.items():
              lid = labels.get(name)
              if not lid:
                  print(f"  skip: label '{name}' not found")
                  continue
              # Archived (not in inbox) + label + older than label-specific threshold
              q = f"label:{lid} -in:inbox older_than:{days}d"
              trashed = 0
              page_token = None
              while True:
                  resp = gmail.users().messages().list(
                      userId="me", q=q, maxResults=500, pageToken=page_token
                  ).execute()
                  msgs = resp.get("messages", [])
                  for m in msgs:
                      gmail.users().messages().trash(userId="me", id=m["id"]).execute()
                      trashed += 1
                  page_token = resp.get("nextPageToken")
                  if not page_token:
                      break
              print(f"  {name}: trashed {trashed} (>{days}d)")
              total_trashed += trashed

          print(f"\nTotal trashed: {total_trashed}")
          PYEOF
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
