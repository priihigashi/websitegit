name: Nonnegotiables Updater

on:
  schedule:
    # 2:00 AM ET daily (before inventory at 3 AM, before 4AM agent at 4 AM)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytz requests

      - name: Print current NONNEGOTIABLES (for audit trail in logs)
        run: |
          echo "===== NONNEGOTIABLES.md ====="
          cat NONNEGOTIABLES.md
          echo "============================="

      - name: Run updater
        env:
          SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
          GIT_AUTHOR_NAME: nonnegotiables-bot
          GIT_AUTHOR_EMAIL: actions@github.com
          GIT_COMMITTER_NAME: nonnegotiables-bot
          GIT_COMMITTER_EMAIL: actions@github.com
        run: python3 scripts/nonnegotiables_updater.py

      - name: Alert on failure
        if: failure()
        run: |
          gh workflow run send_email.yml \
            --repo priihigashi/oak-park-ai-hub \
            -f to="priscila@oakpark-construction.com" \
            -f subject="[nonnegotiables] Updater failed — $(date +%Y-%m-%d)" \
            -f body="Nonnegotiables updater failed. Check: https://github.com/priihigashi/oak-park-ai-hub/actions/workflows/nonnegotiables.yml"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
