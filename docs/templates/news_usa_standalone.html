<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USA — Cover · Main Character</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   USA — COVER · MAIN CHARACTER (v3 editorial)
   Dark split layout. Person RIGHT, text LEFT.
   Pipeline recolor via CSS vars:
     --accent    photo duotone + decorative accents
     --bg        slide background + text zone fill
     --text      headline + logo
   Person injected via .sticker-slot → .sticker-placeholder
   Grayscale duotone applied entirely in CSS.
═══════════════════════════════════════════════ */
:root {
  --accent: #1A56A8;          /* InUS deep blue */
  --bg:     #0A0A0A;          /* editorial black */
  --text:   #FFFFFF;
  --muted:  rgba(255,255,255,0.32);
  --W: 1080px;
  --H: 1350px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #111;
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  padding: 24px;
  font-family: 'Barlow Condensed', sans-serif;
}

.slide {
  width: var(--W);
  height: var(--H);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  background: var(--bg);
}

/* ── PHOTO ZONE — right side, torn paper left edge ──
   Same architecture as Brazil; accent color differs (blue duotone). */
.photo-zone {
  position: absolute;
  right: 0; top: 0;
  width: 580px; height: 100%;
  z-index: 2;
  filter: drop-shadow(-16px 0px 28px rgba(0,0,0,0.92));
  clip-path: polygon(
    13% 0%,
    10% 3%,  17% 7%,  9% 11%, 16% 15%, 10% 19%,
    17% 23%,  9% 27%, 16% 31%, 10% 35%, 17% 39%,
     9% 43%, 16% 47%, 10% 51%, 17% 55%,  9% 59%,
    16% 63%, 10% 67%, 17% 71%,  9% 75%, 15% 79%,
    10% 83%, 16% 87%,  9% 91%, 15% 95%, 12% 100%,
    100% 100%, 100% 0%
  );
}

.sticker-placeholder {
  width: 100%; height: 100%;
  background: #1E1E1E;
  display: block;
}

/* Blue editorial duotone — grayscale → sepia → hue-shift to blue */
.photo-zone img,
.photo-zone .sticker-placeholder img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  filter: grayscale(1) sepia(0.75) saturate(3.5) hue-rotate(195deg) brightness(0.68);
  display: block;
}

/* ── TEXT ZONE — left side, black background ── */
.text-zone {
  position: absolute;
  left: 0; top: 0;
  width: 528px; height: 100%;
  z-index: 10;
  background: var(--bg);
  padding: 64px 52px;
  display: flex;
  flex-direction: column;
}

.cover-logo {
  font-weight: 900;
  font-size: 38px;
  line-height: 1.05;
  color: var(--text);
  letter-spacing: -.02em;
  margin-bottom: auto;
}
.logo-top {
  display: block;
  color: var(--accent);
  border-bottom: 3px solid var(--accent);
  padding-bottom: 4px;
  margin-bottom: 4px;
}

.cover-headline {
  font-weight: 900;
  font-size: 94px;
  line-height: 0.87;
  text-transform: uppercase;
  color: var(--text);
  letter-spacing: -.025em;
  word-break: break-word;
  margin-bottom: 30px;
}

.accent-rule {
  width: 52px; height: 5px;
  background: var(--accent);
  margin-bottom: 18px;
  flex-shrink: 0;
}

.cover-credit {
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  color: var(--muted);
  letter-spacing: .02em;
}

.slide-counter {
  position: absolute;
  top: 64px; right: 64px;
  z-index: 20;
  font-family: 'Barlow', sans-serif;
  font-weight: 700;
  font-size: 17px;
  color: rgba(255,255,255,0.60);
  background: rgba(0,0,0,0.50);
  padding: 5px 13px;
  border-radius: 24px;
  letter-spacing: .04em;
}

.photo-credit-side {
  position: absolute;
  right: 40px; bottom: 72px;
  z-index: 20;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: .06em;
}
</style>
</head>
<body>

<div class="slide">

  <div class="photo-zone sticker-slot">
    <div class="sticker-placeholder"></div>
  </div>

  <div class="text-zone">
    <div class="cover-logo">
      <span class="logo-top">In</span>US
    </div>
    <div class="cover-headline">
      SENATOR NAMED IN SCHEME TO HAND SUPREME COURT TO THE FAR RIGHT
    </div>
    <div class="accent-rule"></div>
    <div class="cover-credit">Photo : AP / Reuters</div>
  </div>

  <div class="slide-counter">1 / 10</div>
  <div class="photo-credit-side">Photo : AP / Reuters</div>

</div>

</body>
</html>
