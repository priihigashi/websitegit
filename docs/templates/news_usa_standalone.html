<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USA — Cover · Main Character</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   USA — COVER · MAIN CHARACTER
   When to use: story has a main person / actor
   Palette variables — change these to retheme:
     --bg-color     slide background
     --blob-color   large circle behind person
     --text-color   headline + logo
     --hl-color     inline text highlight
   Layering order (z-index):
     0 bg-color    (CSS background)
     1 blob        (circle)
     2 person      (B&W photo, separate from blob)
     10 text/logo
═══════════════════════════════════════════════ */
:root {
  /* ── THEME VARIABLES — edit these to retheme ── */
  --bg-color:   #F5F5F5;   /* near-white — slide background */
  --blob-color: #CC1F2D;   /* signal red circle — geometric layer */
  --text-color: #0A0A0A;   /* black — headline, logo, labels */
  --hl-color:   #CC1F2D;   /* inline highlight background */
  --muted:      rgba(10,10,10,0.40);

  /* ── Slide dimensions ── */
  --W: 1080px;
  --H: 1350px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #111;
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  padding: 24px;
  font-family: 'Barlow Condensed', sans-serif;
}
.slide {
  width:  var(--W);
  height: var(--H);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}


/* ══════════════════════════════════════════════
   SLIDE 1 — COVER · MAIN CHARACTER
   Layer stack (bottom to top):
     1. Light background (CSS)
     2. Red circle blob (z-index 1) ← recolorable via --blob-color
     3. B&W person photo  (z-index 2) ← separate, has own shadow
     4. Text + logo       (z-index 10)
══════════════════════════════════════════════ */
.slide-cover {
  background: var(--bg-color);
}

/* ── LAYER 1: Geometric circle blob ── */
/* Centered BEHIND the person's torso — same architecture as Brazil.
   Circle sits behind the person so both arcs frame the silhouette.
   For cutout PNGs both arcs show; for regular JPGs right arc only. */
.blob-circle {
  position: absolute;
  width: 920px;
  height: 920px;
  background: var(--blob-color);
  border-radius: 50%;
  left: 50px;    /* center lands at ~x=510, behind person's torso */
  top: 270px;
  z-index: 1;
}

/* ── LAYER 2: Person photo ── */
/* Designed for background-removed PNG cutouts.
   background is transparent so the circle shows through the cutout.
   Pipeline should supply background-removed PNG for the full cutout effect. */
.person-layer {
  position: absolute;
  left: 0;
  top: 0;
  width: 660px;
  height: 100%;
  z-index: 2;
  background: transparent;
  filter: drop-shadow(6px 0 20px rgba(0,0,0,0.22));
}
.person-layer .sticker-placeholder {
  width: 100%;
  height: 100%;
  background: rgba(245,245,245,0.55); /* translucent — shows the red circle behind */
  display: block;
}
.person-layer img,
.person-layer .sticker-placeholder img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center bottom;
  filter: grayscale(1) contrast(1.15) brightness(0.90);
  display: block;
}

/* ── LAYER 3: Logo (top left) ── */
.cover-logo {
  position: absolute;
  top: 52px;
  left: 52px;
  z-index: 10;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 40px;
  line-height: 1.05;
  color: var(--text-color);
  letter-spacing: -.02em;
}
.logo-top {
  display: block;
  border-bottom: 3px solid var(--text-color);
  padding-bottom: 3px;
  margin-bottom: 3px;
}

/* ── LAYER 3: Headline (top right) ── */
.cover-headline {
  position: absolute;
  top: 44px;
  right: 44px;
  left: 476px;          /* clears the person layer */
  z-index: 10;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 102px;
  line-height: 0.91;
  text-transform: uppercase;
  color: var(--text-color);
  letter-spacing: -.015em;
  word-break: break-word;
}

/* ── LAYER 3: Photo credit (bottom left) ── */
.cover-credit {
  position: absolute;
  bottom: 32px;
  left: 44px;
  z-index: 10;
  font-family: 'Barlow', sans-serif;
  font-size: 19px;
  color: var(--muted);
  letter-spacing: .01em;
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     SLIDE 1 — COVER · MAIN CHARACTER
══════════════════════════════════════════════ -->
<div class="slide slide-cover">

  <!-- LAYER 1: Geometric circle blob (recolor via --blob-color) -->
  <div class="blob-circle"></div>

  <!-- LAYER 2: Person photo — separate from blob, has drop-shadow -->
  <!-- Pipeline uses .sticker-slot → .sticker-placeholder to inject photo.
       CSS on .person-layer applies grayscale automatically — pipeline just drops the photo. -->
  <div class="person-layer sticker-slot">
    <div class="sticker-placeholder"></div>
  </div>

  <!-- LAYER 3: Text / logo (above everything) -->
  <div class="cover-logo">
    <span class="logo-top">In</span>US
  </div>

  <div class="cover-headline">
    SENATOR NAMED IN SCHEME TO HAND SUPREME COURT TO THE FAR RIGHT
  </div>

  <div class="cover-credit">Photo : AP / Reuters</div>
</div>



</body>
</html>
