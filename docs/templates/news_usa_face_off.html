<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USA — Face-Off Cover · FORMAT-COVER-FACEOFF-US</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Roboto+Condensed:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* FORMAT-COVER-FACEOFF-US — USA mirror of two-character face-off cover
   Two profile cutouts facing each other on a contextual bg with steel-blue duotone */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1B3E;
  --ink:#0A0A0A;
  --cream:#F0EBE3;
  --W:1080px;--H:1350px;
}
body{background:#111;display:flex;justify-content:center;padding:24px;font-family:'Playfair Display',serif}
.slide{width:var(--W);height:var(--H);background:var(--bg);position:relative;overflow:hidden;flex-shrink:0}
.bg-photo{
  position:absolute;inset:0;z-index:0;
  background-size:cover;background-position:center;
  filter:url(#duotone-steel) brightness(0.85);
}
.bg-overlay{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(to bottom,rgba(13,27,62,0.30) 0%,rgba(8,16,40,0.50) 100%);
}

.logo-top{position:absolute;top:32px;left:50%;transform:translateX(-50%);z-index:6}
.logo-circle{
  width:56px;height:56px;border-radius:50%;
  background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.logo-circle span{
  font-family:'Roboto Condensed',sans-serif;
  font-size:14px;font-weight:900;color:var(--cream);line-height:1;
}
.counter{
  position:absolute;top:32px;right:36px;z-index:6;
  background:rgba(10,10,10,0.8);color:var(--cream);
  font-family:'Roboto Condensed',sans-serif;
  font-size:20px;font-weight:700;
  padding:8px 18px;border-radius:24px;
}

.face-left,.face-right{
  position:absolute;bottom:140px;height:1100px;z-index:3;
}
.face-left{left:-60px}
.face-right{right:-60px;transform:scaleX(-1)}
.face-img{
  height:100%;width:auto;
  object-fit:contain;object-position:bottom center;
  filter:url(#duotone-bw-us);
}

.headline{
  position:absolute;top:180px;left:50%;transform:translateX(-50%);
  width:560px;z-index:5;
  font-family:'Playfair Display',serif;
  font-size:84px;line-height:0.98;letter-spacing:-0.012em;
  color:var(--cream);font-weight:700;text-align:center;
  text-shadow:0 4px 22px rgba(0,0,0,0.6);
}
.headline u{text-decoration-thickness:3px;text-underline-offset:6px}

.bottom-strip{
  position:absolute;bottom:60px;left:0;right:0;z-index:5;
  background:var(--cream);padding:18px 110px;
  display:flex;align-items:center;justify-content:center;
}
.bottom-strip-text{
  font-family:'Playfair Display',serif;
  font-size:30px;font-weight:700;color:var(--ink);
  font-style:italic;letter-spacing:-0.005em;
}
.badge-bl{position:absolute;bottom:60px;left:30px;z-index:7}

.topic-stamp{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:6;
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:700;color:var(--cream);
  letter-spacing:.18em;text-transform:uppercase;
}
.topic-stamp em{font-style:italic;font-weight:400}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="duotone-steel" color-interpolation-filters="sRGB">
    <feColorMatrix type="matrix" values=".299 .587 .114 0 0  .299 .587 .114 0 0  .299 .587 .114 0 0  0 0 0 1 0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="1.2" intercept="-0.1"/>
      <feFuncG type="linear" slope="1.2" intercept="-0.1"/>
      <feFuncB type="linear" slope="1.2" intercept="-0.1"/>
    </feComponentTransfer>
    <feComponentTransfer>
      <feFuncR type="table" tableValues="0.10 0.85"/>
      <feFuncG type="table" tableValues="0.13 0.86"/>
      <feFuncB type="table" tableValues="0.20 0.92"/>
    </feComponentTransfer>
  </filter>
  <filter id="duotone-bw-us" color-interpolation-filters="sRGB">
    <feColorMatrix type="matrix" values=".299 .587 .114 0 0  .299 .587 .114 0 0  .299 .587 .114 0 0  0 0 0 1 0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="1.4" intercept="-0.15"/>
      <feFuncG type="linear" slope="1.4" intercept="-0.15"/>
      <feFuncB type="linear" slope="1.4" intercept="-0.15"/>
    </feComponentTransfer>
    <feComponentTransfer>
      <feFuncR type="table" tableValues="0.05 0.94"/>
      <feFuncG type="table" tableValues="0.05 0.91"/>
      <feFuncB type="table" tableValues="0.05 0.86"/>
    </feComponentTransfer>
  </filter>
</svg>

<div class="slide">
  <div class="bg-photo" style="background-image:url('https://images.unsplash.com/photo-1518306727298-4c17e1bf6e4d?w=1080&h=1350&fit=crop')"></div>
  <div class="bg-overlay"></div>

  <div class="logo-top"><div class="logo-circle"><span>In</span><span>US</span></div></div>
  <div class="counter">1/10</div>

  <div class="face-left"><img class="face-img" src="resources/two_char_demo/person1_cutout.png" alt=""></div>
  <div class="face-right"><img class="face-img" src="resources/two_char_demo/person2_cutout.png" alt=""></div>

  <div class="headline">
    Border policy<br>
    becomes flashpoint<br>
    between <u>Biden</u><br>
    and <u>Trump</u>
  </div>

  <div class="bottom-strip">
    <div class="bottom-strip-text">— families on the ground pay the price</div>
  </div>

  <div class="badge-bl"><div class="logo-circle"><span>In</span><span>US</span></div></div>
  <div class="topic-stamp">BORDER <em>at the</em> CROSSROADS</div>
</div>
</body>
</html>
