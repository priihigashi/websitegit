<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Brasil — Cover · Main Character v2</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   BRAZIL — COVER · MAIN CHARACTER v2
   Inverted palette: dark background + yellow circle
   Avoids yellow+blue flag read. Same layer architecture.
   Palette variables — change these to retheme:
     --bg-color     slide background
     --blob-color   large circle behind person
     --text-color   headline + logo
     --hl-color     inline text highlight
     --hl-text      text ON the highlight chip
   Layering order (z-index):
     0 bg-color    (CSS background)
     1 blob        (circle)
     2 person      (B&W photo, separate from blob)
     10 text/logo
═══════════════════════════════════════════════ */
:root {
  /* ── THEME VARIABLES ── */
  --bg-color:   #111111;   /* near black — slide background */
  --blob-color: #FFE500;   /* yellow circle — geometric layer */
  --text-color: #FFFFFF;   /* white — headline, logo, labels */
  --hl-color:   #FFE500;   /* inline highlight background */
  --hl-text:    #111111;   /* text on highlight chip (dark on yellow) */
  --muted:      rgba(255,255,255,0.38);

  /* ── Slide dimensions ── */
  --W: 1080px;
  --H: 1350px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #111;
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  padding: 24px;
  font-family: 'Barlow Condensed', sans-serif;
}
.slide {
  width:  var(--W);
  height: var(--H);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}


/* ══════════════════════════════════════════════
   SLIDE 1 — COVER · MAIN CHARACTER
   Layer stack (bottom to top):
     1. Dark background (CSS)
     2. Yellow circle blob (z-index 1) — right-center of slide
     3. B&W person photo  (z-index 2) — left side, clearly in front of circle
     4. Text + logo       (z-index 10)
══════════════════════════════════════════════ */
.slide-cover {
  background: var(--bg-color);
}

/* ── LAYER 1: Geometric circle blob ── */
/* Positioned center-right so it reads as an orb, not a flag element.
   Circle center: ~x=820, y=680. Person (0-650px) fully covers left portion.
   Visible arc starts cleanly at the person's right edge. */
.blob-circle {
  position: absolute;
  width: 920px;
  height: 920px;
  background: var(--blob-color);  /* ← one variable controls this */
  border-radius: 50%;
  left: 50px;    /* center lands at ~x=510, behind the person's torso */
  top: 270px;
  z-index: 1;
}

/* ── LAYER 2: Person photo ── */
.person-layer {
  position: absolute;
  left: 0;
  top: 0;
  width: 660px;
  height: 100%;
  z-index: 2;
  /* drop-shadow separates the person silhouette from the circle behind */
  filter: drop-shadow(6px 0 28px rgba(0,0,0,0.55));
}
/* Opaque placeholder so circle never bleeds through before photo is injected */
.person-layer .sticker-placeholder {
  width: 100%;
  height: 100%;
  background: var(--bg-color);  /* same as slide bg — fully opaque */
  display: block;
}
/* Photo: grayscale via CSS — pipeline drops raw color photo */
.person-layer img,
.person-layer .sticker-placeholder img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 8%;
  filter: grayscale(1) contrast(1.15) brightness(0.95);
  display: block;
}

/* ── LAYER 3: Logo (top left) ── */
.cover-logo {
  position: absolute;
  top: 52px;
  left: 52px;
  z-index: 10;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 40px;
  line-height: 1.05;
  color: var(--text-color);
  letter-spacing: -.02em;
}
.logo-top {
  display: block;
  border-bottom: 3px solid var(--blob-color); /* yellow underline on dark bg */
  padding-bottom: 3px;
  margin-bottom: 3px;
}

/* ── LAYER 3: Headline (top right) ── */
.cover-headline {
  position: absolute;
  top: 44px;
  right: 44px;
  left: 488px;          /* clears the person layer */
  z-index: 10;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 96px;
  line-height: 0.91;
  text-transform: uppercase;
  color: var(--text-color);
  letter-spacing: -.015em;
  word-break: break-word;
}

/* ── LAYER 3: Photo credit (bottom left) ── */
.cover-credit {
  position: absolute;
  bottom: 32px;
  left: 44px;
  z-index: 10;
  font-family: 'Barlow', sans-serif;
  font-size: 19px;
  color: var(--muted);
  letter-spacing: .01em;
}


</style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     SLIDE 1 — COVER · MAIN CHARACTER
══════════════════════════════════════════════ -->
<div class="slide slide-cover">

  <!-- LAYER 1: Yellow circle blob — positioned right-center, behind person -->
  <div class="blob-circle"></div>

  <!-- LAYER 2: Person photo — solid background so circle never bleeds through -->
  <div class="person-layer sticker-slot">
    <div class="sticker-placeholder"></div>
  </div>

  <!-- LAYER 3: Text / logo -->
  <div class="cover-logo">
    <span class="logo-top">In</span>Br
  </div>

  <div class="cover-headline">
    NOME DO POLÍTICO NO STF É ALERTA SOBRE PLANO DA EXTREMA DIREITA PARA DOMINAR SENADO
  </div>

  <div class="cover-credit">Foto : Agência Brasil</div>
</div>



</body>
</html>
