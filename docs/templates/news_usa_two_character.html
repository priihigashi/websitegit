<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USA — Two Character Cover · FORMAT-COVER-2CHAR-US</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto+Condensed:wght@400;700;900&family=Anton&display=swap" rel="stylesheet">
<style>
/* FORMAT-COVER-2CHAR-US — USA mirror of two-character cover
   Navy bg + cream headline + black block holding two cutouts
   Heads extend above block (text does NOT overlap heads — generous margins).
   Uses same rembg cutout pipeline as Brazil version.
*/
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1B3E;
  --bg-deep:#0A1432;
  --ink:#0A0A0A;
  --cream:#F0EBE3;
  --cream-mid:#E8D8B5;
  --money:#D8C49A;
  --W:1080px;--H:1350px;--slide-inset:60px;--P:var(--slide-inset);
}
body{background:#111;display:flex;justify-content:center;padding:24px;font-family:'Archivo Black',sans-serif}
.slide{
  width:var(--W);height:var(--H);background:var(--bg);
  position:relative;overflow:hidden;padding:var(--P);
  flex-shrink:0;display:flex;flex-direction:column;
}
.slide::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
  background-image:
    repeating-linear-gradient(45deg,transparent 0,transparent 2px,rgba(255,255,255,0.025) 2px,rgba(255,255,255,0.025) 4px),
    repeating-linear-gradient(-45deg,transparent 0,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 6px);
}
.slide::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(circle at 30% 50%,transparent 60%,rgba(0,0,0,0.22) 100%);
}
.slide>*{position:relative;z-index:3}

.counter{
  position:absolute;top:34px;right:40px;z-index:5;
  background:rgba(240,235,227,0.15);
  color:var(--cream);
  font-family:'Roboto Condensed',sans-serif;
  font-size:22px;font-weight:700;
  padding:10px 22px;border-radius:30px;
  border:1px solid rgba(240,235,227,0.25);
}

/* Dollar/legal-pad accents in corners (USA equivalent of 200 reais) */
.money-corner{
  position:absolute;z-index:2;background:var(--money);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(0,0,0,0.25);
}
.money-tr{
  top:-30px;right:-60px;width:300px;height:200px;
  transform:rotate(14deg);
  clip-path:polygon(15% 0%,92% 6%,100% 60%,88% 96%,28% 100%,4% 70%,0% 24%);
}
.money-tr-text{
  font-family:'Roboto Condensed',sans-serif;
  font-size:42px;font-weight:900;color:rgba(0,0,0,0.45);
  letter-spacing:.04em;transform:rotate(-12deg);white-space:nowrap;
}
.money-tr-text small{display:block;font-size:14px;letter-spacing:.2em;text-align:center;margin-top:2px;font-weight:700}
.money-bl{
  bottom:280px;left:-50px;width:240px;height:170px;
  transform:rotate(-22deg);
  clip-path:polygon(0% 30%,88% 0%,100% 50%,80% 100%,12% 92%);
}
.money-bl-text{
  font-family:'Roboto Condensed',sans-serif;
  font-size:18px;font-weight:900;color:rgba(0,0,0,0.42);
  letter-spacing:.18em;transform:rotate(22deg);
}

.headline{
  font-family:'Archivo Black','Anton',sans-serif;
  font-size:88px;font-weight:400;
  line-height:0.92;letter-spacing:-0.01em;
  color:var(--cream);
  text-transform:none;flex-shrink:0;
}
.headline .underline{
  text-decoration:underline;
  text-decoration-thickness:6px;text-underline-offset:8px;
}
.headline-top{margin-top:24px;margin-bottom:24px;z-index:5}
.headline-bot{margin-top:24px;margin-bottom:24px;z-index:5}

.inline-pill{
  display:inline-block;
  background:var(--ink);color:var(--cream);
  border-radius:60px;padding:0 28px 4px;margin:0 4px;
  font-family:inherit;font-size:64px;
  vertical-align:middle;line-height:1.05;
}

/* Photo zone (same architecture as Brazil two-char) */
.photo-zone{
  width:700px;height:520px;
  margin:30px auto 30px;
  position:relative;z-index:1;
  display:flex;align-items:flex-end;justify-content:center;gap:0;
  flex-shrink:0;
}
.black-block{
  position:absolute;
  top:140px;left:0;right:0;bottom:0;
  background:var(--ink);
  border-radius:6px;
  box-shadow:0 14px 40px rgba(0,0,0,0.55),
             inset 0 0 0 1px rgba(0,0,0,0.85);
  z-index:1;
}
.person-img{
  position:relative;z-index:2;
  height:100%;width:auto;max-width:55%;
  object-fit:contain;object-position:bottom center;
  filter:url(#duotone-twochar-us);
}
.person-img.person-1{transform:translateX(6%)}
.person-img.person-2{transform:translateX(-6%)}

.cta-pill{
  position:absolute;bottom:24px;right:30px;z-index:6;
  background:var(--ink);color:var(--cream);
  font-family:'Roboto Condensed',sans-serif;
  font-size:18px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  padding:14px 28px;border-radius:60px;
  display:flex;align-items:center;gap:16px;
}
.cta-pill .arrow{font-size:22px;line-height:1}

.logo-stack{
  position:absolute;bottom:24px;left:30px;z-index:6;
  display:flex;flex-direction:column;gap:14px;
}
.logo-circle{
  width:64px;height:64px;border-radius:50%;
  background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.logo-circle span{
  font-family:'Roboto Condensed',sans-serif;
  font-size:16px;font-weight:900;color:var(--cream);
  line-height:1;letter-spacing:.02em;
}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="duotone-twochar-us" color-interpolation-filters="sRGB">
    <feColorMatrix type="matrix" values=".299 .587 .114 0 0  .299 .587 .114 0 0  .299 .587 .114 0 0  0 0 0 1 0"/>
    <feComponentTransfer><feFuncR type="linear" slope="1.4" intercept="-0.2"/><feFuncG type="linear" slope="1.4" intercept="-0.2"/><feFuncB type="linear" slope="1.4" intercept="-0.2"/></feComponentTransfer>
    <feComponentTransfer>
      <feFuncR type="table" tableValues="0.039 0.910"/>
      <feFuncG type="table" tableValues="0.039 0.847"/>
      <feFuncB type="table" tableValues="0.039 0.706"/>
    </feComponentTransfer>
  </filter>
</svg>

<div class="slide">

  <div class="counter">1/10</div>

  <div class="money-corner money-tr">
    <div class="money-tr-text">$1B<small>FUNDS</small></div>
  </div>
  <div class="money-corner money-bl">
    <div class="money-bl-text">TREASURY</div>
  </div>

  <div class="headline headline-top">
    <span class="underline"><strong>Senate Probe</strong></span><br>
    <span class="underline">found millions</span><br>
    <span class="underline">funneled</span><span class="inline-pill">to</span>
  </div>

  <div class="photo-zone">
    <div class="black-block"></div>
    <img class="person-img person-1" src="resources/two_char_demo/person1_cutout.png" alt="">
    <img class="person-img person-2" src="resources/two_char_demo/person2_cutout.png" alt="">
  </div>

  <div class="headline headline-bot">
    shell<br>
    company<br>
    <span class="underline">tied to fraud</span>
  </div>

  <div class="logo-stack">
    <div class="logo-circle"><span>In</span><span>US</span></div>
  </div>

  <div class="cta-pill">
    UNDERSTAND WHY THIS MATTERS
    <span class="arrow">→</span>
  </div>

</div>
</body>
</html>
