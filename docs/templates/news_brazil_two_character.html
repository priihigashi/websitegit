<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Brazil — Two Character Cover · FORMAT-COVER-2CHAR-BR</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto+Condensed:wght@400;700;900&family=Anton&display=swap" rel="stylesheet">
<style>
/* FORMAT-COVER-2CHAR-BR — Brazil cover for stories with TWO main characters
   Brick red bg + mint duotone photo of two people side-by-side
   Headline wraps around the photo (above + below)
   Inspired by InBr (Zema/empresa fraude editorial cover)
*/
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#A52929;
  --bg-deep:#7A1E1E;
  --ink:#0A0A0A;
  --mint:#D6E8AC;
  --mint-mid:#B5D08A;
  --money:#D8C49A;
  --W:1080px;--H:1350px;--P:60px;
}
body{background:#111;display:flex;justify-content:center;padding:24px;font-family:'Archivo Black',sans-serif}
.slide{
  width:var(--W);height:var(--H);background:var(--bg);
  position:relative;overflow:hidden;padding:var(--P);
  flex-shrink:0;display:flex;flex-direction:column;
}
/* Canvas / paper texture overlay */
.slide::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
  background-image:
    repeating-linear-gradient(45deg,transparent 0,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px),
    repeating-linear-gradient(-45deg,transparent 0,transparent 3px,rgba(255,255,255,0.02) 3px,rgba(255,255,255,0.02) 6px);
}
.slide::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(circle at 30% 50%,transparent 60%,rgba(0,0,0,0.18) 100%);
}
.slide>*{position:relative;z-index:3}

/* Counter pill top-right */
.counter{
  position:absolute;top:34px;right:40px;z-index:5;
  background:rgba(15,10,8,0.88);
  color:var(--mint);
  font-family:'Roboto Condensed',sans-serif;
  font-size:22px;font-weight:700;
  padding:10px 22px;border-radius:30px;
}

/* Money / 200 reais torn paper accents */
.money-corner{
  position:absolute;z-index:2;background:var(--money);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(0,0,0,0.18);
}
.money-tr{
  top:-30px;right:-60px;width:300px;height:200px;
  transform:rotate(14deg);
  clip-path:polygon(15% 0%,92% 6%,100% 60%,88% 96%,28% 100%,4% 70%,0% 24%);
}
.money-tr-text{
  font-family:'Roboto Condensed',sans-serif;
  font-size:42px;font-weight:900;color:rgba(0,0,0,0.45);
  letter-spacing:.04em;transform:rotate(-12deg);white-space:nowrap;
}
.money-tr-text small{display:block;font-size:14px;letter-spacing:.2em;text-align:center;margin-top:2px;font-weight:700}
.money-bl{
  bottom:280px;left:-50px;width:240px;height:170px;
  transform:rotate(-22deg);
  clip-path:polygon(0% 30%,88% 0%,100% 50%,80% 100%,12% 92%);
}
.money-bl-text{
  font-family:'Roboto Condensed',sans-serif;
  font-size:18px;font-weight:900;color:rgba(0,0,0,0.42);
  letter-spacing:.18em;transform:rotate(22deg);
}

/* Headline (mint, chunky display) */
.headline{
  font-family:'Archivo Black','Anton',sans-serif;
  font-size:88px;font-weight:400;
  line-height:0.92;letter-spacing:-0.01em;
  color:var(--mint);
  text-transform:none;
  flex-shrink:0;
}
.headline .underline{
  text-decoration:underline;
  text-decoration-thickness:6px;
  text-underline-offset:8px;
}
.headline-top{margin-top:24px;margin-bottom:24px;z-index:5}
.headline-bot{margin-top:24px;margin-bottom:24px;z-index:5}

/* Inline black pill (e.g. "de") */
.inline-pill{
  display:inline-block;
  background:var(--ink);
  color:var(--mint);
  border-radius:60px;
  padding:0 28px 4px;
  margin:0 4px;
  font-family:inherit;
  font-size:64px;
  vertical-align:middle;
  line-height:1.05;
}

/* PHOTO ZONE — three-layer composition:
   (1) Black block sits BEHIND, sized so its top edge falls BELOW head tops.
   (2) Two cutout PNGs sit IN FRONT of the block, full-height of the zone — heads
       extend above block top edge into the gap between headline and block.
   (3) Headlines have generous margin so they do NOT overlap the heads. */
.photo-zone{
  width:700px;height:520px;
  margin:30px auto 30px;
  position:relative;z-index:1;
  display:flex;align-items:flex-end;justify-content:center;gap:0;
  flex-shrink:0;
}
.black-block{
  position:absolute;
  top:140px;left:0;right:0;bottom:0;     /* top:140px = head clearance above block */
  background:var(--ink);
  border-radius:6px;
  box-shadow:0 14px 40px rgba(0,0,0,0.55),
             inset 0 0 0 1px rgba(0,0,0,0.85);
  z-index:1;
}
/* (legacy block kept hidden — replaced by .photo-zone above) */
.photo-block{
  display:none;
}
.person-img{
  position:relative;z-index:2;
  height:100%;width:auto;max-width:55%;
  object-fit:contain;object-position:bottom center;
  filter:url(#duotone-twochar);
}
.person-img.person-1{transform:translateX(6%)}
.person-img.person-2{transform:translateX(-6%)}

/* CTA pill bottom-right */
.cta-pill{
  position:absolute;bottom:24px;right:30px;z-index:6;
  background:var(--ink);
  color:var(--mint);
  font-family:'Roboto Condensed',sans-serif;
  font-size:18px;font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  padding:14px 28px;
  border-radius:60px;
  display:flex;align-items:center;gap:16px;
}
.cta-pill .arrow{font-size:22px;line-height:1}

/* InBr logo stack bottom-left */
.logo-stack{
  position:absolute;bottom:24px;left:30px;z-index:6;
  display:flex;flex-direction:column;gap:14px;
}
.logo-circle{
  width:64px;height:64px;border-radius:50%;
  background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.logo-circle span{
  font-family:'Roboto Condensed',sans-serif;
  font-size:16px;font-weight:900;
  color:var(--mint);
  line-height:1;letter-spacing:.02em;
}
</style>
</head>
<body>

<!-- Duotone SVG filter: shadow #0A0A0A obsidian → highlight #9BC077 sage, with contrast boost -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="duotone-twochar" color-interpolation-filters="sRGB">
    <feColorMatrix type="matrix" values=".299 .587 .114 0 0  .299 .587 .114 0 0  .299 .587 .114 0 0  0 0 0 1 0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="1.4" intercept="-0.2"/>
      <feFuncG type="linear" slope="1.4" intercept="-0.2"/>
      <feFuncB type="linear" slope="1.4" intercept="-0.2"/>
    </feComponentTransfer>
    <feComponentTransfer>
      <feFuncR type="table" tableValues="0.039 0.608"/>
      <feFuncG type="table" tableValues="0.039 0.753"/>
      <feFuncB type="table" tableValues="0.039 0.467"/>
    </feComponentTransfer>
  </filter>
</svg>

<div class="slide">

  <div class="counter">1/10</div>

  <div class="money-corner money-tr">
    <div class="money-tr-text">200<small>REAIS</small></div>
  </div>
  <div class="money-corner money-bl">
    <div class="money-bl-text">REPÚBLICA</div>
  </div>

  <div class="headline headline-top">
    <span class="underline"><strong>Governo Zema</strong></span><br>
    <span class="underline">fez compras</span><br>
    <span class="underline">milionárias</span><span class="inline-pill">de</span>
  </div>

  <div class="photo-zone">
    <div class="black-block"></div>
    <img class="person-img person-1" src="resources/two_char_demo/person1_cutout.png" alt="">
    <img class="person-img person-2" src="resources/two_char_demo/person2_cutout.png" alt="">
  </div>

  <div class="headline headline-bot">
    empresa<br>
    suspeita de<br>
    <span class="underline">fraude</span>
  </div>

  <div class="logo-stack">
    <div class="logo-circle"><span>In</span><span>Br</span></div>
  </div>

  <div class="cta-pill">
    ENTENDA POR QUE ISSO É GRAVE
    <span class="arrow">→</span>
  </div>

</div>
</body>
</html>
