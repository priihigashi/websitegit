<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USA — Single Character + Object Cover · FORMAT-COVER-1CHAR-OBJ-US</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto+Condensed:wght@400;700;900&family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* FORMAT-COVER-1CHAR-OBJ-US — USA mirror of single-character + object cover
   Crimson bg + navy blob bottom · single subject cutout left + bold cream headline right
   PRODUCTION: rembg cutout PNG (subject + object together) injected via .person-img */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#8B1A1A;
  --blob:#0D1B3E;
  --ink:#0A0A0A;
  --cream:#F0EBE3;
  --W:1080px;--H:1350px;--P:60px;
}
body{background:#111;display:flex;justify-content:center;padding:24px;font-family:'Archivo Black',sans-serif}
.slide{
  width:var(--W);height:var(--H);background:var(--bg);
  position:relative;overflow:hidden;flex-shrink:0;
}
.slide::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(45deg,transparent 0,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
}
.flag-blob{
  position:absolute;bottom:-180px;left:50%;transform:translateX(-50%);
  width:1300px;height:560px;border-radius:50%;
  background:var(--blob);z-index:1;
}
.top-bar{
  position:absolute;top:0;left:0;right:0;height:8px;
  background:var(--blob);z-index:2;
}
.logo{
  position:absolute;top:38px;left:50px;z-index:5;
  width:64px;height:64px;border-radius:50%;
  background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.logo span{
  font-family:'Roboto Condensed',sans-serif;
  font-size:16px;font-weight:900;color:var(--cream);
  line-height:1;letter-spacing:.02em;
}
.counter{
  position:absolute;top:38px;right:42px;z-index:5;
  background:rgba(10,10,10,0.85);
  color:var(--cream);
  font-family:'Roboto Condensed',sans-serif;
  font-size:22px;font-weight:700;
  padding:10px 22px;border-radius:30px;
}
.headline{
  position:absolute;top:120px;right:50px;
  width:600px;z-index:5;
  font-family:'Archivo Black','Anton',sans-serif;
  font-size:62px;line-height:1.04;letter-spacing:-0.01em;
  color:var(--cream);text-transform:uppercase;text-align:left;
}
.person-wrap{
  position:absolute;left:-30px;bottom:0;
  width:680px;height:1280px;z-index:3;
  display:flex;align-items:flex-end;justify-content:center;
}
.person-img{
  height:96%;width:auto;max-width:100%;
  object-fit:contain;object-position:bottom center;
  filter:url(#duotone-bw);
}
.photo-credit{
  position:absolute;bottom:30px;left:60px;z-index:5;
  font-family:'Space Mono',monospace;font-size:14px;
  color:rgba(240,235,227,0.75);letter-spacing:.05em;
}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="duotone-bw" color-interpolation-filters="sRGB">
    <feColorMatrix type="matrix" values=".299 .587 .114 0 0  .299 .587 .114 0 0  .299 .587 .114 0 0  0 0 0 1 0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="1.35" intercept="-0.18"/>
      <feFuncG type="linear" slope="1.35" intercept="-0.18"/>
      <feFuncB type="linear" slope="1.35" intercept="-0.18"/>
    </feComponentTransfer>
  </filter>
</svg>

<div class="slide">
  <div class="flag-blob"></div>
  <div class="top-bar"></div>
  <div class="logo"><span>In</span><span>US</span></div>
  <div class="counter">1/10</div>

  <div class="person-wrap">
    <img class="person-img" src="resources/two_char_demo/person1_cutout.png" alt="">
  </div>

  <div class="headline">
    Senate rejection of nominee signals far-right plan to reshape the courts
  </div>

  <div class="photo-credit">Photo: AP / Reuters / InUS</div>
</div>
</body>
</html>
