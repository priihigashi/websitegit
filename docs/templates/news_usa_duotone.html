<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USA — Duotone Statement · FORMAT-DUO-US</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Roboto+Condensed:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* FORMAT-DUO-US — USA Duotone Statement Standalone
   Red background · duotone portrait · claim + quote · attribution
   Duotone: shadows → navy #0D1B3E, highlights → lighter red #E84040 (blends into bg)
   Single slide — goes to standalone_chosen in News Drive
*/
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#8B1A1A;
  --ink:#F0EBE3;
  --ink-mid:#EDE8E0;
  --shadow:#0D1B3E;
  --highlight:#E8C090;
  --navy:#0D1B3E;
  --W:1080px;--H:1350px;--P:80px;
}
body{background:#111;display:flex;justify-content:center;padding:24px}
.slide{
  width:var(--W);height:var(--H);background:var(--bg);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;padding:var(--P);
  flex-shrink:0;
}
.slide::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(
    45deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px
  );
}
.slide>*{position:relative;z-index:1}

/* Navy accent bar at top */
.top-bar{
  position:absolute;top:0;left:0;right:0;height:8px;
  background:var(--navy);z-index:2;
}

/* Headline claim */
.claim{
  font-family:'Playfair Display',serif;
  font-size:60px;font-weight:700;color:var(--ink);
  line-height:1.12;letter-spacing:-0.01em;
  margin-bottom:44px;flex-shrink:0;
  margin-top:16px;
}
.claim strong{font-weight:900}
.claim u{
  text-decoration-color:rgba(240,235,227,0.55);
  text-decoration-thickness:3px;text-underline-offset:5px;
}

/* Duotone photo */
.photo-wrap{
  width:920px;height:540px;border-radius:20px;
  overflow:hidden;position:relative;
  background:var(--shadow);
  flex-shrink:0;align-self:center;
}
.photo-wrap .photo{
  position:absolute;inset:0;
  background-size:cover;background-position:center 15%;
  filter:grayscale(1) contrast(1.2) brightness(0.85);
  mix-blend-mode:multiply;
  width:100%;height:100%;
}
.photo-wrap::after{
  content:'';position:absolute;inset:0;
  background:var(--highlight);
  mix-blend-mode:screen;
  pointer-events:none;
}

/* Quote */
.quote-block{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  padding-top:36px;
}
.quote-mark{
  font-family:'Playfair Display',serif;
  font-size:80px;font-weight:900;color:var(--ink);
  line-height:0.6;opacity:0.25;margin-bottom:8px;
}
.quote-text{
  font-family:'Playfair Display',serif;
  font-size:33px;font-weight:400;font-style:italic;
  color:var(--ink-mid);line-height:1.45;
}

/* Attribution bar */
.attr{
  display:flex;align-items:center;gap:20px;
  padding-top:28px;flex-shrink:0;
  border-top:2px solid rgba(240,235,227,0.2);
}
.logo-circle{
  width:68px;height:68px;border-radius:50%;
  background:var(--navy);flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.logo-circle span{
  font-family:'Roboto Condensed',sans-serif;
  font-size:17px;font-weight:900;color:var(--ink);
  line-height:1.1;letter-spacing:.02em;
}
.attr-avatar{
  width:56px;height:56px;border-radius:50%;
  background:rgba(240,235,227,0.2);
  border:2px solid rgba(240,235,227,0.25);
  background-size:cover;background-position:center;
  flex-shrink:0;
}
.attr-name{
  font-family:'Roboto Condensed',sans-serif;
  font-size:24px;font-weight:700;
  color:var(--ink);letter-spacing:.1em;text-transform:uppercase;
}
.photo-credit{
  position:absolute;right:18px;bottom:220px;
  font-family:'Space Mono',monospace;font-size:10px;
  color:rgba(240,235,227,0.3);letter-spacing:.1em;
  transform:rotate(90deg);transform-origin:right center;
  white-space:nowrap;
}
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar"></div>

  <div class="claim">
    <strong>[Person's Name]</strong> isn't acting alone. <u><strong>They represent something far larger than themselves.</strong></u> The question isn't the individual — it's the system behind them.
  </div>

  <div class="photo-wrap">
    <div class="photo bg-placeholder" style="background-image:url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=920&h=540&fit=crop&crop=face')"></div>
  </div>

  <div class="quote-block">
    <div class="quote-mark">"</div>
    <div class="quote-text">[Direct quote from the expert or source — one sentence that captures the core point of this slide.]</div>
  </div>

  <div class="attr">
    <div class="logo-circle"><span>In</span><span>US</span></div>
    <div class="attr-avatar sticker-slot"></div>
    <div class="attr-name">Expert Name</div>
  </div>

  <div class="photo-credit">Photo: AP / Reuters / InUS</div>
</div>
</body>
</html>
